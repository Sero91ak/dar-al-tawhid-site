name = "dar-admin-publisher"
main = "worker.js"
compatibility_date = "2026-06-14"

[vars]
GITHUB_OWNER = "Sero91ak"
GITHUB_REPO = "dar-al-tawhid-site"
GITHUB_BRANCH = "main"
POSTS_DIR = "content/posts"
ALLOWED_ORIGIN = "https://dar-al-tawhid.de"
UPDATES_PATH = "content/updates/current.json"
SCHEDULE_PATH = "content/admin/planned-posts.json"

# Secrets (einmalig setzen, bleibt am Worker gespeichert):
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put ADMIN_PUBLISH_SECRET
#   wrangler secret put ONESIGNAL_API_KEY_NEW
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHANNEL_USERNAME defaults to @dar_al_tauhid (optional override)
#   PENDING_PUSHES_PATH defaults to content/admin/pending-pushes.json
