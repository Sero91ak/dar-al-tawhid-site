<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAR AL TAWHID</title>
<meta name="theme-color" content="#07100b">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Great+Vibes&display=swap');

:root{
  --bg:#07100b;
  --panel:#101c14;
  --gold:#d7b86c;
  --gold2:#f5df9b;
  --cream:#fff6df;
  --muted:#b7c0b5;
  --line:rgba(215,184,108,.35);
  --shadow:0 24px 70px rgba(0,0,0,.42);
  --radius:24px;
  --serif:"Cormorant Garamond",Georgia,serif;
  --signature:"Great Vibes",cursive;
}

*{box-sizing:border-box}

body{
  margin:0;
  color:var(--cream);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 12% 0%,rgba(215,184,108,.18),transparent 34%),
    radial-gradient(circle at 80% 8%,rgba(245,223,155,.08),transparent 30%),
    linear-gradient(180deg,#050806,var(--bg),#050806);
  min-height:100vh;
}

a{color:var(--gold2);text-decoration:none}
.site{width:min(1240px,calc(100% - 28px));margin:auto}

header{
  position:relative;
  padding:28px 0 18px;
  overflow:hidden;
}

.hero-logo-bg{
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  pointer-events:none;
  z-index:0;
}

.hero-logo-bg img{
  width:min(560px,76vw);
  opacity:.10;
  filter:drop-shadow(0 10px 25px rgba(0,0,0,.45));
}

.hero,.panel,.post-card,.detail-view,.internal-view{
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:rgba(16,28,20,.86);
  box-shadow:var(--shadow);
}

.hero{
  position:relative;
  z-index:1;
  padding:clamp(24px,4vw,46px);
  overflow:hidden;
}

.hero:before,.post-card:before,.detail-view:before,.internal-view:before{
  content:"";
  position:absolute;
  inset:14px;
  border:1px solid rgba(215,184,108,.22);
  border-radius:18px;
  pointer-events:none;
}

.top{
  position:relative;
  z-index:1;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
}

.brand small{
  display:block;
  color:var(--muted);
  letter-spacing:.18em;
  text-transform:uppercase;
  font-size:12px;
  margin-bottom:8px;
}

h1{
  margin:0;
  font-family:var(--serif);
  font-size:clamp(38px,8vw,86px);
  line-height:.9;
  letter-spacing:.11em;
  color:var(--gold2);
  text-transform:uppercase;
  text-shadow:0 6px 20px rgba(0,0,0,.48);
}

h2,h3{
  font-family:var(--serif);
  color:var(--gold2);
  margin:0 0 12px;
  line-height:1.1;
}

h2{font-size:34px}
h3{font-size:25px}

.hero p{
  position:relative;
  z-index:1;
  max-width:920px;
  color:var(--muted);
  line-height:1.7;
  font-size:17px;
  margin:24px 0 0;
}

button,.chip{
  border:1px solid var(--line);
  border-radius:999px;
  background:rgba(215,184,108,.09);
  color:var(--cream);
  padding:10px 14px;
  font-weight:850;
  cursor:pointer;
  font-size:14px;
  display:inline-flex;
  align-items:center;
  gap:7px;
  transition:.18s ease;
}

button:hover,.chip:hover{
  background:rgba(215,184,108,.18);
  transform:translateY(-1px);
}

.links,.list-buttons,.meta,.source-links,.card-actions,.quick-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.quick-actions{
  position:relative;
  z-index:1;
  margin-top:16px;
}

.grid{
  display:grid;
  grid-template-columns:310px 1fr;
  gap:18px;
  padding:18px 0 42px;
  align-items:start;
}

aside{
  position:sticky;
  top:14px;
  padding:18px;
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:rgba(16,28,20,.82);
  box-shadow:var(--shadow);
}

.search{
  width:100%;
  border:1px solid rgba(215,184,108,.30);
  border-radius:15px;
  background:rgba(0,0,0,.30);
  color:var(--cream);
  padding:12px;
  font:inherit;
  outline:none;
  margin-bottom:14px;
}

.group{
  border-top:1px solid rgba(215,184,108,.18);
  padding-top:14px;
  margin-top:14px;
}

.list-buttons button{
  padding:8px 11px;
  font-size:13px;
}

.panel{
  padding:18px;
  margin-bottom:18px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

.stat{
  border:1px solid rgba(215,184,108,.22);
  border-radius:18px;
  padding:16px;
  background:linear-gradient(180deg,rgba(215,184,108,.12),rgba(0,0,0,.14));
}

.stat b{
  display:block;
  color:var(--gold2);
  font-size:28px;
}

.stat span,.muted{color:var(--muted)}

.posts{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:17px;
}

.post-card{
  position:relative;
  overflow:hidden;
  padding:28px;
  min-height:310px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:
    linear-gradient(145deg,rgba(16,28,20,.96),rgba(6,10,8,.98)),
    repeating-linear-gradient(135deg,rgba(215,184,108,.045) 0 1px,transparent 1px 20px);
}

.post-logo
