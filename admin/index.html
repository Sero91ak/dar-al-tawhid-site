<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>DAR Admin · Command Center</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/admin/admin-icon-192.png">
<link rel="manifest" href="/admin/manifest.json">
<meta name="application-name" content="DAR Admin">
<meta name="apple-mobile-web-app-title" content="DAR Admin">
<meta name="theme-color" content="#07111d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
:root{
  --bg:#05080f;--panel:#0a111c;--panel2:#101a29;--ink:#eef6ff;--soft:#b9c9dc;--muted:#73859a;
  --gold:#d9ecff;--bronze:#6da7ff;--green:#8fc7ff;--red:#ff9a90;--blue:#90c8ff;
  --line:rgba(140,190,255,.30);--line2:rgba(140,190,255,.14);--shadow:0 22px 70px rgba(0,0,0,.42);
  --serif:Georgia,"Times New Roman",serif;--sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{margin:0;min-height:100dvh;color:var(--ink);font-family:var(--sans);letter-spacing:0;
  background:
    radial-gradient(circle at 8% -8%,rgba(90,140,220,.28),transparent 34%),
    radial-gradient(circle at 92% 0%,rgba(140,190,255,.18),transparent 30%),
    linear-gradient(180deg,#05080f 0%,#09111d 52%,#05080f 100%);
  padding:max(12px,var(--safe-top)) max(14px,env(safe-area-inset-right,0px)) max(18px,var(--safe-bottom)) max(14px,env(safe-area-inset-left,0px))}
button,input,select{font:inherit}
button{cursor:pointer}
.app{max-width:1180px;margin:0 auto}
.topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand img{width:48px;height:48px;border-radius:14px;box-shadow:0 12px 28px rgba(0,0,0,.28),0 0 0 1px rgba(140,190,255,.22);flex:0 0 48px;filter:saturate(.72) hue-rotate(172deg)}
.brand h1{margin:0;font-family:var(--serif);font-size:23px;line-height:1.03;color:var(--gold)}
.brand p{margin:4px 0 0;color:var(--soft);font-size:12px;font-weight:800}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.toolbar .back-btn{display:none}
.toolbar .back-btn.show{display:inline-flex}
.btn,.chip{border:1px solid var(--line);background:rgba(90,140,220,.10);color:var(--ink);border-radius:12px;min-height:38px;padding:8px 12px;font-size:12px;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.btn.primary{background:linear-gradient(135deg,rgba(90,140,220,.28),rgba(140,190,255,.10));border-color:rgba(140,190,255,.48)}
.btn.danger{color:#ffe0dc;border-color:rgba(225,125,115,.28);background:rgba(225,125,115,.08)}
.btn:active,.chip:active{transform:scale(.98)}
.panel{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(10,17,28,.94),rgba(5,8,15,.96));box-shadow:var(--shadow);padding:15px;overflow:hidden}
.login{max-width:420px;margin:42px auto 20px;text-align:center}
.login-logo{width:74px;height:74px;border-radius:20px;margin:0 auto 14px;display:block;box-shadow:0 16px 42px rgba(0,0,0,.34),0 0 34px rgba(90,140,220,.22);filter:saturate(.72) hue-rotate(172deg)}
.login h2{margin:0 0 6px;font-family:var(--serif);font-size:28px;color:var(--gold)}
.login p{margin:0 0 18px;color:var(--soft);font-size:13px;line-height:1.5}
.login input{width:100%;margin-bottom:10px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.32);color:var(--ink);font-size:15px}
.login button{width:100%;justify-content:center}
.hint{margin-top:14px;padding:12px;border:1px dashed var(--line);border-radius:14px;color:var(--soft);font-size:11px;line-height:1.55;text-align:left;background:rgba(90,140,220,.055)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:#8fc7ff;margin-right:6px;vertical-align:middle;box-shadow:0 0 18px rgba(140,190,255,.55)}
.admin-cover{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:
  linear-gradient(135deg,rgba(4,8,16,.98),rgba(11,24,39,.96) 54%,rgba(5,9,18,.98)),
  radial-gradient(circle at 78% 12%,rgba(90,140,220,.30),transparent 34%);
  box-shadow:var(--shadow);margin-bottom:12px;padding:16px;display:block}
.admin-cover:before{content:"";position:absolute;inset:13px;border:1px solid rgba(140,190,255,.15);border-radius:18px;pointer-events:none}
.admin-cover-text{position:relative;z-index:1;max-width:650px}
.admin-kicker{color:var(--gold);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px}
.admin-cover h2{font-family:var(--serif);font-size:clamp(30px,5vw,42px);line-height:1;margin:0;color:#eef6ff}
.admin-cover p{color:var(--soft);font-size:12.5px;line-height:1.55;margin:12px 0 0;max-width:560px}
.cover-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.folder-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.folder-card{border:1px solid var(--line);border-radius:14px;background:linear-gradient(145deg,rgba(12,24,39,.94),rgba(5,9,16,.94));padding:10px;color:var(--ink);text-align:left;min-height:74px;box-shadow:0 10px 24px rgba(0,0,0,.18)}
.folder-card:hover{border-color:rgba(140,190,255,.52)}
.folder-icon{display:none}
.folder-card h3{font-family:var(--serif);font-size:18px;line-height:1.05;color:var(--gold);margin:0 0 7px}
.folder-card p{display:none}
.folder-card small{display:block;color:var(--muted);font-size:9.5px;font-weight:900;margin-top:0;text-transform:uppercase;line-height:1.25}
.hero{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:12px;margin-bottom:12px}
.hero-card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,rgba(13,25,40,.96),rgba(5,9,16,.96));padding:16px;min-height:170px}
.hero-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.hero-title h2{margin:0;font-family:var(--serif);font-size:clamp(24px,4vw,38px);line-height:1.02;color:#eef6ff}
.hero-title p{margin:6px 0 0;color:var(--soft);font-size:12px;line-height:1.45;max-width:560px}
.signal{border:1px solid rgba(140,190,255,.34);border-radius:999px;padding:6px 10px;color:#eef6ff;background:rgba(90,140,220,.12);font-size:11px;font-weight:950;white-space:nowrap}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.metric{border:1px solid var(--line2);border-radius:15px;padding:12px;background:rgba(90,140,220,.065);min-height:84px}
.metric b,.mini b,.quick b{display:block;color:var(--muted);font-size:10px;font-weight:950;text-transform:uppercase;margin-bottom:7px}
.metric span{display:block;color:var(--gold);font-size:clamp(22px,4vw,34px);font-weight:950;line-height:1.02}
.metric small,.mini small,.quick small{display:block;color:var(--soft);font-size:10.5px;line-height:1.35;margin-top:5px}
.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.mini,.quick{border:1px solid var(--line2);border-radius:15px;padding:12px;background:rgba(0,0,0,.20);min-height:76px}
.mini span{font-size:22px;color:#eaf5ff;font-weight:950}
.quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.quick{display:block;text-decoration:none;color:var(--ink)}
.quick:hover{border-color:rgba(140,190,255,.42)}
.tabs{display:flex;gap:8px;overflow:auto;padding:2px;margin:2px 0 12px}
.tab{white-space:nowrap;border:1px solid var(--line2);background:rgba(90,140,220,.07);color:var(--soft);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:950}
.tab.active{color:#eef6ff;border-color:rgba(140,190,255,.52);background:rgba(90,140,220,.18)}
.controls{display:grid;grid-template-columns:minmax(220px,1fr) 150px 150px auto;gap:9px;margin-bottom:12px}
.field{width:100%;min-height:40px;border:1px solid var(--line2);border-radius:12px;background:rgba(0,0,0,.24);color:var(--ink);padding:9px 11px}
.upload-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(220px,.45fr);gap:10px;margin-top:12px}
.paste-area{width:100%;min-height:280px;resize:vertical;border:1px solid var(--line2);border-radius:14px;background:rgba(0,0,0,.26);color:var(--ink);padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.55}
.upload-stack{display:grid;gap:9px;align-content:start}
.upload-status{border:1px dashed var(--line);border-radius:14px;padding:11px;color:var(--soft);font-size:11px;line-height:1.5;background:rgba(90,140,220,.055)}
.upload-status strong{color:var(--gold)}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:0 0 10px}
.section-head h3{margin:0;font-family:var(--serif);font-size:22px;color:var(--gold)}
.section-head span{color:var(--muted);font-size:11px;font-weight:850;white-space:nowrap}
.rank-list{display:grid;gap:9px}
.rank-card{display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:12px;align-items:center;border:1px solid var(--line2);border-radius:15px;padding:11px;background:linear-gradient(145deg,rgba(12,24,39,.94),rgba(5,9,16,.94));text-align:left;color:inherit;width:100%}
.rank-num{display:grid;place-items:center;width:38px;height:38px;border-radius:12px;background:rgba(90,140,220,.14);border:1px solid rgba(140,190,255,.22);color:var(--gold);font-weight:950}
.rank-title{margin:0;font-family:var(--serif);font-size:17px;line-height:1.25;color:#eef6ff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rank-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.tag{border:1px solid rgba(140,190,255,.18);border-radius:999px;padding:4px 8px;color:var(--soft);background:rgba(90,140,220,.07);font-size:10.5px;font-weight:900;white-space:nowrap}
.tag.green{color:#e8f5ff;border-color:rgba(140,190,255,.26);background:rgba(90,140,220,.09)}
.tag.blue{color:#d9ecff;border-color:rgba(90,140,220,.30);background:rgba(90,140,220,.10)}
.score{font-size:22px;font-weight:950;color:var(--gold);min-width:42px;text-align:right}
.split{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px}
.side-stack{display:grid;gap:12px}
.empty{padding:18px;border:1px dashed var(--line);border-radius:14px;color:var(--soft);text-align:center;font-size:13px;line-height:1.55}
.meta-line{color:var(--muted);font-size:11px;line-height:1.45;text-align:center;margin-top:12px}
.toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%);background:#0b1421;color:#eef6ff;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:900;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.22s}
.toast.show{opacity:1}
@media(max-width:950px){.hero,.split,.upload-grid{grid-template-columns:1fr}.metric-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.controls{grid-template-columns:1fr 1fr}.controls .btn{justify-content:center}}
@media(max-width:640px){body{padding-left:10px;padding-right:10px}.topbar{grid-template-columns:1fr}.toolbar{justify-content:stretch}.toolbar .btn{flex:1;justify-content:center}.toolbar .back-btn.show{flex:0 0 100%}.panel{padding:11px;border-radius:16px}.admin-cover{padding:13px}.admin-kicker{font-size:9.5px;letter-spacing:.08em;margin-bottom:8px}.admin-cover h2{font-size:31px}.admin-cover p{font-size:12.5px;line-height:1.5}.cover-actions .btn,.cover-actions .signal{min-height:34px;font-size:11px}.folder-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.folder-card{min-height:68px;padding:9px 7px}.folder-card h3{font-size:clamp(13px,3.4vw,16px);overflow-wrap:normal}.folder-card small{font-size:8px}.hero-card{padding:13px}.hero-title{display:block}.signal{display:inline-flex;margin-top:10px}.mini-grid,.quick-grid{grid-template-columns:1fr}.rank-card{grid-template-columns:34px minmax(0,1fr);align-items:start}.score{grid-column:2;text-align:left;font-size:18px}.controls{grid-template-columns:1fr}.brand h1{font-size:21px}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar" id="topbar" hidden>
    <div class="brand">
      <img src="/admin/admin-icon-192.png" alt="" width="48" height="48">
      <div>
        <h1>DAR Admin</h1>
        <p><span class="status-dot"></span>Command Center</p>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn back-btn" id="adminBackBtn" type="button">← Zurück</button>
      <button class="btn primary" id="refreshBtn" type="button">Aktualisieren</button>
      <button class="btn danger" id="logoutBtn" type="button">Abmelden</button>
    </div>
  </header>
  <main class="panel" id="panel"></main>
</div>
<div class="toast" id="toast"></div>
<script>
window.DAR_ANALYTICS_CONFIG={
  supabaseUrl:"https://djyfkttjbdraynuxrzno.supabase.co",
  supabaseKey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqeWZrdHRqYmRyYXludXhyem5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjE1MTUsImV4cCI6MjA5NjQzNzUxNX0.PUzkuxpJVWeW64nSAVW61KqYDE5k1d4sAir2unXKjxw",
  adminPin:"Dawud26"
};
const SITE_ORIGIN=(location.origin&&location.origin.startsWith("http"))?location.origin:"https://dar-al-tawhid.de";
const AUTH_KEY="darStatsAuthV1";
const AUTH_TTL_MS=90*24*60*60*1000;
const GITHUB_TOKEN_KEY="darAdminGithubTokenV1";
const GITHUB_NEW_POST="https://github.com/Sero91ak/dar-al-tawhid-site/new/main/content/posts";
const GITHUB_POSTS="https://github.com/Sero91ak/dar-al-tawhid-site/tree/main/content/posts";
const GITHUB_TOKEN_URL="https://github.com/settings/personal-access-tokens/new?name=DAR%20Admin%20Upload&description=Upload%20posts%20from%20DAR%20Admin%20App&expires_in=90&contents=write";
let refreshTimer=null,authed=false,lastData=null,currentTab="start",adminNavStack=[],query="",typeFilter="all",sortMode="score";
let draftMarkdown="",draftFilename="",draftStatus="",draftNextNumber=null,uploadBusy=false;

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function cfg(){return window.DAR_ANALYTICS_CONFIG||{}}
function hasSupabase(){const c=cfg();return !!(String(c.supabaseUrl||"").trim()&&String(c.supabaseKey||"").trim())}
function headers(){const key=String(cfg().supabaseKey||"").trim();return{apikey:key,Authorization:"Bearer "+key}}
function readAuth(){try{const raw=localStorage.getItem(AUTH_KEY);if(!raw)return false;const data=JSON.parse(raw);if(!data||!data.ok)return false;if(Date.now()-Number(data.ts||0)>AUTH_TTL_MS){localStorage.removeItem(AUTH_KEY);return false}return true}catch(e){return false}}
function setAuth(on){authed=!!on;try{if(on)localStorage.setItem(AUTH_KEY,JSON.stringify({ok:true,ts:Date.now()}));else localStorage.removeItem(AUTH_KEY)}catch(e){}}
function checkPin(pin){const want=String(cfg().adminPin||"").trim();const got=String(pin||"").trim();return want&&got.toLowerCase()===want.toLowerCase()}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1800)}
function savedGithubToken(){try{return localStorage.getItem(GITHUB_TOKEN_KEY)||""}catch(e){return""}}
function setSavedGithubToken(token){try{if(token)localStorage.setItem(GITHUB_TOKEN_KEY,token);else localStorage.removeItem(GITHUB_TOKEN_KEY)}catch(e){}}
async function fetchDashboard(){
  if(!hasSupabase())throw new Error("Supabase nicht konfiguriert");
  const url=String(cfg().supabaseUrl||"").replace(/\/$/,"");
  const h=headers();
  const [liveRes,totalsRes]=await Promise.all([
    fetch(url+"/rest/v1/rpc/analytics_live",{headers:h,cache:"no-store"}),
    fetch(url+"/rest/v1/stats_totals?select=content_type,content_id,content_title,views,shares,saves&order=views.desc&limit=300",{headers:h,cache:"no-store"})
  ]);
  if(!liveRes.ok)throw new Error("Live-Statistik Fehler "+liveRes.status);
  if(!totalsRes.ok)throw new Error("Beitrags-Statistik Fehler "+totalsRes.status);
  return{live:await liveRes.json()||{},totals:await totalsRes.json()||[],updated:new Date()};
}
function typeLabel(t){return t==="post"?"Beitrag":t==="dua"?"Duʿāʾ":t==="install"?"Installation":"Seite"}
function cleanTitle(t){return String(t||"").replace(/^[\s\p{Extended_Pictographic}📖🤲📚🕌🗓️]+/u,"").trim()||"Ohne Titel"}
function contentUrl(row){if(row.content_type==="post")return SITE_ORIGIN+"/#post/"+encodeURIComponent(row.content_id);if(row.content_type==="dua")return SITE_ORIGIN+"/#dua/"+encodeURIComponent(row.content_id);return SITE_ORIGIN}
function score(row){return Number(row.views||0)+Number(row.shares||0)*4+Number(row.saves||0)*3}
function engagement(row){const v=Number(row.views||0);return v?Math.round(((Number(row.shares||0)+Number(row.saves||0))/v)*100):0}
function totals(){return (lastData?.totals||[]).filter(x=>x.content_type==="post"||x.content_type==="dua")}
function installTotals(){
  const rows=(lastData?.totals||[]).filter(x=>x.content_type==="install");
  const count=id=>Number(rows.find(x=>String(x.content_id)===id)?.views||0);
  const ios=count("ios"),android=count("android"),other=count("other");
  return{ios,android,other,total:ios+android+other};
}
function sortedRows(rows){
  const list=[...rows];
  const sorter={
    score:(a,b)=>score(b)-score(a),
    views:(a,b)=>Number(b.views||0)-Number(a.views||0),
    shares:(a,b)=>Number(b.shares||0)-Number(a.shares||0),
    saves:(a,b)=>Number(b.saves||0)-Number(a.saves||0),
    title:(a,b)=>cleanTitle(a.content_title||a.content_id).localeCompare(cleanTitle(b.content_title||b.content_id),"de")
  }[sortMode]||((a,b)=>score(b)-score(a));
  return list.sort(sorter);
}
function filteredRows(){
  const q=query.trim().toLowerCase();
  return sortedRows(totals().filter(row=>{
    if(typeFilter!=="all"&&row.content_type!==typeFilter)return false;
    if(!q)return true;
    return [row.content_title,row.content_id,row.content_type].join(" ").toLowerCase().includes(q);
  }));
}
function metric(label,value,note,cls=""){return `<div class="metric ${cls}"><b>${esc(label)}</b><span>${esc(value)}</span><small>${esc(note)}</small></div>`}
function rankCard(row,idx,mode="score"){
  const views=Number(row.views||0),shares=Number(row.shares||0),saves=Number(row.saves||0);
  const title=cleanTitle(row.content_title||row.content_id);
  const href=contentUrl(row);
  const main=mode==="views"?views:mode==="shares"?shares:mode==="saves"?saves:score(row);
  return `<button class="rank-card" data-href="${esc(href)}" type="button">
    <span class="rank-num">${idx+1}</span>
    <span>
      <h4 class="rank-title">${esc(title)}</h4>
      <span class="rank-meta">
        <span class="tag">${esc(typeLabel(row.content_type))}</span>
        <span class="tag green">${views} gelesen</span>
        <span class="tag blue">${shares} geteilt</span>
        <span class="tag">${saves} gespeichert</span>
        <span class="tag">${engagement(row)}% Reaktion</span>
      </span>
    </span>
    <strong class="score">${main}</strong>
  </button>`;
}
function bindRankCards(){document.querySelectorAll(".rank-card[data-href]").forEach(card=>{card.onclick=()=>window.open(card.getAttribute("data-href"),"_blank","noopener")})}
function frontmatterValue(text,key){const m=String(text||"").match(new RegExp("^"+key+":\\s*[\"']?(.*?)[\"']?\\s*$","m"));return m?m[1].trim():""}
function slugify(value){return String(value||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,70)||"beitrag"}
function maxPostNumber(files){let max=0;(files||[]).forEach(file=>{const name=typeof file==="string"?file:file.name;for(const m of String(name||"").matchAll(/(?:^|-)(\d{3})(?=-|\.md$)/g)){max=Math.max(max,Number(m[1]))}});return max}
function suggestFilename(markdown,nextNumber){const title=frontmatterValue(markdown,"title").replace(/^📖\s*/,"")||"neuer Beitrag";const category=frontmatterValue(markdown,"category")||"beitrag";return `${slugify(category)}-${String(nextNumber).padStart(3,"0")}-${slugify(title)}.md`}
function utf8ToBase64(text){const bytes=new TextEncoder().encode(text);let bin="";for(let i=0;i<bytes.length;i+=0x8000){bin+=String.fromCharCode(...bytes.slice(i,i+0x8000))}return btoa(bin)}
function base64ToUtf8(value){const bin=atob(String(value||"").replace(/\s/g,""));const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder().decode(bytes)}
async function githubContent(path,token){const res=await fetch(`https://api.github.com/repos/Sero91ak/dar-al-tawhid-site/contents/${path}?ref=main`,{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});if(res.status===404)return null;if(!res.ok)throw new Error("GitHub Fehler "+res.status);return res.json()}
async function githubPut(path,content,message,token,sha){const body={message,content:utf8ToBase64(content),branch:"main"};if(sha)body.sha=sha;const res=await fetch(`https://api.github.com/repos/Sero91ak/dar-al-tawhid-site/contents/${path}`,{method:"PUT",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.message||("GitHub Upload Fehler "+res.status));return data}
async function loadPostsIndexForUpload(token){
  if(token){const file=await githubContent("content/posts/posts-index.json",token);if(file?.content)return{data:JSON.parse(base64ToUtf8(file.content)),sha:file.sha}}
  const res=await fetch(`https://raw.githubusercontent.com/Sero91ak/dar-al-tawhid-site/main/content/posts/posts-index.json?t=${Date.now()}`,{cache:"no-store"});
  if(!res.ok)throw new Error("posts-index.json konnte nicht geladen werden");
  return{data:await res.json(),sha:""};
}
function normalizeMarkdownForUpload(markdown,nextNumber){
  let out=String(markdown||"").trim();
  if(!out)return out;
  const iso=new Date().toISOString().replace(/\.\d{3}Z$/,".000Z");
  if(/^date:\s*["']?.*?["']?\s*$/m.test(out))out=out.replace(/^date:\s*["']?.*?["']?\s*$/m,`date: "${iso}"`);
  const id=frontmatterValue(out,"id");
  if(id){
    const next=String(nextNumber).padStart(3,"0");
    const updated=/-\d{3}$/.test(id)?id.replace(/-\d{3}$/,`-${next}`):`${id}-${next}`;
    out=out.replace(/^id:\s*["']?.*?["']?\s*$/m,`id: "${updated}"`);
  }
  return out+"\n";
}

function renderShell(){
  const data=lastData||{live:{},totals:[],updated:new Date()};
  const live=data.live||{},rows=totals();
  const posts=rows.filter(x=>x.content_type==="post"),duas=rows.filter(x=>x.content_type==="dua");
  const installs=installTotals();
  const views=rows.reduce((n,r)=>n+Number(r.views||0),0),shares=rows.reduce((n,r)=>n+Number(r.shares||0),0),saves=rows.reduce((n,r)=>n+Number(r.saves||0),0);
  const top=sortedRows(rows).slice(0,5), topViews=sortedRows(rows).sort((a,b)=>Number(b.views||0)-Number(a.views||0)).slice(0,5);
  const topShares=sortedRows(rows).sort((a,b)=>Number(b.shares||0)-Number(a.shares||0)).slice(0,5);
  const ctx={live,rows,posts,duas,views,shares,saves,top,topViews,topShares,installs,updated:data.updated};
  const body=currentTab==="overview"?renderOverview(ctx):currentTab==="content"?renderContent():currentTab==="actions"?renderActions(rows,installs):renderStart(ctx);
  document.getElementById("panel").innerHTML=`
    <nav class="tabs">
      ${tabButton("start","Start")}
      ${tabButton("overview","Dashboard")}
      ${tabButton("content","Inhalte")}
      ${tabButton("actions","Aktionen")}
    </nav>
    ${body}
    <div class="meta-line">Aktualisiert: ${esc(data.updated.toLocaleString("de-DE"))} · Auto-Refresh alle 30 Sekunden</div>`;
  bindUi();
  updateAdminBackButton();
}
function tabButton(id,label){return `<button class="tab ${currentTab===id?"active":""}" data-tab="${esc(id)}" type="button">${esc(label)}</button>`}
function navigateAdmin(tab,{skipStack=false}={}){
  if(!tab||tab===currentTab)return;
  if(!skipStack)adminNavStack.push(currentTab);
  currentTab=tab;
  renderShell();
  window.scrollTo({top:0,behavior:"smooth"});
}
function adminBack(){
  const prev=adminNavStack.pop();
  if(prev){currentTab=prev}else if(currentTab!=="start"){currentTab="start"}else{return}
  renderShell();
  window.scrollTo({top:0,behavior:"smooth"});
}
function updateAdminBackButton(){
  const btn=document.getElementById("adminBackBtn");
  if(!btn)return;
  const canGoBack=currentTab!=="start"||adminNavStack.length>0;
  btn.classList.toggle("show",canGoBack);
  btn.disabled=!canGoBack;
}

  const sort=document.getElementById("sortMode");if(sort)sort.onchange=e=>{sortMode=e.target.value;renderShell()};
  const clear=document.getElementById("clearFilters");if(clear)clear.onclick=()=>{query="";typeFilter="all";sortMode="score";renderShell()};
  const postMarkdownInput=document.getElementById("postMarkdownInput");if(postMarkdownInput)postMarkdownInput.oninput=e=>{draftMarkdown=e.target.value};
  const postFilenameInput=document.getElementById("postFilenameInput");if(postFilenameInput)postFilenameInput.oninput=e=>{draftFilename=e.target.value.trim()};
  const nextNumberBtn=document.getElementById("nextNumberBtn");if(nextNumberBtn)nextNumberBtn.onclick=prepareNextPostNumber;
  const uploadPostBtn=document.getElementById("uploadPostBtn");if(uploadPostBtn)uploadPostBtn.onclick=uploadPostToGithub;
  const forgetGithubTokenBtn=document.getElementById("forgetGithubTokenBtn");if(forgetGithubTokenBtn)forgetGithubTokenBtn.onclick=()=>{setSavedGithubToken("");const input=document.getElementById("githubTokenInput");if(input)input.value="";const remember=document.getElementById("rememberGithubToken");if(remember)remember.checked=false;setUploadStatus("Token wurde von diesem Gerät gelöscht.")};
  bindRankCards();
}
function setUploadStatus(html){draftStatus=html;const el=document.getElementById("uploadStatus");if(el)el.innerHTML=html}
async function prepareNextPostNumber(){
  try{
    draftMarkdown=document.getElementById("postMarkdownInput")?.value||draftMarkdown;
    setUploadStatus("Prüfe aktuelle Nummer...");
    const index=await loadPostsIndexForUpload("");
    draftNextNumber=maxPostNumber(index.data.files)+1;
    draftFilename=suggestFilename(draftMarkdown,draftNextNumber);
    const input=document.getElementById("postFilenameInput");if(input)input.value=draftFilename;
    setUploadStatus(`Nächste Nummer: <strong>${draftNextNumber}</strong><br>Dateiname vorgeschlagen: <strong>${esc(draftFilename)}</strong>`);
  }catch(e){setUploadStatus(`Fehler: ${esc(e.message||e)}`)}
}
async function uploadPostToGithub(){
  if(uploadBusy)return;
  const token=(document.getElementById("githubTokenInput")?.value||"").trim();
  const remember=!!document.getElementById("rememberGithubToken")?.checked;
  draftMarkdown=document.getElementById("postMarkdownInput")?.value||"";
  draftFilename=(document.getElementById("postFilenameInput")?.value||"").trim();
  if(!token){setUploadStatus("Bitte GitHub Token einfügen.");return}
  if(remember)setSavedGithubToken(token);else setSavedGithubToken("");
  if(!draftMarkdown.trim()){setUploadStatus("Bitte Markdown-Beitrag einfügen.");return}
  try{
    uploadBusy=true;setUploadStatus("Prüfe aktuelle Nummer und GitHub-Dateien...");
    const indexFile=await loadPostsIndexForUpload(token);
    const next=maxPostNumber(indexFile.data.files)+1;
    if(!draftFilename)draftFilename=suggestFilename(draftMarkdown,next);
    else if(/(?:^|-)\d{3}(?=-|\.md$)/.test(draftFilename))draftFilename=draftFilename.replace(/(^|-)\d{3}(?=-|\.md$)/,`$1${String(next).padStart(3,"0")}`);
    if(!/^[a-z0-9][a-z0-9-]*\.md$/i.test(draftFilename)){setUploadStatus("Dateiname muss eine .md-Datei ohne Leerzeichen sein.");return}
    const filenameInput=document.getElementById("postFilenameInput");if(filenameInput)filenameInput.value=draftFilename;
    const markdown=normalizeMarkdownForUpload(draftMarkdown,next);
    const path=`content/posts/${draftFilename}`;
    const existing=await githubContent(path,token);
    if(existing)throw new Error("Diese Datei existiert schon: "+draftFilename);
    setUploadStatus("Lade Beitrag hoch...");
    const created=await githubPut(path,markdown,`Add post ${draftFilename}`,token);
    const files=Array.isArray(indexFile.data.files)?indexFile.data.files.filter(f=>f&&f.name!==draftFilename):[];
    files.push({name:draftFilename,sha:created.content.sha});
    files.sort((a,b)=>String(a.name).localeCompare(String(b.name),"de"));
    const payload={version:1,generated:new Date().toISOString(),count:files.length,files};
    setUploadStatus("Aktualisiere posts-index.json...");
    await githubPut("content/posts/posts-index.json",JSON.stringify(payload,null,2)+"\n",`Update posts index for ${draftFilename}`,token,indexFile.sha);
    draftMarkdown=markdown;draftNextNumber=next;
    setUploadStatus(`Fertig hochgeladen: <strong>${esc(draftFilename)}</strong><br>Nächste Nummer war: <strong>${next}</strong>`);
    toast("Beitrag hochgeladen");
  }catch(e){
    setUploadStatus(`Fehler: ${esc(e.message||e)}<br>Wenn der Beitrag hochgeladen wurde, aber der Index nicht, bitte posts-index.json prüfen.`);
  }finally{
    uploadBusy=false;
    const btn=document.getElementById("uploadPostBtn");if(btn){btn.disabled=false;btn.textContent="Beitrag hochladen"}
  }
}
async function renderDashboard(){
  const panel=document.getElementById("panel");

  if(!hasSupabase()){panel.innerHTML=`<div class="empty">Supabase ist nicht konfiguriert.</div>`;return}
  try{lastData=await fetchDashboard();renderShell()}catch(e){panel.innerHTML=`<div class="empty">Statistik konnte nicht geladen werden (${esc(String(e.message||e))}).</div>`}
}

document.getElementById("logoutBtn").onclick=()=>{setAuth(false);lastData=null;renderApp()};
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&authed)renderDashboard()});
let adminSwipe=null;
document.addEventListener("touchstart",e=>{
  const t=e.touches&&e.touches[0];if(!t)return;
  const interactive=e.target.closest&&e.target.closest("input,textarea,select,button,a");
  if(interactive)return;
  adminSwipe={x:t.clientX,y:t.clientY,t:Date.now()};
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!adminSwipe)return;
  const t=e.changedTouches&&e.changedTouches[0];if(!t){adminSwipe=null;return}
  const dx=t.clientX-adminSwipe.x,dy=t.clientY-adminSwipe.y,dt=Date.now()-adminSwipe.t;
  adminSwipe=null;
  if(adminNavStack.length||currentTab!=="start"){
    if(dx>78&&Math.abs(dy)<55&&dt<650)adminBack();
  }
},{passive:true});
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/admin/sw.js",{scope:"/admin/"}).catch(()=>{})})}
authed=readAuth();
renderApp();
