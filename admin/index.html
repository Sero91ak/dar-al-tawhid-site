<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>DAR Admin · Command Center</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/admin/admin-icon-192.png">
<link rel="manifest" href="/admin/manifest.json">

<style>
:root{
  --bg:#05080f;--panel:#0a111c;--panel2:#101a29;--ink:#f7f0df;--soft:#d2c9b7;--muted:#8f99a7;
  --gold:#efd78e;--bronze:#b8954b;--green:#8fc7ff;--red:#ff9a90;--blue:#90c8ff;
  --line:rgba(140,190,255,.24);--line2:rgba(239,215,142,.14);--shadow:0 22px 70px rgba(0,0,0,.42);
  --serif:Georgia,"Times New Roman",serif;--sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box}
html{min-height:100%;background:var(--bg)}
body{margin:0;min-height:100dvh;color:var(--ink);font-family:var(--sans);letter-spacing:0;
  background:
    radial-gradient(circle at 8% -8%,rgba(90,140,220,.28),transparent 34%),
    radial-gradient(circle at 92% 0%,rgba(140,190,255,.18),transparent 30%),
    linear-gradient(180deg,#05080f 0%,#09111d 52%,#05080f 100%);
  padding:max(12px,var(--safe-top)) max(14px,env(safe-area-inset-right,0px)) max(18px,var(--safe-bottom)) max(14px,env(safe-area-inset-left,0px))}
button,input,select{font:inherit}
button{cursor:pointer}
.app{max-width:1180px;margin:0 auto}
.topbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:14px;align-items:center;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brand img{width:48px;height:48px;border-radius:14px;box-shadow:0 12px 28px rgba(0,0,0,.28),0 0 0 1px rgba(140,190,255,.22);flex:0 0 48px}
.brand h1{margin:0;font-family:var(--serif);font-size:23px;line-height:1.03;color:var(--gold)}
.brand p{margin:4px 0 0;color:var(--soft);font-size:12px;font-weight:800}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.toolbar .back-btn{display:none}
.toolbar .back-btn.show{display:inline-flex}
.btn,.chip{border:1px solid var(--line);background:rgba(90,140,220,.10);color:var(--ink);border-radius:12px;min-height:38px;padding:8px 12px;font-size:12px;font-weight:900;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.btn.primary{background:linear-gradient(135deg,rgba(239,215,142,.20),rgba(90,140,220,.10));border-color:rgba(239,215,142,.38)}
.btn.danger{color:#ffe0dc;border-color:rgba(225,125,115,.28);background:rgba(225,125,115,.08)}
.btn:active,.chip:active{transform:scale(.98)}
.panel{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(10,17,28,.94),rgba(5,8,15,.96));box-shadow:var(--shadow);padding:15px;overflow:hidden}
.login{max-width:420px;margin:42px auto 20px;text-align:center}
.login-logo{width:74px;height:74px;border-radius:20px;margin:0 auto 14px;display:block;box-shadow:0 16px 42px rgba(0,0,0,.34),0 0 34px rgba(90,140,220,.22)}
.login h2{margin:0 0 6px;font-family:var(--serif);font-size:28px;color:var(--gold)}
.login p{margin:0 0 18px;color:var(--soft);font-size:13px;line-height:1.5}
.login input{width:100%;margin-bottom:10px;padding:13px 14px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.32);color:var(--ink);font-size:15px}
.login button{width:100%;justify-content:center}
.hint{margin-top:14px;padding:12px;border:1px dashed var(--line);border-radius:14px;color:var(--soft);font-size:11px;line-height:1.55;text-align:left;background:rgba(90,140,220,.055)}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:999px;background:#8fc7ff;margin-right:6px;vertical-align:middle;box-shadow:0 0 18px rgba(140,190,255,.55)}
.admin-cover{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:20px;background:
  linear-gradient(135deg,rgba(4,8,16,.98),rgba(11,24,39,.96) 54%,rgba(5,9,18,.98)),
  radial-gradient(circle at 78% 12%,rgba(90,140,220,.24),transparent 34%),
  radial-gradient(circle at 12% 0%,rgba(239,215,142,.11),transparent 30%);
  box-shadow:var(--shadow);margin-bottom:12px;padding:24px;display:block}
.admin-cover:before{content:"";position:absolute;inset:18px;border:1px solid rgba(140,190,255,.13);border-radius:17px;pointer-events:none}
.admin-cover-text{position:relative;z-index:1;max-width:650px}
.admin-kicker{color:var(--gold);font-size:10.5px;font-weight:950;text-transform:uppercase;letter-spacing:.13em;margin-bottom:11px}
.admin-cover h2{font-family:var(--serif);font-size:clamp(30px,5vw,42px);line-height:1;margin:0;color:#fff4cc;overflow-wrap:normal}
.admin-cover p{color:var(--soft);font-size:12.5px;line-height:1.55;margin:12px 0 0;max-width:560px;text-wrap:pretty}
.cover-actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px;max-width:520px}
.cover-actions .btn,.cover-actions .signal{min-width:0}
.folder-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:12px}
.folder-card{border:1px solid var(--line);border-radius:14px;background:linear-gradient(145deg,rgba(12,24,39,.90),rgba(8,10,9,.94));padding:10px;color:var(--ink);text-align:left;min-height:74px;box-shadow:0 10px 24px rgba(0,0,0,.18)}
.folder-card:hover{border-color:rgba(140,190,255,.52)}
.folder-icon{display:none}
.folder-card h3{font-family:var(--serif);font-size:18px;line-height:1.05;color:var(--gold);margin:0 0 7px}
.folder-card p{display:none}
.folder-card small{display:block;color:var(--muted);font-size:9.5px;font-weight:900;margin-top:0;text-transform:uppercase;line-height:1.25}
.hero{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:12px;margin-bottom:12px}
.hero-card{border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,rgba(13,25,40,.94),rgba(7,9,10,.96));padding:16px;min-height:170px}
.hero-title{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:18px}
.hero-title h2{margin:0;font-family:var(--serif);font-size:clamp(24px,4vw,38px);line-height:1.02;color:#fff4cc}
.hero-title p{margin:6px 0 0;color:var(--soft);font-size:12px;line-height:1.45;max-width:560px}
.signal{border:1px solid rgba(140,190,255,.34);border-radius:999px;padding:6px 10px;color:#eef6ff;background:rgba(90,140,220,.12);font-size:11px;font-weight:950;white-space:nowrap}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.metric{border:1px solid var(--line2);border-radius:15px;padding:12px;background:linear-gradient(145deg,rgba(90,140,220,.075),rgba(239,215,142,.035));min-height:84px}
.metric b,.mini b,.quick b{display:block;color:var(--muted);font-size:10px;font-weight:950;text-transform:uppercase;margin-bottom:7px}
.metric span{display:block;color:var(--gold);font-size:clamp(22px,4vw,34px);font-weight:950;line-height:1.02}
.metric small,.mini small,.quick small{display:block;color:var(--soft);font-size:10.5px;line-height:1.35;margin-top:5px}
.mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.mini,.quick{border:1px solid var(--line2);border-radius:15px;padding:12px;background:rgba(0,0,0,.20);min-height:76px}
.mini span{font-size:22px;color:#fff1bf;font-weight:950}
.quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.quick{display:block;text-decoration:none;color:var(--ink);text-align:left;width:100%;font:inherit;cursor:pointer}
.quick:is(button){appearance:none;-webkit-appearance:none}
.quick:hover{border-color:rgba(140,190,255,.42)}
.command-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}
.command-card{border:1px solid var(--line2);border-radius:16px;background:linear-gradient(145deg,rgba(90,140,220,.08),rgba(239,215,142,.035));padding:12px;min-height:94px}
.command-card b{display:block;color:var(--gold);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.command-card span{display:block;color:#fff5cf;font-size:18px;font-weight:950;line-height:1.15}
.command-card small{display:block;color:var(--soft);font-size:10.5px;line-height:1.4;margin-top:6px}
.workflow-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin:12px 0}
.workflow-step{border:1px solid var(--line2);border-radius:15px;background:rgba(0,0,0,.18);padding:11px;min-height:82px;position:relative}
.workflow-step:before{content:"";display:block;width:9px;height:9px;border-radius:999px;background:var(--muted);box-shadow:0 0 18px rgba(140,190,255,.14);margin-bottom:8px}
.workflow-step.ready:before{background:var(--gold);box-shadow:0 0 18px rgba(239,215,142,.42)}
.workflow-step b{display:block;color:#fff4cc;font-size:12px;line-height:1.18}
.workflow-step small{display:block;color:var(--soft);font-size:10px;line-height:1.35;margin-top:6px}
.status-list{display:grid;gap:8px}
.status-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;border:1px solid var(--line2);border-radius:14px;background:rgba(0,0,0,.18);padding:10px}
.status-row b{color:#fff4cc;font-size:12px}
.status-row span{color:var(--soft);font-size:11px;line-height:1.35}
.status-pill{border:1px solid rgba(239,215,142,.24);border-radius:999px;background:rgba(239,215,142,.08);color:var(--gold)!important;padding:5px 8px;font-size:10px!important;font-weight:950;white-space:nowrap}
.preview-box{border:1px solid var(--line);border-radius:18px;background:linear-gradient(180deg,rgba(9,18,31,.96),rgba(4,7,13,.96));padding:14px;margin-top:12px;display:grid;gap:10px}
.preview-frame{border:1px solid rgba(239,215,142,.18);border-radius:16px;background:radial-gradient(circle at 20% 0%,rgba(239,215,142,.09),transparent 36%),linear-gradient(180deg,rgba(18,16,12,.96),rgba(7,7,5,.96));padding:15px;min-height:180px}
.preview-frame h4{font-family:var(--serif);color:var(--gold);font-size:24px;line-height:1.1;margin:0 0 8px}
.preview-frame p{color:var(--soft);font-size:12px;line-height:1.55;margin:0 0 8px}
.preview-frame blockquote{margin:10px 0;border-left:3px solid rgba(239,215,142,.46);padding:8px 0 8px 12px;color:#fff7df;font-family:var(--serif);font-size:17px;line-height:1.55}
.preview-tools{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.change-log{display:grid;gap:8px}
.change-item{border:1px solid var(--line2);border-radius:14px;background:rgba(90,140,220,.055);padding:10px}
.change-item b{display:block;color:#fff4cc;font-size:12px}
.change-item span{display:block;color:var(--soft);font-size:10.5px;line-height:1.45;margin-top:4px}
.push-test-card{grid-column:1/-1;cursor:default}
.push-test-controls{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;margin-top:10px}
.push-test-controls .field{min-height:36px;font-size:11px}
.push-test-controls .btn{min-height:36px;justify-content:center}
.tabs{display:flex;gap:8px;overflow:auto;padding:2px;margin:2px 0 12px}
.tab{white-space:nowrap;border:1px solid var(--line2);background:rgba(90,140,220,.07);color:var(--soft);border-radius:999px;padding:9px 13px;font-size:12px;font-weight:950}
.tab.active{color:#fff4cc;border-color:rgba(239,215,142,.40);background:linear-gradient(135deg,rgba(239,215,142,.13),rgba(90,140,220,.12))}
.controls{display:grid;grid-template-columns:minmax(220px,1fr) 150px 150px auto;gap:9px;margin-bottom:12px}
.field{width:100%;min-height:40px;border:1px solid var(--line2);border-radius:12px;background:rgba(0,0,0,.24);color:var(--ink);padding:9px 11px}
.upload-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(220px,.45fr);gap:10px;margin-top:12px}
.paste-area{width:100%;min-height:280px;resize:vertical;border:1px solid var(--line2);border-radius:14px;background:rgba(0,0,0,.26);color:var(--ink);padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px;line-height:1.55}
.upload-stack{display:grid;gap:9px;align-content:start}
.upload-status{border:1px dashed var(--line);border-radius:14px;padding:11px;color:var(--soft);font-size:11px;line-height:1.5;background:rgba(90,140,220,.055)}
.upload-status strong{color:var(--gold)}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin:0 0 10px}
.section-head h3{margin:0;font-family:var(--serif);font-size:22px;color:var(--gold)}
.section-head span{color:var(--muted);font-size:11px;font-weight:850;white-space:nowrap}
.rank-list{display:grid;gap:9px}
.rank-card{display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:12px;align-items:center;border:1px solid var(--line2);border-radius:15px;padding:11px;background:linear-gradient(145deg,rgba(12,24,39,.90),rgba(6,8,10,.94));text-align:left;color:inherit;width:100%}
.rank-num{display:grid;place-items:center;width:38px;height:38px;border-radius:12px;background:rgba(239,215,142,.10);border:1px solid rgba(239,215,142,.20);color:var(--gold);font-weight:950}
.rank-title{margin:0;font-family:var(--serif);font-size:17px;line-height:1.25;color:#fff7db;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rank-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.tag{border:1px solid rgba(239,215,142,.16);border-radius:999px;padding:4px 8px;color:var(--soft);background:rgba(239,215,142,.045);font-size:10.5px;font-weight:900;white-space:nowrap}
.tag.green{color:#dff0ff;border-color:rgba(140,190,255,.26);background:rgba(90,140,220,.09)}
.tag.blue{color:#f7e6b5;border-color:rgba(239,215,142,.22);background:rgba(239,215,142,.06)}
.score{font-size:22px;font-weight:950;color:var(--gold);min-width:42px;text-align:right}
.split{display:grid;grid-template-columns:minmax(0,1fr) 330px;gap:12px}
.side-stack{display:grid;gap:12px}
.empty{padding:18px;border:1px dashed var(--line);border-radius:14px;color:var(--soft);text-align:center;font-size:13px;line-height:1.55}
.meta-line{color:var(--muted);font-size:11px;line-height:1.45;text-align:center;margin-top:12px}
.toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%);background:#0b1421;color:#eef6ff;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-size:12px;font-weight:900;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.22s}
.toast.show{opacity:1}
@media(max-width:950px){.hero,.split,.upload-grid{grid-template-columns:1fr}.metric-grid,.command-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.workflow-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.controls{grid-template-columns:1fr 1fr}.controls .btn{justify-content:center}}
@media(max-width:640px){body{padding-left:10px;padding-right:10px}.topbar{grid-template-columns:1fr}.toolbar{justify-content:stretch}.toolbar .btn{flex:1;justify-content:center}.toolbar .back-btn.show{flex:0 0 100%}.panel{padding:11px;border-radius:16px}.admin-cover{padding:21px 19px}.admin-cover:before{inset:11px;border-radius:16px}.admin-cover-text{padding:2px 3px}.admin-kicker{font-size:9px;letter-spacing:.10em;margin-bottom:9px;line-height:1.35}.admin-cover h2{font-size:29px;line-height:1.02}.admin-cover p{font-size:11.8px;line-height:1.48;margin-top:11px}.cover-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-width:none}.cover-actions .btn,.cover-actions .signal{min-height:36px;font-size:10.8px;justify-content:center;padding:8px 10px}.cover-actions .btn:last-child{grid-column:1/-1}.folder-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}.folder-card{min-height:68px;padding:9px 7px}.folder-card h3{font-size:clamp(13px,3.4vw,16px);overflow-wrap:normal}.folder-card small{font-size:8px}.hero-card{padding:13px}.hero-title{display:block}.signal{display:inline-flex;margin-top:10px}.mini-grid{grid-template-columns:1fr}.quick-grid,.preview-tools{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.command-grid{grid-template-columns:1fr}.workflow-grid{grid-template-columns:1fr}.quick{min-height:118px;padding:10px}.quick b{font-size:9.2px}.quick small{font-size:9.8px}.push-test-card{min-height:auto}.push-test-controls{grid-template-columns:1fr}.rank-card{grid-template-columns:34px minmax(0,1fr);align-items:start}.score{grid-column:2;text-align:left;font-size:18px}.controls{grid-template-columns:1fr}.brand h1{font-size:21px}}
</style>
</head>

<div class="app">
  <header class="topbar" id="topbar" hidden>
    <div class="brand">
      <img src="/admin/admin-icon-192.png" alt="" width="48" height="48">
      <div>

<script>
window.DAR_ANALYTICS_CONFIG={
  supabaseUrl:"https://djyfkttjbdraynuxrzno.supabase.co",
  supabaseKey:"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqeWZrdHRqYmRyYXludXhyem5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4NjE1MTUsImV4cCI6MjA5NjQzNzUxNX0.PUzkuxpJVWeW64nSAVW61KqYDE5k1d4sAir2unXKjxw",
  adminPin:"Dawud26"
};
const SITE_ORIGIN=(location.origin&&location.origin.startsWith("http"))?location.origin:"https://dar-al-tawhid.de";
const AUTH_KEY="darStatsAuthV1";
const AUTH_TTL_MS=90*24*60*60*1000;
const GITHUB_TOKEN_KEY="darAdminGithubTokenV1";
const ADMIN_DRAFT_KEY="darAdminDraftV1";
const ADMIN_LOG_KEY="darAdminChangeLogV1";
const GITHUB_NEW_POST="https://github.com/Sero91ak/dar-al-tawhid-site/new/main/content/posts";

let refreshTimer=null,authed=false,lastData=null,currentTab="start",adminNavStack=[],query="",typeFilter="all",sortMode="score";
let draftMarkdown="",draftFilename="",draftStatus="",draftNextNumber=null,uploadBusy=false;

function esc(s){return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function cfg(){return window.DAR_ANALYTICS_CONFIG||{}}
function hasSupabase(){const c=cfg();return !!(String(c.supabaseUrl||"").trim()&&String(c.supabaseKey||"").trim())}
function headers(){const key=String(cfg().supabaseKey||"").trim();return{apikey:key,Authorization:"Bearer "+key}}
function readAuth(){try{const raw=localStorage.getItem(AUTH_KEY);if(!raw)return false;const data=JSON.parse(raw);if(!data||!data.ok)return false;if(Date.now()-Number(data.ts||0)>AUTH_TTL_MS){localStorage.removeItem(AUTH_KEY);return false}return true}catch(e){return false}}
function setAuth(on){authed=!!on;try{if(on)localStorage.setItem(AUTH_KEY,JSON.stringify({ok:true,ts:Date.now()}));else localStorage.removeItem(AUTH_KEY)}catch(e){}}
function checkPin(pin){const want=String(cfg().adminPin||"").trim();const got=String(pin||"").trim();return want&&got.toLowerCase()===want.toLowerCase()}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1800)}

async function fetchDashboard(){
  if(!hasSupabase())throw new Error("Supabase nicht konfiguriert");
  const url=String(cfg().supabaseUrl||"").replace(/\/$/,"");
  const h=headers();
  const [liveRes,totalsRes]=await Promise.all([
    fetch(url+"/rest/v1/rpc/analytics_live",{headers:h,cache:"no-store"}),
    fetch(url+"/rest/v1/stats_totals?select=content_type,content_id,content_title,views,shares,saves&order=views.desc&limit=300",{headers:h,cache:"no-store"})
  ]);
  if(!liveRes.ok)throw new Error("Live-Statistik Fehler "+liveRes.status);
  if(!totalsRes.ok)throw new Error("Beitrags-Statistik Fehler "+totalsRes.status);
  return{live:await liveRes.json()||{},totals:await totalsRes.json()||[],updated:new Date()};
}
function typeLabel(t){return t==="post"?"Beitrag":t==="dua"?"Duʿāʾ":t==="install"?"Installation":"Seite"}
function cleanTitle(t){return String(t||"").replace(/^[\s\p{Extended_Pictographic}📖🤲📚🕌🗓️]+/u,"").trim()||"Ohne Titel"}
function contentUrl(row){if(row.content_type==="post")return SITE_ORIGIN+"/#post/"+encodeURIComponent(row.content_id);if(row.content_type==="dua")return SITE_ORIGIN+"/#dua/"+encodeURIComponent(row.content_id);return SITE_ORIGIN}
function score(row){return Number(row.views||0)+Number(row.shares||0)*4+Number(row.saves||0)*3}
function engagement(row){const v=Number(row.views||0);return v?Math.round(((Number(row.shares||0)+Number(row.saves||0))/v)*100):0}
function countBy(rows,fn){return (rows||[]).reduce((acc,row)=>{const key=fn(row);acc[key]=(acc[key]||0)+1;return acc},{})}
function totals(){return (lastData?.totals||[]).filter(x=>x.content_type==="post"||x.content_type==="dua")}
function installTotals(){
  const rows=(lastData?.totals||[]).filter(x=>x.content_type==="install");
  const count=id=>Number(rows.find(x=>String(x.content_id)===id)?.views||0);
  const ios=count("ios"),android=count("android"),other=count("other");
  return{ios,android,other,total:ios+android+other};
}
function sortedRows(rows){
  const list=[...rows];
  const sorter={
    score:(a,b)=>score(b)-score(a),
    views:(a,b)=>Number(b.views||0)-Number(a.views||0),
    shares:(a,b)=>Number(b.shares||0)-Number(a.shares||0),
    saves:(a,b)=>Number(b.saves||0)-Number(a.saves||0),
    title:(a,b)=>cleanTitle(a.content_title||a.content_id).localeCompare(cleanTitle(b.content_title||b.content_id),"de")
  }[sortMode]||((a,b)=>score(b)-score(a));
  return list.sort(sorter);
}
function filteredRows(){

function frontmatterValue(text,key){const m=String(text||"").match(new RegExp("^"+key+":\\s*[\"']?(.*?)[\"']?\\s*$","m"));return m?m[1].trim():""}
function slugify(value){return String(value||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"").slice(0,70)||"beitrag"}
function maxPostNumber(files){let max=0;(files||[]).forEach(file=>{const name=typeof file==="string"?file:file.name;for(const m of String(name||"").matchAll(/(?:^|-)(\d{3})(?=-|\.md$)/g)){max=Math.max(max,Number(m[1]))}});return max}
function suggestFilename(markdown,nextNumber){const title=frontmatterValue(markdown,"title").replace(/^📖\s*/,"")||"neuer Beitrag";const category=frontmatterValue(markdown,"category")||"beitrag";return `${slugify(category)}-${String(nextNumber).padStart(3,"0")}-${slugify(title)}.md`}
function utf8ToBase64(text){const bytes=new TextEncoder().encode(text);let bin="";for(let i=0;i<bytes.length;i+=0x8000){bin+=String.fromCharCode(...bytes.slice(i,i+0x8000))}return btoa(bin)}
function base64ToUtf8(value){const bin=atob(String(value||"").replace(/\s/g,""));const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new TextDecoder().decode(bytes)}
async function githubContent(path,token){const res=await fetch(`https://api.github.com/repos/Sero91ak/dar-al-tawhid-site/contents/${path}?ref=main`,{headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json"}});if(res.status===404)return null;if(!res.ok)throw new Error("GitHub Fehler "+res.status);return res.json()}
async function githubPut(path,content,message,token,sha){const body={message,content:utf8ToBase64(content),branch:"main"};if(sha)body.sha=sha;const res=await fetch(`https://api.github.com/repos/Sero91ak/dar-al-tawhid-site/contents/${path}`,{method:"PUT",headers:{Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});const data=await res.json().catch(()=>({}));if(!res.ok)throw new Error(data.message||("GitHub Upload Fehler "+res.status));return data}
async function loadPostsIndexForUpload(token){
  if(token){const file=await githubContent("content/posts/posts-index.json",token);if(file?.content)return{data:JSON.parse(base64ToUtf8(file.content)),sha:file.sha}}
  const res=await fetch(`https://raw.githubusercontent.com/Sero91ak/dar-al-tawhid-site/main/content/posts/posts-index.json?t=${Date.now()}`,{cache:"no-store"});
  if(!res.ok)throw new Error("posts-index.json konnte nicht geladen werden");
  return{data:await res.json(),sha:""};
}
function normalizeMarkdownForUpload(markdown,nextNumber){
  let out=String(markdown||"").trim();
  if(!out)return out;
  const iso=new Date().toISOString().replace(/\.\d{3}Z$/,".000Z");
  if(/^date:\s*["']?.*?["']?\s*$/m.test(out))out=out.replace(/^date:\s*["']?.*?["']?\s*$/m,`date: "${iso}"`);
  const id=frontmatterValue(out,"id");
  if(id){
    const next=String(nextNumber).padStart(3,"0");
    const updated=/-\d{3}$/.test(id)?id.replace(/-\d{3}$/,`-${next}`):`${id}-${next}`;
    out=out.replace(/^id:\s*["']?.*?["']?\s*$/m,`id: "${updated}"`);
  }
  return out+"\n";
}

function markdownPreviewData(markdown){
  const text=String(markdown||"");
  const title=frontmatterValue(text,"title").replace(/^📖\s*/,"")||"Noch kein Titel";
  const category=frontmatterValue(text,"category")||"Kategorie fehlt";
  const scholar=frontmatterValue(text,"scholar")||frontmatterValue(text,"gelehrter")||"Gelehrter offen";
  const book=frontmatterValue(text,"book")||frontmatterValue(text,"werk")||"Werk offen";
  const source=frontmatterValue(text,"source")||frontmatterValue(text,"quelle")||"Quelle prüfen";
  const body=text.replace(/^---[\s\S]*?---/,"").trim();
  const quote=(body.match(/>+\s*(.+)/)||body.match(/(?:quote|aussage):\s*[\"']?(.+?)[\"']?\s*$/mi)||[])[1]||body.split(/\n\s*\n/).find(Boolean)||"Markdown einfügen, dann erscheint hier die Vorschau.";
  return{title,category,scholar,book,source,quote:String(quote).replace(/^#+\s*/,"").trim().slice(0,420)};
}

        <a class="quick" href="${GITHUB_POSTS}" target="_blank" rel="noopener"><b>Posts-Ordner</b><small>Alle Markdown-Beiträge und Index-Datei prüfen.</small></a>
        <a class="quick" href="${SITE_ORIGIN}/#recent" target="_blank" rel="noopener"><b>Neueste Beiträge</b><small>Live-Seite direkt bei den neuen Beiträgen öffnen.</small></a>
        <a class="quick" href="${SITE_ORIGIN}/" target="_blank" rel="noopener"><b>Besucher-App</b><small>Startseite in neuem Fenster öffnen.</small></a>
        <div class="quick push-test-card"><b>Test-Push nur dieses Gerät</b><small>Wähle ein Gebet. Die Benachrichtigung bleibt lokal auf diesem Admin-Gerät.</small><div class="push-test-controls"><select class="field" id="adminPushPrayerSelect" aria-label="Gebet für Test-Push"><option value="Fajr">Fajr</option><option value="Dhuhr">Dhuhr</option><option value="ʿAṣr">ʿAṣr</option><option value="Maghrib">Maghrib</option><option value="ʿIshāʾ" selected>ʿIshāʾ</option><option value="Taḥajjud">Taḥajjud</option></select><button class="btn primary" id="adminLocalPushTestBtn" type="button">Senden</button></div></div>
      </div>
      <div class="upload-status" id="adminPushTestStatus" style="margin-top:10px">Test-Push nutzt nur dieses Gerät und keinen Massenversand.</div>
      <div class="section-head" style="margin-top:16px"><h3>Veröffentlichungsablauf</h3><span>Kontrolle vor live</span></div>
      ${workflowSteps(draftMarkdown.trim()?"review":"draft")}
      <div class="section-head" style="margin-top:16px"><h3>Beitrag direkt hochladen</h3><span>GitHub API</span></div>
      <div class="upload-grid">
        <textarea class="paste-area" id="postMarkdownInput" spellcheck="false" placeholder="GitHub-Markdown hier einfügen...">${esc(draftMarkdown)}</textarea>
        <div class="upload-stack">
          <button class="btn primary" id="previewDraftBtn" type="button">Vorschau öffnen</button>
          <button class="btn" id="nextNumberBtn" type="button">Aktuelle Nummer holen</button>
          <input class="field" id="postFilenameInput" value="${esc(draftFilename)}" placeholder="dateiname-351-titel.md">
          <input class="field" id="githubTokenInput" type="password" autocomplete="off" value="${esc(savedGithubToken())}" placeholder="GitHub Token">
          <label class="upload-status" style="display:flex;align-items:center;gap:8px">
            <input id="rememberGithubToken" type="checkbox" ${savedGithubToken()?"checked":""}>
            <span>Token auf diesem Gerät merken</span>
          </label>
          <a class="btn" href="${GITHUB_TOKEN_URL}" target="_blank" rel="noopener">Token erstellen</a>
          <button class="btn" id="forgetGithubTokenBtn" type="button">Token löschen</button>
          <button class="btn primary" id="uploadPostBtn" type="button" ${uploadBusy?"disabled":""}>${uploadBusy?"Wird veröffentlicht...":"Online veröffentlichen"}</button>
          <div class="upload-status" id="uploadStatus">${draftStatus||"Wenn du den Token merkst, bleibt er nur lokal auf diesem Gerät gespeichert. Die App erstellt die Markdown-Datei und aktualisiert posts-index.json automatisch."}</div>
        </div>
      </div>
      ${renderDraftPreview()}
    </div>
    <aside class="side-stack">
      <div class="panel">
        <div class="section-head"><h3>Heute wichtig</h3><span>Hinweis</span></div>
        ${best?`<div class="empty">Stärkster Inhalt aktuell:<br><strong>${esc(cleanTitle(best.content_title||best.content_id))}</strong><br>Score ${score(best)} · ${Number(best.views||0)} Aufrufe</div>`:`<div class="empty">Noch keine Statistikdaten vorhanden.</div>`}
      </div>
      <div class="panel">
        <div class="section-head"><h3>App-Status</h3><span>PWA</span></div>
        <div class="empty">Besucher-App Installationen: <strong>${installs.total}</strong><br>iOS: <strong>${installs.ios}</strong> · Android: <strong>${installs.android}</strong><br><br>Admin-App bleibt getrennt unter <strong>/admin/</strong>.</div>
      </div>
      <div class="panel">
        <div class="section-head"><h3>Änderungsprotokoll</h3><span>lokal</span></div>
        <div class="change-log">${renderChangeLog()}</div>
      </div>
    </aside>
  </section>`;
}
function renderStats(ctx){
  const categories=countBy(ctx.rows,r=>r.content_type||"page");
  return `<section class="split">
    <div class="panel">
      <div class="section-head"><h3>Statistik</h3><span>Heute / Live / Inhalte</span></div>
      <div class="command-grid">
        <div class="command-card"><b>Live</b><span>${Number(ctx.live.live_now||0)}</span><small>Aktuell online</small></div>
        <div class="command-card"><b>Heute</b><span>${Number(ctx.live.today_views||0)}</span><small>Seiten- und Inhaltsaufrufe</small></div>
        <div class="command-card"><b>Favoriten</b><span>${Number(ctx.live.today_saves||0)}</span><small>heute gespeichert</small></div>
        <div class="command-card"><b>Shares</b><span>${Number(ctx.live.today_shares||0)}</span><small>heute geteilt</small></div>
      </div>
      <div class="section-head"><h3>Beliebte Bereiche</h3><span>anonym</span></div>
      <div class="status-list">${Object.entries(categories).map(([k,v])=>`<div class="status-row"><span><b>${esc(typeLabel(k))}</b><br>${v} erfasste Einträge</span><strong class="status-pill">${v}</strong></div>`).join("")}</div>
    </div>
    <aside class="side-stack">
      <div class="panel"><div class="section-head"><h3>Top Favoriten</h3><span>gespeichert</span></div><div class="rank-list">${sortedRows(ctx.rows).sort((a,b)=>Number(b.saves||0)-Number(a.saves||0)).slice(0,5).map((r,i)=>rankCard(r,i,"saves")).join("")||`<div class="empty">Noch keine Favoriten.</div>`}</div></div>
      <div class="panel"><div class="section-head"><h3>Technik-Signale</h3><span>Status</span></div>${renderTechStatus(ctx)}</div>
    </aside>
  </section>`;
}
function renderSettings(ctx){
  return `<section class="split">
    <div class="panel">
      <div class="section-head"><h3>Einstellungen & Technik</h3><span>interne Kontrolle</span></div>
      ${renderTechStatus(ctx)}
      <div class="section-head" style="margin-top:16px"><h3>Veröffentlichungsregeln</h3><span>Sicherheit</span></div>
      <div class="status-list">
        <div class="status-row"><span><b>Direkt live vermeiden</b><br>Vor jedem Upload erscheint eine bewusste Sicherheitsabfrage.</span><strong class="status-pill">Aktiv</strong></div>
        <div class="status-row"><span><b>Entwurf lokal speichern</b><br>Markdown und Dateiname bleiben auf diesem Admin-Gerät gespeichert.</span><strong class="status-pill">Aktiv</strong></div>
        <div class="status-row"><span><b>Datenschutz</b><br>Statistik nutzt aggregierte Inhalte und keine Werbeprofile.</span><strong class="status-pill">Schonend</strong></div>
      </div>
    </div>
    <aside class="side-stack">
      <div class="panel"><div class="section-head"><h3>Änderungsprotokoll</h3><span>letzte Aktionen</span></div><div class="change-log">${renderChangeLog()}</div></div>
      <div class="panel"><div class="section-head"><h3>Admin-App</h3><span>getrennt</span></div><div class="empty">Diese Steuerzentrale bleibt unter <strong>/admin/</strong> getrennt von der Besucher-App.</div></div>
    </aside>
  </section>`;
}
function renderTechStatus(ctx){
  const checks=[
    ["Supabase verbunden",hasSupabase(),"Live- und Statistikdaten abrufbar"],
    ["Daten geladen",!!lastData,`${ctx.updated?ctx.updated.toLocaleString("de-DE"):"Noch offen"}`],
    ["GitHub Token lokal",!!savedGithubToken(),"Nur auf diesem Admin-Gerät gespeichert"],
    ["Service Worker",!!("serviceWorker" in navigator),"Admin-PWA Registrierung möglich"],
    ["Browser Push",!!("Notification" in window),"Lokaler Admin-Test möglich"],
    ["PWA installierbar",!!("BeforeInstallPromptEvent" in window)||(typeof matchMedia==="function"&&matchMedia("(display-mode: standalone)").matches),"Browserabhängig"],
    ["posts-index Upload",true,"Wird vor Upload geprüft"],
    ["Sicherheitsabfrage",true,"Online veröffentlichen fragt bewusst nach"]
  ];
  return `<div class="status-list">${checks.map(([label,ok,note])=>`<div class="status-row"><span><b>${esc(label)}</b><br>${esc(note)}</span><strong class="status-pill">${ok?"OK":"Prüfen"}</strong></div>`).join("")}</div>`;
}
function bindUi(){
  document.querySelectorAll("[data-tab]").forEach(btn=>btn.onclick=()=>navigateAdmin(btn.dataset.tab));
  const search=document.getElementById("searchInput");if(search)search.oninput=e=>{query=e.target.value;renderShell()};
  const type=document.getElementById("typeFilter");if(type)type.onchange=e=>{typeFilter=e.target.value;renderShell()};
  const sort=document.getElementById("sortMode");if(sort)sort.onchange=e=>{sortMode=e.target.value;renderShell()};
  const clear=document.getElementById("clearFilters");if(clear)clear.onclick=()=>{query="";typeFilter="all";sortMode="score";renderShell()};
  const postMarkdownInput=document.getElementById("postMarkdownInput");if(postMarkdownInput)postMarkdownInput.oninput=e=>{draftMarkdown=e.target.value;updateDraftPreview()};
  const postFilenameInput=document.getElementById("postFilenameInput");if(postFilenameInput)postFilenameInput.oninput=e=>{draftFilename=e.target.value.trim();updateDraftPreview()};
  const previewDraftBtn=document.getElementById("previewDraftBtn");if(previewDraftBtn)previewDraftBtn.onclick=()=>{updateDraftPreview();document.getElementById("draftPreviewBox")?.scrollIntoView({behavior:"smooth",block:"start"})};
  const refreshPreviewBtn=document.getElementById("refreshPreviewBtn");if(refreshPreviewBtn)refreshPreviewBtn.onclick=()=>{updateDraftPreview();toast("Vorschau aktualisiert")};
  const saveDraftBtn=document.getElementById("saveDraftBtn");if(saveDraftBtn)saveDraftBtn.onclick=()=>{draftMarkdown=document.getElementById("postMarkdownInput")?.value||draftMarkdown;draftFilename=(document.getElementById("postFilenameInput")?.value||draftFilename).trim();saveLocalDraft()};
  const checkDraftBtn=document.getElementById("checkDraftBtn");if(checkDraftBtn)checkDraftBtn.onclick=()=>{addAdminLog("Prüfung","Änderungen geprüft",draftFilename||"Entwurf");setUploadStatus("Prüfung markiert. Bitte Vorschau, Quelle, Titel, Kategorie und Links kontrollieren.");renderShell()};
  const publishReadyBtn=document.getElementById("publishReadyBtn");if(publishReadyBtn)publishReadyBtn.onclick=()=>{addAdminLog("Bereit","Entwurf als bereit zur Veröffentlichung markiert",draftFilename||"Entwurf");setUploadStatus("Bereit zur Veröffentlichung markiert. Online sichtbar wird es erst nach bewusstem Upload.");renderShell()};
  const nextNumberBtn=document.getElementById("nextNumberBtn");if(nextNumberBtn)nextNumberBtn.onclick=prepareNextPostNumber;
  const uploadPostBtn=document.getElementById("uploadPostBtn");if(uploadPostBtn)uploadPostBtn.onclick=uploadPostToGithub;
  const localPushTestBtn=document.getElementById("adminLocalPushTestBtn");if(localPushTestBtn)localPushTestBtn.onclick=sendAdminLocalPushTest;
  const forgetGithubTokenBtn=document.getElementById("forgetGithubTokenBtn");if(forgetGithubTokenBtn)forgetGithubTokenBtn.onclick=()=>{setSavedGithubToken("");const input=document.getElementById("githubTokenInput");if(input)input.value="";const remember=document.getElementById("rememberGithubToken");if(remember)remember.checked=false;setUploadStatus("Token wurde von diesem Gerät gelöscht.")};
  bindRankCards();
}
function updateDraftPreview(){
  const box=document.getElementById("draftPreviewBox");
  if(!box)return;
  const fresh=renderDraftPreview();
  const tmp=document.createElement("div");
  tmp.innerHTML=fresh;
  box.replaceWith(tmp.firstElementChild);
  bindUi();
}
function setAdminPushTestStatus(text){const el=document.getElementById("adminPushTestStatus");if(el)el.textContent=text}
async function sendAdminLocalPushTest(){
  if(!("Notification" in window)){setAdminPushTestStatus("Dieses Gerät unterstützt keine Browser-Benachrichtigungen.");return}
  let permission=Notification.permission;
  if(permission!=="granted")permission=await Notification.requestPermission();
  if(permission!=="granted"){setAdminPushTestStatus("Benachrichtigungen wurden nicht erlaubt. Bitte in den Browser-/Geräte-Einstellungen erlauben.");return}
  const prayer=document.getElementById("adminPushPrayerSelect")?.value||"ʿIshāʾ";
  const title=`${prayer} ist eingetreten`;
  const body="Das Gebet zu seiner Zeit gehört zu den liebsten Taten bei Allah.";
  try{
    if("serviceWorker" in navigator){
      const reg=await navigator.serviceWorker.ready;
      await reg.showNotification(title,{body,tag:"admin-local-prayer-test",renotify:true,icon:"/notification-icon-192.png",badge:"/notification-badge-96.png",data:{url:"/admin/"}});
    }else{
      new Notification(title,{body,tag:"admin-local-prayer-test",icon:"/notification-icon-192.png"});
    }
    setAdminPushTestStatus(`Test-Push für ${prayer} wurde nur auf diesem Admin-Gerät ausgelöst.`);
  }catch(e){
    try{new Notification(title,{body,tag:"admin-local-prayer-test",icon:"/notification-icon-192.png"});setAdminPushTestStatus("Test-Push wurde lokal ausgelöst.");}
    catch(err){setAdminPushTestStatus("Test-Push konnte auf diesem Gerät nicht angezeigt werden.")}
  }
}
function setUploadStatus(html){draftStatus=html;const el=document.getElementById("uploadStatus");if(el)el.innerHTML=html}
async function prepareNextPostNumber(){
  try{
    draftMarkdown=document.getElementById("postMarkdownInput")?.value||draftMarkdown;
    setUploadStatus("Prüfe aktuelle Nummer...");
    const index=await loadPostsIndexForUpload("");
    draftNextNumber=maxPostNumber(index.data.files)+1;
    draftFilename=suggestFilename(draftMarkdown,draftNextNumber);
    const input=document.getElementById("postFilenameInput");if(input)input.value=draftFilename;
    setUploadStatus(`Nächste Nummer: <strong>${draftNextNumber}</strong><br>Dateiname vorgeschlagen: <strong>${esc(draftFilename)}</strong>`);
    addAdminLog("Prüfung","Nächste Beitragsnummer ermittelt",draftFilename);
  }catch(e){setUploadStatus(`Fehler: ${esc(e.message||e)}`)}
}
async function uploadPostToGithub(){
  if(uploadBusy)return;
  const token=(document.getElementById("githubTokenInput")?.value||"").trim();
  const remember=!!document.getElementById("rememberGithubToken")?.checked;
  draftMarkdown=document.getElementById("postMarkdownInput")?.value||"";
  draftFilename=(document.getElementById("postFilenameInput")?.value||"").trim();
  if(!token){setUploadStatus("Bitte GitHub Token einfügen.");return}
  if(remember)setSavedGithubToken(token);else setSavedGithubToken("");
  if(!draftMarkdown.trim()){setUploadStatus("Bitte Markdown-Beitrag einfügen.");return}
  const preview=markdownPreviewData(draftMarkdown);
  const ok=confirm(`Möchtest du diese Änderung wirklich veröffentlichen?\n\nDiese Änderung wird für Besucher sichtbar.\n\nTitel: ${preview.title}\nDatei: ${draftFilename||"wird automatisch erzeugt"}`);
  if(!ok){setUploadStatus("Veröffentlichung abgebrochen. Der Entwurf bleibt lokal vorbereitet.");addAdminLog("Abgebrochen","Veröffentlichung bewusst abgebrochen",draftFilename||preview.title);return}
  try{
    uploadBusy=true;setUploadStatus("Prüfe aktuelle Nummer und GitHub-Dateien...");
    const indexFile=await loadPostsIndexForUpload(token);
    const next=maxPostNumber(indexFile.data.files)+1;
    if(!draftFilename)draftFilename=suggestFilename(draftMarkdown,next);
    else if(/(?:^|-)\d{3}(?=-|\.md$)/.test(draftFilename))draftFilename=draftFilename.replace(/(^|-)\d{3}(?=-|\.md$)/,`$1${String(next).padStart(3,"0")}`);
    if(!/^[a-z0-9][a-z0-9-]*\.md$/i.test(draftFilename)){setUploadStatus("Dateiname muss eine .md-Datei ohne Leerzeichen sein.");return}
    const filenameInput=document.getElementById("postFilenameInput");if(filenameInput)filenameInput.value=draftFilename;
    const markdown=normalizeMarkdownForUpload(draftMarkdown,next);
    const path=`content/posts/${draftFilename}`;
    const existing=await githubContent(path,token);
    if(existing)throw new Error("Diese Datei existiert schon: "+draftFilename);
    setUploadStatus("Lade Beitrag hoch...");
    const created=await githubPut(path,markdown,`Add post ${draftFilename}`,token);
    const files=Array.isArray(indexFile.data.files)?indexFile.data.files.filter(f=>f&&f.name!==draftFilename):[];
    files.push({name:draftFilename,sha:created.content.sha});
    files.sort((a,b)=>String(a.name).localeCompare(String(b.name),"de"));
    const payload={version:1,generated:new Date().toISOString(),count:files.length,files};
    setUploadStatus("Aktualisiere posts-index.json...");
    await githubPut("content/posts/posts-index.json",JSON.stringify(payload,null,2)+"\n",`Update posts index for ${draftFilename}`,token,indexFile.sha);
    draftMarkdown=markdown;draftNextNumber=next;
    setUploadStatus(`Fertig hochgeladen: <strong>${esc(draftFilename)}</strong><br>Nächste Nummer war: <strong>${next}</strong>`);
    addAdminLog("Veröffentlicht","Beitrag online veröffentlicht",draftFilename);
    saveLocalDraft("Entwurf nach Veröffentlichung lokal aktualisiert.");
    toast("Beitrag hochgeladen");
  }catch(e){
    addAdminLog("Fehler",String(e.message||e),draftFilename||"Upload");
    setUploadStatus(`Fehler: ${esc(e.message||e)}<br>Wenn der Beitrag hochgeladen wurde, aber der Index nicht, bitte posts-index.json prüfen.`);
  }finally{
    uploadBusy=false;
    const btn=document.getElementById("uploadPostBtn");if(btn){btn.disabled=false;btn.textContent="Beitrag hochladen"}
  }
}
async function renderDashboard(){
  const panel=document.getElementById("panel");
  if(!lastData)panel.innerHTML=`<div class="empty">Statistik wird geladen...</div>`;
  if(!hasSupabase()){panel.innerHTML=`<div class="empty">Supabase ist nicht konfiguriert.</div>`;return}
  try{lastData=await fetchDashboard();renderShell()}catch(e){panel.innerHTML=`<div class="empty">Statistik konnte nicht geladen werden (${esc(String(e.message||e))}).</div>`}
}
function stopRefresh(){if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}}
function startRefresh(){stopRefresh();renderDashboard();refreshTimer=setInterval(renderDashboard,30000)}
function renderApp(){authed=readAuth()||authed;if(!authed){stopRefresh();renderLogin();return}document.getElementById("topbar").hidden=false;startRefresh()}
document.getElementById("refreshBtn").onclick=()=>renderDashboard();
document.getElementById("adminBackBtn").onclick=()=>adminBack();
document.getElementById("logoutBtn").onclick=()=>{setAuth(false);lastData=null;renderApp()};
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&authed)renderDashboard()});
let adminSwipe=null;
document.addEventListener("touchstart",e=>{
  const t=e.touches&&e.touches[0];if(!t)return;
  const interactive=e.target.closest&&e.target.closest("input,textarea,select,button,a");
  if(interactive)return;
  adminSwipe={x:t.clientX,y:t.clientY,t:Date.now()};
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!adminSwipe)return;
  const t=e.changedTouches&&e.changedTouches[0];if(!t){adminSwipe=null;return}
  const dx=t.clientX-adminSwipe.x,dy=t.clientY-adminSwipe.y,dt=Date.now()-adminSwipe.t;
  adminSwipe=null;
  if(adminNavStack.length||currentTab!=="start"){
    if(dx>78&&Math.abs(dy)<55&&dt<650)adminBack();
  }
},{passive:true});
if("serviceWorker" in navigator){window.addEventListener("load",()=>{navigator.serviceWorker.register("/admin/sw.js",{scope:"/admin/"}).catch(()=>{})})}
loadLocalDraft();
authed=readAuth();
renderApp();
</script>
</body>
