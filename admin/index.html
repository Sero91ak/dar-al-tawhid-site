<script>
(function(){
  var ADMIN_SW_CACHE="dar-admin-stats-v31";
  var MIG_KEY="darAdminSwFixV22";
  if(!location.pathname.startsWith("/admin"))return;
  function cleanCaches(){
    if(!("caches" in window))return Promise.resolve();
    return caches.keys().then(function(keys){
      return Promise.all(keys.filter(function(k){
        return (k.indexOf("dar-admin-stats-")===0&&k!==ADMIN_SW_CACHE)||k.indexOf("dar-al-tawhid-offline-light-")===0;
      }).map(function(k){return caches.delete(k)}));
    });
  }
  function dropVisitorWorkers(){
    if(!("serviceWorker" in navigator))return Promise.resolve();
    return navigator.serviceWorker.getRegistrations().then(function(regs){
      return Promise.all(regs.map(function(reg){
        var script=(reg.active&&reg.active.scriptURL)||(reg.waiting&&reg.waiting.scriptURL)||(reg.installing&&reg.installing.scriptURL)||"";
        if(script.indexOf("/admin/sw.js")!==-1)return Promise.resolve();
        return reg.unregister().catch(function(){});
      }));
    });
  }
  function registerAdmin(){
    if(!("serviceWorker" in navigator))return Promise.resolve();
    return navigator.serviceWorker.register("/admin/sw.js",{scope:"/admin/",updateViaCache:"none"});
  }
  window.__DAR_ADMIN_REPAIR__=function(){
    if(!("serviceWorker" in navigator))return cleanCaches().then(function(){location.replace("/admin/?repair=1")});
    return navigator.serviceWorker.getRegistrations().then(function(regs){
      return Promise.all(regs.map(function(reg){return reg.unregister().catch(function(){})}));
    }).then(cleanCaches).then(function(){
      try{localStorage.removeItem(MIG_KEY)}catch(e){}
      location.replace("/admin/?repair=1");
    });
  };
  if("serviceWorker" in navigator&&localStorage.getItem(MIG_KEY)!=="done"){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      if(!regs.length){localStorage.setItem(MIG_KEY,"done");return registerAdmin()}
      return Promise.all(regs.map(function(reg){return reg.unregister().catch(function(){})}))
        .then(cleanCaches)
        .then(function(){
          localStorage.setItem(MIG_KEY,"done");
          location.replace("/admin/?swfix=1");
        });
    }).catch(function(){localStorage.setItem(MIG_KEY,"done")});
    return;
  }
  dropVisitorWorkers().then(cleanCaches).then(registerAdmin).catch(function(){});
})();
</script>
<style>
:root{

button{cursor:pointer}

.login{max-width:420px;margin:42px auto 20px;text-align:center}

.login h2{margin:0 0 6px;font-family:var(--serif);font-size:28px;color:var(--gold)}
.login p{margin:0 0 18px;color:var(--soft);font-size:13px;line-height:1.5}

function newsItemExpiresAt(item){
  const expires=Date.parse(item?.expiresAt||"");
  if(Number.isFinite(expires))return expires;
  const created=Date.parse(item?.createdAt||item?.date||item?.publishedAt||"");
  if(!Number.isFinite(created))return null;
  const ttl=Number(item?.ttlHours||24);
  return created+ttl*60*60*1000;
}
function newsDurationHours(value){
  const v=String(value||"24 Stunden");
  if(v.includes("manuell"))return 720;
  if(v.includes("72"))return 72;
  return 24;
}
function newsDurationFromItem(item){
  if(!item)return "24 Stunden";
  if(Number(item.ttlHours||0)>=168||String(item.until||"").includes("manuell"))return "bis manuell deaktiviert";
  if(Number(item.ttlHours||24)===72)return "72 Stunden";
  return "24 Stunden";
}
function isNewsItemActive(item){
  if(!item||item.visible===false)return false;
  if(item.status==="removed"||item.status==="archived")return false;
  const exp=newsItemExpiresAt(item);
  return exp===null||exp>Date.now();
}
function newsItemStatus(item){
  if(!item)return "unbekannt";
  if(item.status==="removed"||item.status==="archived"||item.visible===false)return "gelöscht";
  const exp=newsItemExpiresAt(item);
  if(exp!==null&&exp<=Date.now())return "abgelaufen";
  return "live";
}
function newsStatusPill(status){
  const cls=status==="live"?"live":status==="abgelaufen"?"expired":"removed";

}
function truncateNewsText(text,max=110){
  const clean=String(text||"").replace(/\s+/g," ").trim();
  if(clean.length<=max)return clean;

}
function formatNewsUntil(item){
  const exp=newsItemExpiresAt(item);
  if(!exp)return String(item.until||item.ttlHours?`${item.ttlHours} Std.`:"24 Std.");
  const diff=exp-Date.now();
  if(diff<=0)return "abgelaufen";
  const hours=Math.ceil(diff/3600000);
  if(hours>=48)return `bis ${new Date(exp).toLocaleString("de-DE",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}`;
  return `noch ~${hours} Std.`;
}
async function fetchLiveNewsItems({force=false}={}){
  if(liveNewsLoading&&!force)return liveNewsItems;
  liveNewsLoading=true;
  try{
    const res=await fetch(`${SITE_ORIGIN}/content/updates/current.json?t=${Date.now()}`,{cache:"no-store"});
    if(!res.ok)throw new Error("Live-News konnten nicht geladen werden");
    const data=await res.json();
    const items=Array.isArray(data)?data:Array.isArray(data.items)?data.items:[];
    liveNewsAllItems=items.slice().sort((a,b)=>Date.parse(b.createdAt||0)-Date.parse(a.createdAt||0));
    liveNewsItems=liveNewsAllItems.filter(isNewsItemActive);
    liveNewsError="";
    liveNewsFetchedAt=new Date();
  }catch(e){
    liveNewsError=e.message||String(e);
  }finally{
    liveNewsLoading=false;
  }
  return liveNewsItems;
}

    const ordered=[];
    raw.map(normalizeAdminTab).forEach(id=>{
      if(!allowed.has(id)||seen.has(id))return;
      seen.add(id);
      ordered.push([id,allowed.get(id)]);

async function checkVisitorAppHealth(){

    fetch(`${SITE_ORIGIN}/?health=${Date.now()}`,{cache:"no-store"}),
    fetch(`${SITE_ORIGIN}/content/posts/posts-index.json?health=${Date.now()}`,{cache:"no-store"})
  ]);
  const shellOk=checks[0].status==="fulfilled"&&checks[0].value.ok;
  const indexOk=checks[1].status==="fulfilled"&&checks[1].value.ok;
  return{ok:shellOk&&indexOk,shellOk,indexOk,checkedAt:new Date().toISOString()};
}
function workerEndpoint(path){
  const url=new URL(resolveWorkerUrl(workerPublishUrl()));
  const clean=String(path||"").replace(/^\/+/,"");
  if(/^api\//i.test(clean)){
    url.pathname="/"+clean;
    return url.toString();
  }
  const legacyRootPaths=new Set(["news","schedule","run-scheduler","publish-news"]);
  const isLegacyPublishBase=url.pathname.endsWith("/publish")&&!url.pathname.endsWith("/api/admin/publish");
  const isAdminPublishBase=url.pathname.endsWith("/api/admin/publish");
  if(isAdminPublishBase){
    url.pathname=url.pathname.replace(/\/api\/admin\/publish$/,"/api/admin/"+clean);
  }else if(isLegacyPublishBase){
    const topSegment=clean.split("/")[0];
    if(!clean.includes("/")&&legacyRootPaths.has(topSegment)){
      url.pathname=url.pathname.replace(/\/publish$/,`/${clean}`);
    }else{
      url.pathname="/api/admin/"+clean;
    }
  }else{
    url.pathname=`/${clean}`;
  }
  return url.toString();
}

function sortedRows(rows){
  const list=[...rows];
  const sorter={
    score:(a,b)=>score(b)-score(a),
    views:(a,b)=>Number(b.views||0)-Number(a.views||0),
    shares:(a,b)=>Number(b.shares||0)-Number(a.shares||0),
    saves:(a,b)=>Number(b.saves||0)-Number(a.saves||0),
    title:(a,b)=>cleanTitle(a.content_title||a.content_id).localeCompare(cleanTitle(b.content_title||b.content_id),"de")
  }[sortMode]||((a,b)=>score(b)-score(a));
  return list.sort(sorter);
}

function enhanceAdminCollapsibles(){
  document.querySelectorAll("#panel .panel,#panel .hero-card,#panel .preview-box").forEach((card,index)=>{
    if(card.dataset.collapseReady==="1")return;
    const head=card.querySelector(":scope > .section-head");
    if(!head)return;
    const children=[...card.children].filter(child=>child!==head);
    if(!children.length)return;
    const body=document.createElement("div");
    body.className="admin-collapsible-body";
    children.forEach(child=>body.appendChild(child));
    const toggle=document.createElement("button");
    toggle.className="admin-collapse-toggle";
    toggle.type="button";
    toggle.setAttribute("aria-label","Bereich einklappen");
    toggle.textContent="−";
    head.appendChild(toggle);
    card.classList.add("admin-collapsible","is-open");
    card.dataset.collapseReady="1";
    card.appendChild(body);
    const setOpen=open=>{
      card.classList.toggle("is-open",open);
      card.classList.toggle("is-collapsed",!open);
      toggle.textContent=open?"−":"+";
      toggle.setAttribute("aria-label",open?"Bereich einklappen":"Bereich öffnen");
    };
    if(index>2&&currentTab!=="actions"&&currentTab!=="start")setOpen(false);
    head.addEventListener("click",event=>{
      if(event.target.closest("a,button,input,select,textarea,label,[contenteditable='true']"))return;
      setOpen(!card.classList.contains("is-open"));
    });
    toggle.onclick=event=>{
      event.preventDefault();
      event.stopPropagation();
      setOpen(!card.classList.contains("is-open"));
    };
  });
}
function sanitizeMarkdownQuotes(value){return String(value||"").replace(/\uFEFF/g,"").replace(/[\u201C\u201D\u201E\u201F\u2033\u2036]/g,'"').replace(/[\u2018\u2019\u201A\u201B\u2032\u2035]/g,"'").replace(/\u2e3b/g,"---")}

function frontmatterValue(text,key){const m=String(text||"").match(new RegExp("^"+key+":\\s*(.*)$","m"));return m?stripYamlQuotes(m[1]):""}

function maxPostNumber(files){let max=0;(files||[]).forEach(file=>{const name=typeof file==="string"?file:file.name;for(const m of String(name||"").matchAll(/(?:^|-)(\d{3})(?=-|\.md$)/g)){max=Math.max(max,Number(m[1]))}});return max}
function nextPostNumber(files){return (Array.isArray(files)?files.filter(f=>f&&(f.name||typeof f==="string")):[]).length+1}
function mergePostsIndexFiles(...lists){const map=new Map();lists.flat().filter(Boolean).forEach(file=>{const name=String(file.name||file||"").trim();if(!name||!name.endsWith(".md"))return;const sha=String(file.sha||"");const prev=map.get(name);if(!prev||sha)map.set(name,{name,sha:sha||prev?.sha||""})});return Array.from(map.values()).sort((a,b)=>a.name.localeCompare(b.name,"de"))}

async function resolveNextPostNumberInfo(){

      const data=await res.json().catch(()=>({}));
      if(res.ok&&data.ok!==false&&Number(data.nextNumber)>0)workerInfo=data;
    }catch(e){}
  }
  const files=await fetchPostsIndexFiles();
  if(!files.length&&!workerInfo)throw new Error("posts-index.json konnte nicht geladen werden");
  const postCount=Math.max(files.length,Number(workerInfo?.postCount||0));

  return{postCount,nextNumber,maxSerial:maxPostNumber(files),lastFilename:sorted.length?sorted[sorted.length-1].name:"",source:workerInfo?"worker+index":"index",workerPostCount:workerInfo?.postCount||null};

function repairMarkdownStructure(markdown){
  let out=sanitizeMarkdownQuotes(String(markdown||"").trim());
  if(!out)return "";
  out=out.replace(/^\s*[\u2e3b\u2014-]{1,3}\s*$/gm,"---");
  if(/^---\s*\n[\s\S]*?\n---\s*\n?/.test(out))return out;
  if(/^---\s*\n[\s\S]*?\n---/.test(out))return out.replace(/\n---\s*$/m,"\n---\n");
  const sepMatch=out.match(/^(?:---|[\u2e3b\u2014-]{1,3})\s*\n([\s\S]*?)\n(?:---|[\u2e3b\u2014-]{1,3})\s*\n?([\s\S]*)$/);
  if(sepMatch)return `---\n${sepMatch[1].trim()}\n---\n\n${(sepMatch[2]||"").trim()}`;
  if(/^id:\s/m.test(out)||/^title:\s/m.test(out)){
    const bodySplit=out.search(/\n\n(?=[^\s:#-])/);
    if(bodySplit>0){
      const head=out.slice(0,bodySplit).trim();
      const body=out.slice(bodySplit).trim();
      if(/^id:\s/m.test(head))return `---\n${head}\n---\n\n${body}`;
    }
  }
  return out;
}
function normalizeMarkdownForUpload(markdown,nextNumber){
  let out=repairMarkdownStructure(markdown);
  if(!out)return out;
  const iso=new Date().toISOString().replace(/\.\d{3}Z$/,".000Z");
  if(/^date:\s*.*$/m.test(out))out=out.replace(/^date:\s*.*$/m,`date: "${iso}"`);
  let id=stripYamlQuotes(frontmatterValue(out,"id"));
  const next=String(nextNumber).padStart(3,"0");
  if(id){
    id=stripYamlQuotes(id.replace(/-\d{3}$/,`-${next}`).replace(/["“”]+/g,""));
    if(!/-\d{3}$/.test(id))id=`${slugify(id)||"beitrag"}-${next}`;
    out=out.replace(/^id:\s*.*$/m,`id: "${id}"`);
  }
  return out.endsWith("\n")?out:out+"\n";
}

function isBulkZipEntryIgnored(path){
  const p=String(path||"").replace(/\\/g,"/");
  if(!p||p.endsWith("/")||/(^|\/)(__MACOSX|\.)/.test(p)||/^\._/.test(p.split("/").pop()||""))return true;
  const base=(p.split("/").pop()||"").toLowerCase();
  return /prufbericht|prüfbericht|readme|report|kontrolle|checklist|inhalt(?:sverzeichnis)?|index\.md$/.test(base);
}
function isBulkMarkdownExcluded(markdown,sourcePath){
  const md=String(markdown||"").trim();
  const base=String(sourcePath||"").split("/").pop()||"";
  if(!md||md.length<20)return "zu kurz";
  if(/prufbericht|prüfbericht|readme|report|kontrolle|checklist|inhalt(?:sverzeichnis)?/i.test(base))return "Hilfsdatei im Dateinamen";
  if(/nicht\s+zum\s+Hochladen/i.test(md))return "interner Hinweis (nicht zum Hochladen)";
  if(/^#\s*Prüfbericht/m.test(md)||/^#\s*Prufbericht/m.test(md))return "Prüfbericht, kein Beitrag";
  if(/Dieser Bericht ist\s+\*\*nicht zum Hochladen\*\*/i.test(md))return "Prüfbericht, kein Beitrag";
  const title=frontmatterValue(md,"title").replace(/^📖\s*/,"").trim();
  if(!title){
    if(/^#\s+/.test(md)&&!/^(#\s+📖|#\s+Beitrag)/.test(md))return "kein Titel/Frontmatter";
    if(/^category:\s/m.test(md)&&!/^title:\s/m.test(md)&&/^#\s+/.test(md))return "kein title:-Feld";
  }
  return "";
}
function filterBulkMarkdownPosts(items){
  const kept=[],skipped=[];
  (items||[]).forEach(item=>{
    const md=typeof item==="string"?item:item.markdown;
    const path=typeof item==="string"?"":item.path||"";
    const reason=isBulkMarkdownExcluded(md,path);
    if(reason)skipped.push({path:path||"(Markdown)",reason});
    else kept.push(md);
  });
  return {posts:kept,skipped};
}
function splitBulkMarkdownPosts(raw){
  const text=String(raw||"").trim();
  if(!text)return [];
  if(/\n\s*===+\s*\n/.test(text)){
    return text.split(/\n\s*===+\s*\n/).map(s=>s.trim()).filter(s=>s.length>20);
  }
  const chunks=[];
  let pos=0;
  while(pos<text.length){
    const start=text.indexOf("---",pos);
    if(start<0)break;
    const fmClose=text.indexOf("\n---",start+3);
    if(fmClose<0){chunks.push(text.slice(start).trim());break}
    let next=fmClose+4;
    while(next<text.length){
      const candidate=text.indexOf("\n---\n",next);
      if(candidate<0)break;
      const peek=text.slice(candidate+5,candidate+120);
      if(/^[a-zA-Z][\w-]*\s*:/m.test(peek)){
        chunks.push(text.slice(start,candidate+1).trim());
        pos=candidate+1;
        next=-1;
        break;
      }
      next=candidate+4;
    }
    if(next!==-1){chunks.push(text.slice(start).trim());break}
  }
  if(!chunks.length)return [text];
  return chunks.filter(c=>c.length>20);
}
function splitBulkMarkdownPostsForPublish(raw){
  return filterBulkMarkdownPosts(splitBulkMarkdownPosts(raw).map(md=>({markdown:md}))).posts;
}
function applyBulkCategoryToMarkdown(markdown,category){
  const cat=String(category||"").trim();
  if(!cat)return String(markdown||"").trim();
  let out=String(markdown||"").trim();
  const safe=cat.replace(/\\/g,"\\\\").replace(/"/g,'\\"');
  if(/^category:\s/m.test(out))return out.replace(/^category:\s*["']?.*?["']?\s*$/m,`category: "${safe}"`);
  if(/^---\s*\n/.test(out))return out.replace(/^---\s*\n/,`---\ncategory: "${safe}"\n`);
  return `---\ncategory: "${safe}"\n---\n\n${out}`;
}

let jsZipPromise=null;
function loadJsZip(){

    script.src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js";

async function importBulkZipFile(file){
  if(!file)throw new Error("Keine Datei gewählt");
  if(!/\.zip$/i.test(file.name))throw new Error("Bitte eine .zip-Datei wählen.");
  setBulkPackStatus(`Lese ZIP <strong>${esc(file.name)}</strong> …`);
  const JSZip=await loadJsZip();
  const zip=await JSZip.loadAsync(await file.arrayBuffer());
  const entries=[];
  zip.forEach((relPath,entry)=>{
    if(isBulkZipEntryIgnored(relPath))return;
    if(!/\.md$/i.test(relPath))return;
    entries.push({path:relPath.replace(/\\/g,"/"),entry});
  });
  if(!entries.length)throw new Error("In der ZIP wurden keine .md-Dateien gefunden.");
  entries.sort((a,b)=>a.path.localeCompare(b.path,"de"));
  const texts=await Promise.all(entries.map(({entry})=>entry.async("string")));
  const loaded=entries.map((e,i)=>({path:e.path,markdown:String(texts[i]||"").trim()})).filter(x=>x.markdown.length>20);
  const filtered=filterBulkMarkdownPosts(loaded);
  if(!filtered.posts.length)throw new Error(filtered.skipped.length?"Alle .md-Dateien wurden als Hilfsdateien/Prüfberichte erkannt – keine Beiträge zum Veröffentlichen.":"Die Markdown-Dateien in der ZIP sind leer oder zu kurz.");
  const combined=filtered.posts.join("\n\n===\n\n");
  const area=document.getElementById("bulkPackMarkdownInput");
  if(area)area.value=combined;
  const catInput=document.getElementById("bulkCategoryInput");
  if(catInput&&!catInput.value.trim()){
    const guess=String(file.name||"").replace(/\.zip$/i,"").replace(/[_-]+/g," ").trim();
    if(/takfir|umum|ʿumūm|umum/i.test(guess))catInput.value="Takfīr bi'l-ʿUmūm";
    else if(guess)catInput.value=guess.slice(0,80);
  }
  const n=filtered.posts.length;
  const label=document.getElementById("bulkPackCountLabel");if(label)label.textContent=n?`${n} Beiträge erkannt`:"";
  const list=document.getElementById("bulkZipFileList");
  const shown=loaded.slice(0,12).map(e=>{
    const skip=filtered.skipped.find(s=>s.path===e.path);
    return skip?`<span style="opacity:.55">${esc(e.path)} · übersprungen (${esc(skip.reason)})</span>`:esc(e.path);
  }).join("<br>")+(loaded.length>12?`<br>… +${loaded.length-12} weitere`:"");
  if(list)list.innerHTML=shown;
  const nameLabel=document.getElementById("bulkZipFileName");if(nameLabel)nameLabel.textContent=file.name;
  const skipNote=filtered.skipped.length?`<br><span style="color:var(--gold)">${filtered.skipped.length} Hilfsdatei(en) übersprungen (z. B. Prüfbericht/readme).</span>`:"";
  setBulkPackStatus(`ZIP geladen: <strong>${n}</strong> Beiträge aus <strong>${entries.length}</strong> .md-Dateien.${skipNote} Bitte Kategorie prüfen, dann „Beiträge zählen“ oder direkt veröffentlichen.`);
  addAdminLog("ZIP",`${n} Beiträge aus ${file.name} geladen${filtered.skipped.length?` · ${filtered.skipped.length} übersprungen`:""}`,entries[0]?.path||file.name);
  toast(`${n} Beiträge aus ZIP geladen`);
  document.getElementById("bulkPackMarkdownInput")?.scrollIntoView({behavior:"smooth",block:"center"});
}

async function fetchPostsIndexFiles(){const bust=Date.now();const urls=[`${SITE_ORIGIN}/content/posts/posts-index.json?v=${bust}`,`https://raw.githubusercontent.com/Sero91ak/dar-al-tawhid-site/main/content/posts/posts-index.json?v=${bust}`];const lists=await Promise.all(urls.map(async url=>{try{const r=await fetch(url,{cache:"no-store"});if(!r.ok)return[];const data=await r.json();return Array.isArray(data?.files)?data.files:[]}catch(e){return[]}}));return mergePostsIndexFiles(...lists)}
async function discoverLiveCategories(){
  const files=await fetchPostsIndexFiles();
  const counts={};
  for(let i=0;i<files.length;i+=12){
    const batch=files.slice(i,i+12);
    await Promise.all(batch.map(async file=>{
      const name=file.name||file;if(!name)return;
      const urls=[`${SITE_ORIGIN}/content/posts/${encodeURIComponent(name)}?v=${encodeURIComponent(file.sha||Date.now())}`,`https://raw.githubusercontent.com/Sero91ak/dar-al-tawhid-site/main/content/posts/${encodeURIComponent(name)}?v=${encodeURIComponent(file.sha||Date.now())}`];
      for(const url of urls){try{const r=await fetch(url,{cache:"no-store"});if(!r.ok)continue;const head=(await r.text()).slice(0,900);const cat=parseCategoryFromMarkdownHead(head);if(cat){counts[cat]=(counts[cat]||0)+1;break}}catch(e){}}
    }));
  }
  return counts;
}
async function fetchLiveCategoryLayout(){

}
function mergeCategoryLayout(live,counts){
  const order=[...(live?.order||[])];
  Object.keys(counts||{}).forEach(cat=>{if(!order.some(x=>categoryKeyAdmin(x)===categoryKeyAdmin(cat)))order.push(cat)});
  const main=(live?.main||DEFAULT_CATEGORY_MAIN).filter(cat=>order.some(x=>categoryKeyAdmin(x)===categoryKeyAdmin(cat)));

}
async function ensureCategoryLayoutDraft(force){

async function ensureOrdnerCatalog(force){
  if(ordnerCatalogLoaded&&!force)return ordnerCatalog;
  ordnerCatalogBusy=true;
  try{
    const files=await fetchPostsIndexFiles();
    const catalog=[];
    for(let i=0;i<files.length;i+=10){
      const batch=files.slice(i,i+10);
      await Promise.all(batch.map(async file=>{
        const name=file.name||file;if(!name||!String(name).endsWith(".md"))return;
        const urls=[`${SITE_ORIGIN}/content/posts/${encodeURIComponent(name)}?v=${encodeURIComponent(file.sha||Date.now())}`,`https://raw.githubusercontent.com/Sero91ak/dar-al-tawhid-site/main/content/posts/${encodeURIComponent(name)}?v=${encodeURIComponent(file.sha||Date.now())}`];
        for(const url of urls){try{const r=await fetch(url,{cache:"no-store"});if(!r.ok)continue;const head=(await r.text()).slice(0,1200);catalog.push({filename:name,title:parseTitleFromMarkdownHead(head)||name.replace(/\.md$/,""),category:parseCategoryFromMarkdownHead(head)||"Beiträge",id:parseIdFromMarkdownHead(head)||name.replace(/\.md$/,""),date:(head.match(/^date:\s*["']?(.*?)["']?\s*$/m)||[])[1]||""});break}catch(e){}}
      }));
    }
    ordnerCatalog=catalog.sort((a,b)=>(b.date||"").localeCompare(a.date||"")||a.title.localeCompare(b.title,"de"));
    ordnerCatalogLoaded=true;
    return ordnerCatalog;
  }finally{ordnerCatalogBusy=false}
}
async function ensureOrdnerData(force){
  if(!force&&ordnerCatalogLoaded&&categoryLayoutLoaded)return;
  ordnerBusy=true;
  try{await Promise.all([ensureCategoryLayoutDraft(force),ensureOrdnerCatalog(force)])}finally{ordnerBusy=false}
}
function moveCategoryInDraft(name,dir){
  const key=categoryKeyAdmin(name);
  const order=[...(categoryLayoutDraft.order||[])];
  const i=order.findIndex(x=>categoryKeyAdmin(x)===key);
  if(i<0)return;
  const j=i+(dir<0?-1:1);
  if(j<0||j>=order.length)return;
  const tmp=order[i];order[i]=order[j];order[j]=tmp;
  categoryLayoutDraft={...categoryLayoutDraft,order};
}
function toggleCategoryMainDraft(name){
  const key=categoryKeyAdmin(name);
  let main=[...(categoryLayoutDraft.main||[])];
  const has=main.some(x=>categoryKeyAdmin(x)===key);
  if(has)main=main.filter(x=>categoryKeyAdmin(x)!==key);
  else main.push(name);
  categoryLayoutDraft={...categoryLayoutDraft,main};
}

async function loadAdminJummahPushStatus(){
  const boxes=[document.getElementById("adminJummahPushStatus"),document.getElementById("adminJummahPushStatusActions")].filter(Boolean);
  const notes=[document.getElementById("adminJummahPushNote"),document.getElementById("adminJummahPushNoteActions")].filter(Boolean);
  if(!boxes.length)return;
  boxes.forEach(box=>{box.innerHTML=`<div class="empty">Status wird geladen…</div>`});
  try{
    const data=await workerGetRequest("api/jummah/status");
    const html=renderJummahPushStatusBox(data);
    boxes.forEach(box=>{box.innerHTML=html});
    notes.forEach(note=>{if(note)note.textContent=data.ok?"Jumuʿah-Scheduler erreichbar.":"Jumuʿah-Status mit Hinweis geladen."});
  }catch(e){
    const err=`<div class="status-row"><span><b>Fehler</b><br>${esc(e.message||String(e))}</span><strong class="status-pill">Fehler</strong></div>`;
    boxes.forEach(box=>{box.innerHTML=err});
    notes.forEach(note=>{if(note)note.textContent="Jumuʿah-Status konnte nicht geladen werden."});
  }
}
async function runAdminJummahScheduler({live=false}={}){
  const btns=[document.getElementById("adminJummahRunBtn"),document.getElementById("adminJummahRunBtnActions")].filter(Boolean);
  const liveBtns=[document.getElementById("adminJummahLiveBtn"),document.getElementById("adminJummahLiveBtnActions")].filter(Boolean);
  const notes=[document.getElementById("adminJummahPushNote"),document.getElementById("adminJummahPushNoteActions")].filter(Boolean);
  if(live){
    if(!confirm("Live Push freigeben?\n\nJumuʿah-Pushs werden jetzt an alle registrierten Besucher gesendet."))return;
    if(!confirm("Letzte Bestätigung: Wirklich live an alle Besucher senden?"))return;
  }
  btns.forEach(btn=>{btn.disabled=true;btn.textContent=live?"Sende live…":"Prüfe Plan…"});
  liveBtns.forEach(btn=>{btn.disabled=true});
  try{
    const result=await workerPostRequest("api/admin/jummah/run",{live:!!live});
    notes.forEach(note=>{if(note)note.textContent=result.reason||(live?"Live-Lauf abgeschlossen.":"Plan geprüft – kein Versand an Besucher.")});
    toast(live?(result.ok?"Live Push ausgelöst":"Live Push mit Hinweis"):(result.ok?"Plan geprüft (ohne Versand)":"Plan-Prüfung mit Hinweis"));
    await loadAdminJummahPushStatus();
  }catch(e){
    notes.forEach(note=>{if(note)note.textContent=e.message||String(e)});
    toast(e.message||"Jumuʿah-Aktion fehlgeschlagen");
  }finally{
    btns.forEach(btn=>{btn.disabled=false;btn.textContent="Plan prüfen (ohne Versand)"});
    liveBtns.forEach(btn=>{btn.disabled=false});
  }
}

function navigateAdmin(tab,{skipStack=false,scrollToBulk=false}={}){
  tab=normalizeAdminTab(tab);
  if(tab==="actions-bulk"){tab="actions";scrollToBulk=true}
  if(!tab||tab===currentTab&&!scrollToBulk)return;
  if(!skipStack)adminNavStack.push(currentTab);
  currentTab=tab;
  restartRefreshInterval();
  if(tab==="news"||tab==="actions"||tab==="tech"||tab==="start"||tab==="ordner"){
    if(tab==="ordner")ensureOrdnerData(false).then(()=>{if(currentTab===tab)renderShell()});
    fetchLiveNewsItems({force:tab==="news"}).then(()=>{if(currentTab===tab)renderShell()});
  }
  renderShell();
  if(scrollToBulk){
    requestAnimationFrame(()=>{
      const el=document.getElementById("bulkPackPanel");
      if(el)el.scrollIntoView({behavior:"smooth",block:"start"});
    });
  }else{
    window.scrollTo({top:0,behavior:"smooth"});
  }
}

function filteredNewsItems(){
  const q=newsSearchQuery.trim().toLowerCase();
  return liveNewsAllItems.filter(item=>{
    const status=newsItemStatus(item);
    if(newsFilter==="live"&&status!=="live")return false;
    if(newsFilter==="expired"&&status!=="abgelaufen")return false;
    if(newsFilter==="deleted"&&status!=="gelöscht")return false;
    if(q){const hay=[item.title,item.text,item.id,item.badge].join(" ").toLowerCase();if(!hay.includes(q))return false}
    return true;
  });
}

function markdownPreviewData(markdown){
  const text=String(markdown||"");
  const title=frontmatterValue(text,"title").replace(/^📖\s*/,"")||"Noch kein Titel";
  const category=frontmatterValue(text,"category")||"Kategorie fehlt";
  const scholar=frontmatterValue(text,"scholar")||frontmatterValue(text,"gelehrter")||"Gelehrter offen";
  const book=frontmatterValue(text,"book")||frontmatterValue(text,"werk")||"Werk offen";
  const source=frontmatterValue(text,"source")||frontmatterValue(text,"quelle")||"Quelle prüfen";
  const body=text.replace(/^---[\s\S]*?---/,"").trim();
  const quote=(body.match(/>+\s*(.+)/)||body.match(/(?:quote|aussage):\s*[\"']?(.+?)[\"']?\s*$/mi)||[])[1]||body.split(/\n\s*\n/).find(Boolean)||"Markdown einfügen, dann erscheint hier die Vorschau.";
  return{title,category,scholar,book,source,quote:String(quote).replace(/^#+\s*/,"").trim().slice(0,420)};
}
function validationList(markdown){
  const p=markdownPreviewData(markdown);

    ["Kategorie",p.category!=="Kategorie fehlt"],
    ["Gelehrter",p.scholar!=="Gelehrter offen"],
    ["Werk",p.book!=="Werk offen"],
    ["Quelle",p.source!=="Quelle prüfen"],

}

function setAdminPushTestStatus(text){const el=document.getElementById("adminPushTestStatus");if(el)el.textContent=text}
async function sendAdminLocalPushTest(){
  if(!("Notification" in window)){setAdminPushTestStatus("Dieses Gerät unterstützt keine Browser-Benachrichtigungen.");return}
  let permission=Notification.permission;
  if(permission!=="granted")permission=await Notification.requestPermission();
  if(permission!=="granted"){setAdminPushTestStatus("Benachrichtigungen wurden nicht erlaubt. Bitte in den Browser-/Geräte-Einstellungen erlauben.");return}
  const prayer=document.getElementById("adminPushPrayerSelect")?.value||"ʿIshāʾ";
  const title=`${prayer} ist eingetreten`;
  const body="Das Gebet zu seiner Zeit gehört zu den liebsten Taten bei Allah.";
  try{
    if("serviceWorker" in navigator){
      const reg=await navigator.serviceWorker.ready;
      await reg.showNotification(title,{body,tag:"admin-local-prayer-test",renotify:true,icon:"/notification-icon-192.png",badge:"/notification-badge-96.png",data:{url:"/admin/"}});
    }else{
      new Notification(title,{body,tag:"admin-local-prayer-test",icon:"/notification-icon-192.png"});
    }
    setAdminPushTestStatus(`Test-Push für ${prayer} wurde nur auf diesem Admin-Gerät ausgelöst.`);
  }catch(e){
    try{new Notification(title,{body,tag:"admin-local-prayer-test",icon:"/notification-icon-192.png"});setAdminPushTestStatus("Test-Push wurde lokal ausgelöst.");}
    catch(err){setAdminPushTestStatus("Test-Push konnte auf diesem Gerät nicht angezeigt werden.")}
  }
}
function setUploadStatus(html){draftStatus=html;const el=document.getElementById("uploadStatus");if(el)el.innerHTML=html}
function readLastPublishPushContext(){
  if(lastPublishPushContext)return lastPublishPushContext;
  try{lastPublishPushContext=JSON.parse(localStorage.getItem(ADMIN_LAST_PUSH_CTX_KEY)||"null")||null}catch(e){lastPublishPushContext=null}
  return lastPublishPushContext;
}
function saveLastPublishPushContext(ctx){
  lastPublishPushContext=ctx||null;
  try{if(ctx)localStorage.setItem(ADMIN_LAST_PUSH_CTX_KEY,JSON.stringify(ctx));else localStorage.removeItem(ADMIN_LAST_PUSH_CTX_KEY)}catch(e){}
}
function formatPushStatusLine(push){
  if(!push)return "";
  if(push.sent)return `<br>Push: <strong style="color:#8fd7a8">gesendet</strong>${push.id?` · ID ${esc(String(push.id))}`:""}${push.url?`<br>Push-Ziel: ${esc(push.url)}`:""}`;
  return `<br>Push: <strong style="color:#ff9f9f">fehlgeschlagen</strong> · ${esc(String(push.reason||push.message||"unbekannt"))}`;
}
async function retryLivePush(){
  const ctx=readLastPublishPushContext();
  const markdown=document.getElementById("postMarkdownInput")?.value||draftMarkdown||ctx?.markdown||"";
  const filename=(ctx?.filename||draftFilename||"").trim();
  const postId=ctx?.postId||frontmatterValue(markdown,"id")||filename.replace(/\.md$/i,"");
  if(!filename){toast("Kein Beitrag für Push-Retry – zuerst veröffentlichen");return}
  const btn=document.getElementById("adminRetryPushBtn");
  if(btn){btn.disabled=true;btn.textContent="Prüfe Live & Push …"}
  setUploadStatus("Prüfe Index, Beitrag und Live-Verfügbarkeit … Push wird bei Erfolg gesendet.");
  try{
    const result=await workerPostRequest("api/admin/push/retry",{
      filename,
      postId,
      postTitle:ctx?.postTitle||frontmatterValue(markdown,"title")||"Neuer Beitrag",
      markdown,
      forceResend:true
    });
    const push=result.push||{};
    const live=result.liveCheck||{};
    let html=`Push-Retry für <strong>${esc(filename)}</strong><br>`;
    html+=`Live erreichbar: <strong style="color:${live.ok?"#8fd7a8":"#ff9f9f"}">${live.ok?"ja":"nein"}</strong><br>`;
    if(live.reason&&!live.ok)html+=`${esc(live.reason)}<br>`;
    html+=formatPushStatusLine(push);
    if(ctx?.commitSha)html+=`<br>Commit: <strong>${esc(ctx.commitSha)}</strong>`;
    setUploadStatus(html);
    saveLastPublishPushContext({...ctx,filename,postId,markdown,pushSent:!!push.sent});
    toast(push.sent?"Push gesendet":live.ok?"Push fehlgeschlagen":"Beitrag noch nicht live – später erneut versuchen");
    addAdminLog("Push",push.sent?"Push erneut gesendet":"Push-Retry fehlgeschlagen",filename);
  }catch(e){
    setUploadStatus(`Push-Retry fehlgeschlagen: ${esc(e.message||e)}`);
    toast(e.message||"Push-Retry fehlgeschlagen");
  }finally{
    if(btn){btn.disabled=false;btn.textContent="Live erneut prüfen & Push senden"}
  }
}
async function prepareNextPostNumber(){
  try{
    draftMarkdown=document.getElementById("postMarkdownInput")?.value||draftMarkdown;
    setUploadStatus("Prüfe aktuelle Nummer aus content/posts …");
    const info=await resolveNextPostNumberInfo();
    draftNextNumber=info.nextNumber;
    draftFilename=suggestFilename(draftMarkdown,draftNextNumber);
    const input=document.getElementById("postFilenameInput");if(input)input.value=draftFilename;
    setUploadStatus(`Beiträge im Index: <strong>${info.postCount}</strong><br>Nächste Nummer: <strong>${info.nextNumber}</strong><br>Letzter Beitrag: <strong>${esc(info.lastFilename||"—")}</strong><br>Dateiname vorgeschlagen: <strong>${esc(draftFilename)}</strong>${info.workerPostCount!=null?`<br>Worker/GitHub: <strong>${info.workerPostCount}</strong> · Quelle: ${esc(info.source)}`:""}`);
    addAdminLog("Prüfung","Nächste Beitragsnummer ermittelt",`${info.nextNumber} · ${draftFilename}`);
  }catch(e){setUploadStatus(`Fehler: ${esc(e.message||e)}`)}
}
async function uploadPostViaWorker(){
  if(uploadBusy)return;
  draftMarkdown=document.getElementById("postMarkdownInput")?.value||"";
  draftFilename=(document.getElementById("postFilenameInput")?.value||"").trim();
  if(!draftMarkdown.trim()){setUploadStatus("Bitte Markdown-Beitrag einfügen.");return}
  const preview=markdownPreviewData(draftMarkdown);
  startPublishTrack("single",{title:preview.title,filename:draftFilename||"wird automatisch erzeugt"});
  const ok=confirm(`Möchtest du diese Änderung wirklich veröffentlichen?\n\nDiese Änderung wird für Besucher sichtbar.\n\nTitel: ${preview.title}\nDatei: ${draftFilename||"wird automatisch erzeugt"}`);
  if(!ok){finishPublishTrack("error","Veröffentlichung abgebrochen");setUploadStatus("Veröffentlichung abgebrochen. Der Entwurf bleibt lokal vorbereitet.");addAdminLog("Abgebrochen","Veröffentlichung bewusst abgebrochen",draftFilename||preview.title);return}
  try{
    uploadBusy=true;setUploadStatus("Prüfe aktuelle Nummer und bereite Worker-Veröffentlichung vor...");
    updatePublishStep("markdown","ok","Markdown vorhanden");
    const next=await resolveNextPostNumber();
    updatePublishStep("number","ok",`Nr. ${next}`);
    if(!draftFilename)draftFilename=suggestFilename(draftMarkdown,next);
    else if(/(?:^|-)\d{3}(?=-|\.md$)/.test(draftFilename))draftFilename=draftFilename.replace(/(^|-)\d{3}(?=-|\.md$)/,`$1${String(next).padStart(3,"0")}`);
    if(!/^[a-z0-9][a-z0-9-]*\.md$/i.test(draftFilename)){updatePublishStep("filename","error","Ungültiger Dateiname");finishPublishTrack("error","Dateiname muss eine .md-Datei ohne Leerzeichen sein.");setUploadStatus("Dateiname muss eine .md-Datei ohne Leerzeichen sein.");return}
    updatePublishStep("filename","ok",draftFilename);
    const filenameInput=document.getElementById("postFilenameInput");if(filenameInput)filenameInput.value=draftFilename;
    const markdown=normalizeMarkdownForUpload(draftMarkdown,next);
    updatePublishMeta({filename:draftFilename,number:next,title:preview.title});
    updatePublishStep("created","run","Sende an Worker");
    setUploadStatus("Sende Beitrag an Cloudflare Worker...");
    const result=await publishPostViaWorkerRequest(markdown,draftFilename);
    const uploadedFilename=result.filename||draftFilename;
    const uploadedNumber=result.number||next;
    const postId=result.postId||frontmatterValue(markdown,"id")||uploadedFilename.replace(/\.md$/i,"");
    updatePublishStep("created","ok",uploadedFilename);
    updatePublishStep("commit",result.commitSha?"ok":"skip",result.commitSha||"Worker meldet keinen Commit");
    updatePublishStep("index","ok","Worker hat Index aktualisiert");
    updatePublishStep("deploy","ok","Worker-Antwort erhalten");
    updatePublishMeta({filename:uploadedFilename,number:uploadedNumber,postId,commitSha:result.commitSha||"",visitorUrl:`${SITE_ORIGIN}/#post/${postId}`});
    saveLastPublishPushContext({
      filename:uploadedFilename,
      number:uploadedNumber,
      postId,
      postTitle:preview.title,
      markdown,
      commitSha:result.commitSha||"",
      push:result.push||null
    });
    updatePublishStep("indexContains","run","Prüfe öffentlichen Index");
    updatePublishStep("fileLive","run","Prüfe Beitragsdatei");
    const live=await verifyPublishedPost(uploadedFilename,postId);
    updatePublishStep("indexContains",live.index?"ok":"error",live.index?"Datei im Index":"Noch nicht im öffentlichen Index");
    updatePublishStep("fileLive",live.file?"ok":"error",live.file?"Datei erreichbar":live.reason||"Datei noch nicht erreichbar");
    updatePublishStep("urlLive",live.url?"ok":"skip",live.url?"Besucher-Link vorbereitet":"Besucher-Link wartet auf Index/Datei");
    const push=result.push||null;
    updatePublishStep("pushReady",push?"ok":"skip",push?"Push-Antwort vom Worker":"Kein Push-Status vom Worker");
    updatePublishStep("onesignal",push?(push.sent||push.reason||push.message?"ok":"skip"):"skip",push?(push.sent?"API erfolgreich":String(push.reason||push.message||"Status unklar")):"Nicht gemeldet");
    updatePublishStep("pushSent",push&&push.sent?"ok":"error",push&&push.sent?`ID ${push.id||"ok"}`:String(push?.reason||push?.message||"Push nicht gesendet"));
    updatePublishStep("done",push&&push.sent&&live.file?"ok":"skip",push&&push.sent&&live.file?"Fertig":"Fertig mit Hinweis");
    updatePublishMeta({pushStatus:push&&push.sent?"gesendet":push?`nicht gesendet: ${push.reason||push.message||"unbekannt"}`:"kein Push-Status"});
    finishPublishTrack(live.file?"ok":"error",live.file?"":live.reason||"Live-Datei noch nicht erreichbar");
    setUploadStatus(`Fertig über Worker veröffentlicht: <strong>${esc(uploadedFilename)}</strong><br>Nummer: <strong>${esc(uploadedNumber)}</strong><br>Commit: <strong>${esc(result.commitSha||"erstellt")}</strong>${formatPushStatusLine(result.push)}<br><a href="${SITE_ORIGIN}/content/posts/posts-index.json?t=${Date.now()}" target="_blank" rel="noopener">Index prüfen</a> · <a href="${SITE_ORIGIN}/#recent" target="_blank" rel="noopener">Neueste Beiträge öffnen</a>`);
    addAdminLog("Veröffentlicht","Beitrag über Cloudflare Worker veröffentlicht",uploadedFilename);
    draftMarkdown="";
    draftFilename="";
    draftNextNumber=null;
    try{localStorage.removeItem(ADMIN_DRAFT_KEY)}catch(e){}
    const text=document.getElementById("postMarkdownInput");if(text)text.value="";
    if(filenameInput)filenameInput.value="";
    updateDraftPreview();
    toast("Beitrag hochgeladen");
  }catch(e){
    addAdminLog("Fehler",String(e.message||e),draftFilename||"Upload");
    const track=readPublishTrack();if(track){const running=(track.steps||[]).find(s=>s.state==="run");if(running)updatePublishStep(running.id,"error",String(e.message||e));finishPublishTrack("error",String(e.message||e))}
    setUploadStatus(`Fehler: ${esc(e.message||e)}<br>Bitte Worker URL, Admin Worker Secret und Cloudflare Secrets prüfen.`);
  }finally{
    uploadBusy=false;
    const btn=document.getElementById("uploadPostBtn");if(btn){btn.disabled=false;btn.textContent="Online veröffentlichen"}
  }
}
function setBulkPackStatus(html){const el=document.getElementById("bulkPackStatus");if(el)el.innerHTML=html}
async function uploadBulkPackViaWorker(){
  if(bulkPackBusy||uploadBusy)return;
  const raw=document.getElementById("bulkPackMarkdownInput")?.value||"";
  const category=(document.getElementById("bulkCategoryInput")?.value||"").trim();
  const posts=splitBulkMarkdownPostsForPublish(raw).map(md=>applyBulkCategoryToMarkdown(md,category));
  if(!posts.length){setBulkPackStatus("Keine Beiträge erkannt. Prüfberichte/readme werden automatisch übersprungen. Beiträge mit <strong>===</strong> trennen oder Frontmatter nutzen.");toast("Paket leer");return}
  startPublishTrack("bulk",{category:category||"Sammelpaket",count:posts.length});
  updatePublishStep("count","ok",`${posts.length} Beiträge`);
  updatePublishStep("valid","ok","Markdown-Blöcke erkannt");
  if(category&&!posts.every(md=>frontmatterValue(md,"category")===category)){/* applied above */}
  const previewTitles=posts.slice(0,4).map(md=>frontmatterValue(md,"title")||"Ohne Titel").join("\n· ");
  const ok=confirm(`Ganzes Paket live veröffentlichen?\n\n${posts.length} einzelne Beiträge werden nacheinander online gestellt.\nJeder erscheint wie gewohnt in Neueste / Kategorie / Einzelansicht.\n\n${category?`Kategorie: ${category}\n\n`:""}${previewTitles}${posts.length>4?"\n…":""}`);
  if(!ok){finishPublishTrack("error","Sammel-Veröffentlichung abgebrochen");setBulkPackStatus("Sammel-Veröffentlichung abgebrochen.");return}
  bulkPackBusy=true;
  const bulkBtn=document.getElementById("bulkPublishBtn");if(bulkBtn){bulkBtn.disabled=true;bulkBtn.textContent="Veröffentliche Paket…"}
  const published=[];
  let lastResult=null;
  try{
    updatePublishStep("created","run","Veröffentliche Beiträge nacheinander");
    for(let i=0;i<posts.length;i++){
      const md=posts[i];
      const title=frontmatterValue(md,"title")||`Beitrag ${i+1}`;
      setBulkPackStatus(`Veröffentliche <strong>${i+1}/${posts.length}</strong>: ${esc(title)} …`);
      const next=await resolveNextPostNumber();
      const filename=suggestFilename(md,next);
      const normalized=normalizeMarkdownForUpload(md,next);
      const isLast=i===posts.length-1;
      lastResult=await publishPostViaWorkerRequest(normalized,filename,{skipPush:!isLast});
      published.push({filename:lastResult.filename||filename,title,number:lastResult.number||next});
      const track=readPublishTrack();if(track){track.items=[...(track.items||[]),{filename:lastResult.filename||filename,title,status:"erstellt"}];savePublishTrack(track)}
      saveLastPublishPushContext({
        filename:lastResult.filename||filename,
        number:lastResult.number||next,
        postId:lastResult.postId||frontmatterValue(normalized,"id")||filename.replace(/\.md$/i,""),
        postTitle:title,
        markdown:normalized,
        commitSha:lastResult.commitSha||"",
        push:lastResult.push||null
      });
    }
    updatePublishStep("created","ok",`${published.length}/${posts.length} erstellt`);
    updatePublishStep("index","ok","Index je Beitrag aktualisiert");
    updatePublishStep("deploy","ok","Worker-Antworten erhalten");
    updatePublishStep("live","run","Prüfe letzte Beitragsdatei");
    if(published.length){
      const last=published[published.length-1];
      const lastPostId=lastResult?.postId||String(last.filename||"").replace(/\.md$/i,"");
      const live=await verifyPublishedPost(last.filename,lastPostId);
      updatePublishStep("live",live.file||live.index?"ok":"error",live.file||live.index?"Letzter Beitrag erreichbar":live.reason||"Noch nicht öffentlich erreichbar");
    }
    let newsLine="";
    const publishNews=!!document.getElementById("bulkPublishNews")?.checked;
    if(publishNews&&category){
      const newsTitle=(document.getElementById("bulkNewsTitleInput")?.value||"").trim()||`Neue Kategorie: ${category}`;
      const newsText=(document.getElementById("bulkNewsTextInput")?.value||"").trim()||`Assalāmu ʿalaikum,\n\nes wurden ${published.length} neue Beiträge zum Thema „${category}“ veröffentlicht. Tippe hier, um den Ordner mit allen Aussagen zu öffnen.\n\nBarakallāhu fīkum.`;
      const hours=newsDurationHours(document.getElementById("bulkNewsDuration")?.value||"24 Stunden");
      try{
        const newsResult=await workerPostRequest("news",{id:`bulk-${slugify(category)}-${Date.now()}`,title:newsTitle,text:newsText,ttlHours:hours,badge:"Neu",nav:"topic",value:category,count:published.length});
        const pushTag=newsResult.push?.sent?" · Push gesendet":newsResult.push?.reason?` · Push: ${esc(newsResult.push.reason)}`:"";
        newsLine=`<br>Fokus-News live: <strong>${esc(newsTitle)}</strong>${pushTag}`;
        updatePublishStep("news","ok",newsTitle);
        updatePublishStep("pushReady",newsResult.push?"ok":"skip",newsResult.push?"Push-Antwort erhalten":"Kein Push-Status");
        updatePublishStep("pushSent",newsResult.push?.sent?"ok":"error",newsResult.push?.sent?`ID ${newsResult.push.id||"ok"}`:String(newsResult.push?.reason||"Push nicht gesendet"));
        updatePublishMeta({pushStatus:newsResult.push?.sent?"gesendet":newsResult.push?`nicht gesendet: ${newsResult.push.reason||"unbekannt"}`:"kein Push-Status"});
        addAdminLog("News",newsResult.push?.sent?"Fokus-News + Push nach Sammel-Paket":"Fokus-News nach Sammel-Paket",newsTitle);
      }catch(e){
        newsLine=`<br>Fokus-News fehlgeschlagen: ${esc(e.message||String(e))}`;
        updatePublishStep("news","error",String(e.message||e));
      }
    }else if(publishNews&&!category){
      newsLine="<br>Fokus-News übersprungen (Kategorie fehlt für Ordner-Link).";
      updatePublishStep("news","skip","Kategorie fehlt");
      updatePublishStep("pushReady","skip","Keine Fokus-News");
      updatePublishStep("pushSent","skip","Kein Paket-Push");
    }else{
      updatePublishStep("news","skip","Nicht ausgewählt");
      updatePublishStep("pushReady",lastResult?.push?"ok":"skip",lastResult?.push?"Letzter Beitrag meldet Push":"Kein Push angefordert");
      updatePublishStep("pushSent",lastResult?.push?.sent?"ok":"skip",lastResult?.push?.sent?`ID ${lastResult.push.id||"ok"}`:"Kein Paket-Push");
    }
    updatePublishStep("done","ok",`${published.length} Beiträge fertig`);
    updatePublishMeta({count:published.length,filename:published[published.length-1]?.filename||"",title:`${published.length} Beiträge veröffentlicht`});
    finishPublishTrack("ok");
    const list=published.slice(0,6).map(p=>esc(p.filename)).join("<br>")+(published.length>6?`<br>… +${published.length-6} weitere`:"");
    setBulkPackStatus(`Paket fertig: <strong>${published.length}</strong> Beiträge live.<br>${list}${newsLine}<br><a href="${SITE_ORIGIN}/#topics" target="_blank" rel="noopener">Kategorien prüfen</a> · <a href="${SITE_ORIGIN}/#recent" target="_blank" rel="noopener">Neueste Beiträge</a>`);
    addAdminLog("Sammel-Paket",`${published.length} Beiträge veröffentlicht`,category||published[0]?.filename||"");
    toast(`${published.length} Beiträge veröffentlicht`);
    const bulkArea=document.getElementById("bulkPackMarkdownInput");if(bulkArea)bulkArea.value="";
    const countLabel=document.getElementById("bulkPackCountLabel");if(countLabel)countLabel.textContent="";
  }catch(e){
    const done=published.length;
    addAdminLog("Fehler",`Sammel-Paket ab Beitrag ${done+1}: ${e.message||e}`,category||"");
    const track=readPublishTrack();if(track){track.items=[...(track.items||[]),{title:`Beitrag ${done+1}`,status:`Fehler: ${String(e.message||e)}`}];savePublishTrack(track)}
    updatePublishStep("created","error",`Fehler nach ${done}/${posts.length}`);
    finishPublishTrack("error",String(e.message||e));
    setBulkPackStatus(`Fehler nach ${done}/${posts.length} Beiträgen: ${esc(e.message||e)}${done?`<br>${done} Beiträge wurden bereits live gestellt.`:""}`);
    toast(e.message||"Sammel-Veröffentlichung fehlgeschlagen");
  }finally{
    bulkPackBusy=false;
    if(bulkBtn){bulkBtn.disabled=false;bulkBtn.textContent="Ganzes Paket live veröffentlichen"}
  }
}
async function renderDashboard({force=false}={}){
  if(!force&&adminIsEditing())return;
  const panel=document.getElementById("panel");
  if(!lastData)panel.innerHTML=`<div class="empty">Statistik wird geladen...</div>`;
  if(!hasSupabase()){panel.innerHTML=`<div class="empty">Supabase ist nicht konfiguriert.</div>`;return}
  const newsPromise=fetchLiveNewsItems({force});
  try{lastData=await fetchDashboard();await newsPromise;renderShell()}catch(e){panel.innerHTML=`<div class="empty">Statistik konnte nicht geladen werden (${esc(String(e.message||e))}).</div>`}
}
function stopRefresh(){if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}}
function refreshIntervalMs(){return currentTab==="besucher"?VISITOR_REFRESH_MS:ADMIN_REFRESH_MS}
function restartRefreshInterval(){if(!authed)return;stopRefresh();refreshTimer=setInterval(renderDashboard,refreshIntervalMs())}
function startRefresh(){stopRefresh();renderDashboard();refreshTimer=setInterval(renderDashboard,refreshIntervalMs())}
function renderApp(){authed=readAuth()||authed;if(!authed){stopRefresh();renderLogin();return}document.getElementById("topbar").hidden=false;startRefresh()}
document.getElementById("refreshBtn").onclick=()=>renderDashboard({force:true});
document.getElementById("adminBackBtn").onclick=()=>adminBack();
document.getElementById("logoutBtn").onclick=()=>{setAuth(false);lastData=null;renderApp()};
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&authed)setTimeout(()=>renderDashboard(),260)});
let adminSwipe=null;
document.addEventListener("touchstart",e=>{
  const t=e.touches&&e.touches[0];if(!t)return;
  const interactive=e.target.closest&&e.target.closest("input,textarea,select,button,a");
  if(interactive)return;
  adminSwipe={x:t.clientX,y:t.clientY,t:Date.now()};
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!adminSwipe)return;
  const t=e.changedTouches&&e.changedTouches[0];if(!t){adminSwipe=null;return}
  const dx=t.clientX-adminSwipe.x,dy=t.clientY-adminSwipe.y,dt=Date.now()-adminSwipe.t;
  adminSwipe=null;
  if(adminNavStack.length||currentTab!=="start"){
    if(dx>78&&Math.abs(dy)<55&&dt<650)adminBack();
  }
},{passive:true});
window.addEventListener("error",e=>{const panel=document.getElementById("panel");if(!panel)return;const msg=String(e.message||e.error||"Unbekannter Fehler");panel.innerHTML=`<section class="login"><h2>Admin Fehler</h2><p>${esc(msg)}</p><button class="btn primary" type="button" onclick="location.reload()">Neu laden</button><button class="btn" type="button" onclick="window.__DAR_ADMIN_REPAIR__&&window.__DAR_ADMIN_REPAIR__()">Cache reparieren</button></section>`});
loadLocalDraft();
authed=readAuth();
renderApp();
</script>
