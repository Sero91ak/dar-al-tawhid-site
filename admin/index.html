<script>
(function(){
  var ADMIN_SW_CACHE="dar-admin-stats-v22";
  var MIG_KEY="darAdminSwFixV22";
  if(!location.pathname.startsWith("/admin"))return;
  function cleanCaches(){
    if(!("caches" in window))return Promise.resolve();
    return caches.keys().then(function(keys){
      return Promise.all(keys.filter(function(k){
        return (k.indexOf("dar-admin-stats-")===0&&k!==ADMIN_SW_CACHE)||k.indexOf("dar-al-tawhid-offline-light-")===0;
      }).map(function(k){return caches.delete(k)}));
    });
  }
  function dropVisitorWorkers(){
    if(!("serviceWorker" in navigator))return Promise.resolve();
    return navigator.serviceWorker.getRegistrations().then(function(regs){
      return Promise.all(regs.map(function(reg){
        var script=(reg.active&&reg.active.scriptURL)||(reg.waiting&&reg.waiting.scriptURL)||(reg.installing&&reg.installing.scriptURL)||"";
        if(script.indexOf("/admin/sw.js")!==-1)return Promise.resolve();
        return reg.unregister().catch(function(){});
      }));
    });
  }
  function registerAdmin(){
    if(!("serviceWorker" in navigator))return Promise.resolve();
    return navigator.serviceWorker.register("/admin/sw.js",{scope:"/admin/",updateViaCache:"none"});
  }
  window.__DAR_ADMIN_REPAIR__=function(){
    if(!("serviceWorker" in navigator))return cleanCaches().then(function(){location.replace("/admin/?repair=1")});
    return navigator.serviceWorker.getRegistrations().then(function(regs){
      return Promise.all(regs.map(function(reg){return reg.unregister().catch(function(){})}));
    }).then(cleanCaches).then(function(){
      try{localStorage.removeItem(MIG_KEY)}catch(e){}
      location.replace("/admin/?repair=1");
    });
  };
  if("serviceWorker" in navigator&&localStorage.getItem(MIG_KEY)!=="done"){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      if(!regs.length){localStorage.setItem(MIG_KEY,"done");return registerAdmin()}
      return Promise.all(regs.map(function(reg){return reg.unregister().catch(function(){})}))
        .then(cleanCaches)
        .then(function(){
          localStorage.setItem(MIG_KEY,"done");
          location.replace("/admin/?swfix=1");
        });
    }).catch(function(){localStorage.setItem(MIG_KEY,"done")});
    return;
  }
  dropVisitorWorkers().then(cleanCaches).then(registerAdmin).catch(function(){});
})();
</script>

  const [liveRes,totalsRes]=await Promise.all([

    fetch(url+"/rest/v1/stats_totals?select=content_type,content_id,content_title,views,shares,saves&order=views.desc&limit=300",{headers:h,cache:"no-store"})
  ]);

function sortedRows(rows){
  const list=[...rows];

    score:(a,b)=>score(b)-score(a),

    shares:(a,b)=>Number(b.shares||0)-Number(a.shares||0),

    <span class="rank-num">${idx+1}</span>
    <span>
      <h4 class="rank-title">${esc(title)}</h4>

        <span class="tag">${esc(typeLabel(row.content_type))}</span>
        <span class="tag green">${views} gelesen</span>

        <span class="tag">${saves} gespeichert</span>

}

function enhanceAdminCollapsibles(){
  document.querySelectorAll("#panel .panel,#panel .hero-card,#panel .preview-box").forEach((card,index)=>{
    if(card.dataset.collapseReady==="1")return;
    const head=card.querySelector(":scope > .section-head");
    if(!head)return;
    const children=[...card.children].filter(child=>child!==head);
    if(!children.length)return;
    const body=document.createElement("div");
    body.className="admin-collapsible-body";
    children.forEach(child=>body.appendChild(child));
    const toggle=document.createElement("button");
    toggle.className="admin-collapse-toggle";
    toggle.type="button";
    toggle.setAttribute("aria-label","Bereich einklappen");
    toggle.textContent="−";
    head.appendChild(toggle);
    card.classList.add("admin-collapsible","is-open");
    card.dataset.collapseReady="1";
    card.appendChild(body);
    const setOpen=open=>{
      card.classList.toggle("is-open",open);
      card.classList.toggle("is-collapsed",!open);
      toggle.textContent=open?"−":"+";
      toggle.setAttribute("aria-label",open?"Bereich einklappen":"Bereich öffnen");
    };
    if(index>2&&currentTab!=="actions"&&currentTab!=="start")setOpen(false);
    head.addEventListener("click",event=>{
      if(event.target.closest("a,button,input,select,textarea,label,[contenteditable='true']"))return;
      setOpen(!card.classList.contains("is-open"));
    });
    toggle.onclick=event=>{
      event.preventDefault();
      event.stopPropagation();
      setOpen(!card.classList.contains("is-open"));
    };
  });
}

async function renderAdminTelegramImageBase64(){
  const canvas=document.getElementById("adminTelegramCanvas");

  const ctx=canvas.getContext("2d");
  const title=(frontmatterValue(draftMarkdown,"title")||"DAR AL TAWḤID").replace(/^📖\s*/,"");
  const quote=(lastTelegramPreview?.fields?.statement||markdownPreviewData(draftMarkdown).quote||"").slice(0,420);
  const source=(frontmatterValue(draftMarkdown,"source")||"").slice(0,120);
  const img=new Image();
  img.crossOrigin="anonymous";
  await new Promise((resolve,reject)=>{img.onload=resolve;img.onerror=reject;img.src=`${SITE_ORIGIN}/assets/post-templates/bibliothek-braun.jpg?v=4`});
  ctx.clearRect(0,0,1080,1350);
  ctx.drawImage(img,0,0,1080,1350);
  ctx.fillStyle="#3b2515";
  ctx.textAlign="center";
  ctx.font="700 54px 'Cormorant Garamond', Georgia, serif";
  wrapCanvasText(ctx,title,540,300,660,64);
  ctx.font="italic 700 42px 'Cormorant Garamond', Georgia, serif";
  wrapCanvasText(ctx,`„${quote}“`,540,720,700,52);
  ctx.font="600 28px Arial, sans-serif";
  wrapCanvasText(ctx,source,540,1180,700,34);
  return canvas.toDataURL("image/png").split(",")[1]||"";
}
function wrapCanvasText(ctx,text,x,y,maxWidth,lineHeight){
  const words=String(text||"").split(/\s+/);
  let line="",dy=0;
  for(const word of words){
    const test=line?`${line} ${word}`:word;
    if(ctx.measureText(test).width>maxWidth&&line){ctx.fillText(line,x,y+dy);line=word;dy+=lineHeight}else line=test;
  }
  if(line)ctx.fillText(line,x,y+dy);
}

function formatPublishStatusHtml(result){

  let html=`<strong>Veröffentlichung abgeschlossen:</strong> ${esc(result.filename||draftFilename||"")}<br>`;
  html+=`Nummer: <strong>${esc(result.number||"")}</strong> · Commit: <strong>${esc(result.commitSha||"erstellt")}</strong><br><br>`;
  html+=`<strong>Live-Prüfung Schritt für Schritt</strong><br>`;
  html+=`GitHub-Datei erstellt: ${stepLabel(steps.githubFileCreated!==false)}<br>`;
  html+=`Index auf GitHub aktualisiert: ${stepLabel(steps.indexUpdatedGithub!==false)}<br>`;
  html+=`Index öffentlich gefunden: ${stepLabel(steps.indexFoundPublic)}<br>`;
  html+=`Beitrag im Index enthalten: ${stepLabel(steps.postInIndex)}<br>`;
  html+=`Cloudflare Deployment erkannt: ${stepLabel(steps.cloudflareDeployed)}<br>`;
  html+=`Beitrag-Datei öffentlich erreichbar: ${stepLabel(steps.postFilePublic)}<br>`;
  html+=`Besucher-URL erreichbar: ${stepLabel(steps.visitorUrlOk)}<br>`;
  html+=`Push wartet: ${stepLabel(!!push.pending||!!push.waitingForLive)}<br>`;
  html+=`Push gesendet: ${stepLabel(!!push.sent)}<br>`;
  if(live.diagnosis)html+=`<span style="color:#f0c674">Fehlergrund: ${esc(live.diagnosis)}</span><br>`;
  if(push.reason&&!push.sent)html+=`<span style="color:#f0c674">${esc(push.reason)}</span><br>`;
  if(push.sent&&push.targetUrl)html+=`Push-Ziel: <strong>${esc(push.targetUrl)}</strong><br>`;
  if(tg.sent)html+=`Telegram: <strong>gesendet</strong>${tg.telegramMessageId?` · Message-ID ${esc(tg.telegramMessageId)}`:""}<br>`;
  else if(tg.telegramError||tg.error)html+=`<span style="color:#ff9f9f">Telegram fehlgeschlagen: ${esc(tg.telegramError||tg.error)}</span><br>`;
  return html;
}

  const filename=ctx?.filename||draftFilename;

  if(btn){btn.disabled=true;btn.textContent="Prüfe Live & Push …"}

}
function maxPostNumber(files){let max=0;(files||[]).forEach(file=>{const name=typeof file==="string"?file:file.name;for(const m of String(name||"").matchAll(/(?:^|-)(\d{3})(?=-|\.md$)/g)){max=Math.max(max,Number(m[1]))}});return max}

async function resolveNextPostNumber(){

function normalizeMarkdownForUpload(markdown,nextNumber){
  let out=String(markdown||"").trim();
  if(!out)return out;
  const iso=new Date().toISOString().replace(/\.\d{3}Z$/,".000Z");
  if(/^date:\s*["']?.*?["']?\s*$/m.test(out))out=out.replace(/^date:\s*["']?.*?["']?\s*$/m,`date: "${iso}"`);
  const id=frontmatterValue(out,"id");
  if(id){
    const next=String(nextNumber).padStart(3,"0");
    const updated=/-\d{3}$/.test(id)?id.replace(/-\d{3}$/,`-${next}`):`${id}-${next}`;
    out=out.replace(/^id:\s*["']?.*?["']?\s*$/m,`id: "${updated}"`);
  }
  return out+"\n";
}

    body:JSON.stringify(body)

  return data;
}

function renderShell(opts={}){
  const keepScroll=opts.keepScroll!==false;
  if(keepScroll)adminShellScrollY=window.scrollY||document.documentElement.scrollTop||0;
  const data=lastData||{live:{},totals:[],updated:new Date()};
  const live=data.live||{},rows=totals();
  const posts=rows.filter(x=>x.content_type==="post"),duas=rows.filter(x=>x.content_type==="dua");
  const installs=installTotals();
  const views=rows.reduce((n,r)=>n+Number(r.views||0),0),shares=rows.reduce((n,r)=>n+Number(r.shares||0),0),saves=rows.reduce((n,r)=>n+Number(r.saves||0),0);
  const top=sortedRows(rows).slice(0,5), topViews=sortedRows(rows).sort((a,b)=>Number(b.views||0)-Number(a.views||0)).slice(0,5);
  const topShares=sortedRows(rows).sort((a,b)=>Number(b.shares||0)-Number(a.shares||0)).slice(0,5);
  const ctx={live,rows,posts,duas,views,shares,saves,top,topViews,topShares,installs,updated:data.updated};
  if(currentTab==="schedule")currentTab="actions";
  const body=currentTab==="overview"?renderOverview(ctx):currentTab==="preview"?renderLivePreview(ctx):currentTab==="content"?renderContent():currentTab==="actions"?renderActions(rows,installs):currentTab==="news"?renderNews():currentTab==="reports"?renderReports():currentTab==="users"?renderUsers(ctx):currentTab==="stats"?renderStats(ctx):currentTab==="tech"?renderTech(ctx):currentTab==="settings"?renderSettings(ctx):renderStart(ctx);
  document.getElementById("panel").innerHTML=`
    <nav class="tabs">
      ${readTabOrder().map(([id,label])=>tabButton(id,label)).join("")}
    </nav>
    ${body}
    <div class="meta-line">Aktualisiert: ${esc(data.updated.toLocaleString("de-DE"))} · Auto-Refresh alle 30 Sekunden</div>`;
  bindUi();
  enhanceAdminCollapsibles();
  updateAdminBackButton();
  if(keepScroll){
    requestAnimationFrame(()=>window.scrollTo({top:adminShellScrollY,behavior:"auto"}));
  }else if(opts.scrollTop){
    requestAnimationFrame(()=>window.scrollTo({top:0,behavior:"auto"}));
  }
}

function markdownPreviewData(markdown){
  const text=String(markdown||"");
  const title=frontmatterValue(text,"title").replace(/^📖\s*/,"")||"Noch kein Titel";
  const category=frontmatterValue(text,"category")||"Kategorie fehlt";
  const scholar=frontmatterValue(text,"scholar")||frontmatterValue(text,"gelehrter")||"Gelehrter offen";
  const book=frontmatterValue(text,"book")||frontmatterValue(text,"werk")||"Werk offen";
  const source=frontmatterValue(text,"source")||frontmatterValue(text,"quelle")||"Quelle prüfen";
  const body=text.replace(/^---[\s\S]*?---/,"").trim();
  const quote=(body.match(/>+\s*(.+)/)||body.match(/(?:quote|aussage):\s*[\"']?(.+?)[\"']?\s*$/mi)||[])[1]||body.split(/\n\s*\n/).find(Boolean)||"Markdown einfügen, dann erscheint hier die Vorschau.";
  return{title,category,scholar,book,source,quote:String(quote).replace(/^#+\s*/,"").trim().slice(0,420)};
}
function validationList(markdown){
  const p=markdownPreviewData(markdown);
  const checks=[

    ["Kategorie",p.category!=="Kategorie fehlt"],
    ["Gelehrter",p.scholar!=="Gelehrter offen"],
    ["Werk",p.book!=="Werk offen"],
    ["Quelle",p.source!=="Quelle prüfen"],

}

function setAdminPushTestStatus(text){const el=document.getElementById("adminPushTestStatus");if(el)el.textContent=text}
function setAdminPrayerStatusHtml(html){const el=document.getElementById("adminPrayerStatusBox");if(el)el.innerHTML=html}
function formatPrayerPushStatusHtml(status){
  if(!status)return"<span style='color:#f0c674'>Kein Status verfügbar.</span>";
  const updated=status.updatedAt?new Date(status.updatedAt).toLocaleString("de-DE"):"unbekannt";
  const mag=status.maghribDiagnostic;
  let html=`<strong>Letzter Scheduler-Lauf:</strong> ${esc(updated)}<br>`;
  html+=`<strong>Nutzer mit Standort:</strong> ${esc(String(status.usersWithLocation||0))} · <strong>Gruppen:</strong> ${esc(String(status.locationGroups||0))}<br>`;
  html+=`<strong>Geplant:</strong> ${esc(String(status.scheduled||0))} · <strong>Empfänger:</strong> ${esc(String(status.recipients||0))} · <strong>Fehler:</strong> ${esc(String(status.errors||0))}<br>`;
  if(mag){
    html+=`<br><strong>Maghrib heute (${esc(mag.time||"--:--")}):</strong><br>`;
    html+=`Vorab: ${esc(status.today?.prayers?.maghrib?.advance?.status||mag.plannedAdvance||"?")} (${esc(String(mag.advanceRecipients||0))} Empf.) · Gebetszeit: ${esc(status.today?.prayers?.maghrib?.entry?.status||mag.plannedEntry||"?")} (${esc(String(mag.entryRecipients||0))} Empf.)<br>`;
    html+=`<span style="color:#dfffd8">${esc(mag.answer||"")}</span><br>`;
  }
  const prayers=status.today?.prayers||{};
  const diagnostics=status.prayerDiagnostics||{};
  const keys=["fajr","dhuhr","asr","maghrib","isha","tahajjud"];
  html+=`<br><table style="width:100%;border-collapse:collapse;font-size:11px"><tr><th align="left">Gebet</th><th>Zeit</th><th>Vorab</th><th>Gebetszeit</th><th>Status</th></tr>`;
  keys.forEach(key=>{
    const p=prayers[key];
    const d=diagnostics[key];
    if(!p&&key==="tahajjud")return;
    const statusLine=d?.answer?esc(d.answer):`${esc(p?.advance?.status||"—")} / ${esc(p?.entry?.status||"—")}`;
    html+=`<tr><td>${esc(p?.name||key)}</td><td>${esc(p?.time||"--")}</td><td>${esc(p?.advance?.status||"—")}</td><td>${esc(p?.entry?.status||"—")}</td><td style="font-size:10px">${statusLine}</td></tr>`;
  });
  html+=`</table>`;
  if(status.lastError)html+=`<br><span style="color:#f0c674">Fehler: ${esc(status.lastError)}</span>`;
  return html;
}

async function sendAdminLocalPushTest(){
  if(!("Notification" in window)){setAdminPushTestStatus("Dieses Gerät unterstützt keine Browser-Benachrichtigungen.");return}
  let permission=Notification.permission;
  if(permission!=="granted")permission=await Notification.requestPermission();
  if(permission!=="granted"){setAdminPushTestStatus("Benachrichtigungen wurden nicht erlaubt. Bitte in den Browser-/Geräte-Einstellungen erlauben.");return}
  const prayerName=document.getElementById("adminPushPrayerSelect")?.value||"maghrib";
  const mode=document.getElementById("adminPushModeSelect")?.value||"entry";
  const prayerKeyMap={fajr:"fajr",dhuhr:"dhuhr",asr:"asr",maghrib:"maghrib",isha:"isha",tahajjud:"tahajjud",Fajr:"fajr",Dhuhr:"dhuhr","ʿAṣr":"asr",Maghrib:"maghrib","ʿIshāʾ":"isha",Taḥajjud:"tahajjud"};
  const key=prayerKeyMap[prayerName]||"maghrib";
  const displayName={fajr:"Fajr",dhuhr:"Dhuhr",asr:"ʿAṣr",maghrib:"Maghrib",isha:"ʿIshāʾ",tahajjud:"Taḥajjud"}[key]||prayerName;
  const sampleTimes={fajr:"04:12",dhuhr:"13:05",asr:"17:53",maghrib:"21:18",isha:"22:42",tahajjud:"02:30"};
  const timeLabel=sampleTimes[key]||"12:00";
  const reminder="Das Gebet zu seiner Zeit gehört zu den liebsten Taten bei Allah.";
  let title,body;
  if(key==="tahajjud"){
    title=mode==="advance"?`[Test] Taḥajjud in 15 Min`:"[Test] Taḥajjud-Erinnerung";
    body=mode==="advance"?`Noch 15 Minuten bis ${timeLabel} Uhr. Bereite dich auf Taḥajjud vor. Die letzte Nachtzeit ist eine Gelegenheit für Duʿāʾ, Reue und Nähe zu Allah.`:`${timeLabel} Uhr – jetzt ist Gelegenheit für Taḥajjud. Die letzte Nachtzeit ist eine Gelegenheit für Duʿāʾ, Reue und Nähe zu Allah.`;
  }else if(mode==="advance"){
    title=`[Test] ${displayName} in 15 Min`;
    body=`Noch 15 Minuten bis ${timeLabel} Uhr. Bereite dich auf das Gebet vor. ${reminder}`;
  }else{
    title=`[Test] ${displayName} ist eingetreten`;
    body=`${timeLabel} Uhr – jetzt ist Gebetszeit. ${reminder}`;
  }
  try{
    if("serviceWorker" in navigator){
      const reg=await navigator.serviceWorker.ready;
      await reg.showNotification(title,{body,tag:"admin-local-prayer-test",renotify:true,icon:"/notification-icon-192.png",badge:"/notification-badge-96.png",data:{url:"/admin/"}});
    }else{
      new Notification(title,{body,tag:"admin-local-prayer-test",icon:"/notification-icon-192.png"});
    }
    setAdminPushTestStatus(`Lokaler Test (${mode==="advance"?"Vorab":"Gebetszeit"}) für ${displayName} auf diesem Admin-Gerät.`);
  }catch(e){
    try{new Notification(title,{body,tag:"admin-local-prayer-test",icon:"/notification-icon-192.png"});setAdminPushTestStatus("Test-Push wurde lokal ausgelöst.");}
    catch(err){setAdminPushTestStatus("Test-Push konnte auf diesem Gerät nicht angezeigt werden.")}
  }
}
function setUploadStatus(html){draftStatus=html;const el=document.getElementById("uploadStatus");if(el)el.innerHTML=html}
async function prepareNextPostNumber(){
  try{
    draftMarkdown=document.getElementById("postMarkdownInput")?.value||draftMarkdown;

    draftFilename=suggestFilename(draftMarkdown,draftNextNumber);

    addAdminLog("Prüfung","Nächste Beitragsnummer ermittelt",draftFilename);
  }catch(e){setUploadStatus(`Fehler: ${esc(e.message||e)}`)}
}
async function uploadPostViaWorker(){
  if(uploadBusy)return;
  draftMarkdown=document.getElementById("postMarkdownInput")?.value||"";
  draftFilename=(document.getElementById("postFilenameInput")?.value||"").trim();
  if(!draftMarkdown.trim()){setUploadStatus("Bitte Markdown-Beitrag einfügen.");return}
  const preview=markdownPreviewData(draftMarkdown);
  let telegramPayload=null;
  try{
    telegramPayload=await buildTelegramPayloadForPublish();
  }catch(e){
    setUploadStatus(`Telegram-Vorschau blockiert Veröffentlichung: ${esc(e.message||e)}`);
    return;
  }
  if(telegramPayload){
    if(!lastTelegramPreview?.ok){
      await refreshTelegramPreview();
      if(!lastTelegramPreview?.ok){
        setUploadStatus("Telegram-Vorschau ungültig. Bitte Fehler beheben oder Telegram-Autopost deaktivieren.");
        return;
      }
    }
  }
  let confirmMsg=`Möchtest du diese Änderung wirklich veröffentlichen?\n\nDiese Änderung wird für Besucher sichtbar.\n\nTitel: ${preview.title}\nDatei: ${draftFilename||"wird automatisch erzeugt"}`;
  if(telegramPayload){
    const modeLabel=telegramPayload.mode==="image"?"Bildbeitrag":telegramPayload.mode==="both"?"Text + Bild":"Text";
    confirmMsg+=`\n\nTelegram: Ja (${modeLabel}) → @dar_al_tauhid`;
  }
  const ok=confirm(confirmMsg);
  if(!ok){setUploadStatus("Veröffentlichung abgebrochen. Der Entwurf bleibt lokal vorbereitet.");addAdminLog("Abgebrochen","Veröffentlichung bewusst abgebrochen",draftFilename||preview.title);return}
  try{
    uploadBusy=true;setUploadStatus("Prüfe aktuelle Nummer und bereite Worker-Veröffentlichung vor...");
    const next=await resolveNextPostNumber();
    if(!draftFilename)draftFilename=suggestFilename(draftMarkdown,next);
    else if(/(?:^|-)\d{3}(?=-|\.md$)/.test(draftFilename))draftFilename=draftFilename.replace(/(^|-)\d{3}(?=-|\.md$)/,`$1${String(next).padStart(3,"0")}`);
    if(!/^[a-z0-9][a-z0-9-]*\.md$/i.test(draftFilename)){setUploadStatus("Dateiname muss eine .md-Datei ohne Leerzeichen sein.");return}
    const filenameInput=document.getElementById("postFilenameInput");if(filenameInput)filenameInput.value=draftFilename;
    const markdown=normalizeMarkdownForUpload(draftMarkdown,next);
    if(telegramPayload&&(telegramPayload.mode==="image"||telegramPayload.mode==="both")&&!telegramPayload.imageBase64){
      telegramPayload.imageBase64=await renderAdminTelegramImageBase64();
    }
    setUploadStatus("Sende Beitrag an Cloudflare Worker...");
    const result=await publishPostViaWorkerRequest(markdown,draftFilename,telegramPayload);
    draftFilename=result.filename||draftFilename;
    draftMarkdown=markdown;draftNextNumber=result.number||next;
    const live=result.liveCheck||{};
    const push=result.push||{};
    const tg=result.telegram||{};
    saveLastPublishPushContext({
      postId:result.postId||frontmatterValue(markdown,"id"),
      filename:draftFilename,
      postTitle:frontmatterValue(markdown,"title")||"Neuer Beitrag",
      publishedAt:result.publishedAt||new Date().toISOString(),
      postPath:result.postPath||`content/posts/${draftFilename}`,
      number:result.number||next,
      commitSha:result.commitSha||""
    });
    if(result.postId||frontmatterValue(markdown,"id")){
      writeLocalTelegramStatus(result.postId||frontmatterValue(markdown,"id"),{
        telegramStatus:tg.sent?"sent":tg.telegramError||tg.error?"failed":"not_sent",
        telegramMessageId:tg.telegramMessageId||null,
        telegramSentAt:tg.telegramSentAt||null,
        telegramError:tg.telegramError||tg.error||tg.reason||null
      });
    }
    setUploadStatus(formatPublishStatusHtml({filename:draftFilename,number:result.number||next,commitSha:result.commitSha,liveCheck:live,push,telegram:tg}));
    addAdminLog("Veröffentlicht","Beitrag über Cloudflare Worker veröffentlicht",draftFilename);
    saveLocalDraft("Entwurf nach Veröffentlichung lokal aktualisiert.");
    toast(push.sent?"Beitrag veröffentlicht & Push gesendet":push.pending?"Veröffentlicht – Push wartet auf Live":tg.telegramError&&!tg.sent?"Website ok, Telegram fehlgeschlagen":"Beitrag hochgeladen");
    updateTelegramPanelStatus();
  }catch(e){
    addAdminLog("Fehler",String(e.message||e),draftFilename||"Upload");
    setUploadStatus(`Fehler: ${esc(e.message||e)}<br>Bitte Worker URL, Admin Worker Secret und Cloudflare Secrets prüfen.`);
  }finally{
    uploadBusy=false;
    const btn=document.getElementById("uploadPostBtn");if(btn){btn.disabled=false;btn.textContent="Online veröffentlichen"}
  }
}
async function renderDashboard({force=false}={}){
  if(!force&&adminIsEditing())return;
  const panel=document.getElementById("panel");
  if(!lastData)panel.innerHTML=`<div class="empty">Statistik wird geladen...</div>`;
  if(!hasSupabase()){panel.innerHTML=`<div class="empty">Supabase ist nicht konfiguriert.</div>`;return}
  try{lastData=await fetchDashboard();renderShell()}catch(e){panel.innerHTML=`<div class="empty">Statistik konnte nicht geladen werden (${esc(String(e.message||e))}).</div>`}
}
function stopRefresh(){if(refreshTimer){clearInterval(refreshTimer);refreshTimer=null}}
function startRefresh(){stopRefresh();renderDashboard();refreshTimer=setInterval(renderDashboard,30000)}
function renderApp(){authed=readAuth()||authed;if(!authed){stopRefresh();renderLogin();return}document.getElementById("topbar").hidden=false;startRefresh()}
document.getElementById("refreshBtn").onclick=()=>renderDashboard({force:true});
document.getElementById("adminBackBtn").onclick=()=>adminBack();
document.getElementById("logoutBtn").onclick=()=>{setAuth(false);lastData=null;renderApp()};
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible"&&authed)setTimeout(()=>renderDashboard(),260)});
let adminSwipe=null;
document.addEventListener("touchstart",e=>{
  const t=e.touches&&e.touches[0];if(!t)return;
  const interactive=e.target.closest&&e.target.closest("input,textarea,select,button,a");
  if(interactive)return;
  adminSwipe={x:t.clientX,y:t.clientY,t:Date.now()};
},{passive:true});
document.addEventListener("touchend",e=>{
  if(!adminSwipe)return;
  const t=e.changedTouches&&e.changedTouches[0];if(!t){adminSwipe=null;return}
  const dx=t.clientX-adminSwipe.x,dy=t.clientY-adminSwipe.y,dt=Date.now()-adminSwipe.t;
  adminSwipe=null;
  if(adminNavStack.length||currentTab!=="start"){
    if(dx>78&&Math.abs(dy)<55&&dt<650)adminBack();
  }
},{passive:true});
window.addEventListener("error",e=>{const panel=document.getElementById("panel");if(!panel)return;const msg=String(e.message||e.error||"Unbekannter Fehler");panel.innerHTML=`<section class="login"><h2>Admin Fehler</h2><p>${esc(msg)}</p><button class="btn primary" type="button" onclick="location.reload()">Neu laden</button><button class="btn" type="button" onclick="window.__DAR_ADMIN_REPAIR__&&window.__DAR_ADMIN_REPAIR__()">Cache reparieren</button></section>`});
loadLocalDraft();
authed=readAuth();
renderApp();
</script>
