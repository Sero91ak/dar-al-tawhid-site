backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

locale: "de"

collections:
  - name: "posts"
    label: "Beiträge"
    folder: "content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "ID", name: "id", widget: "string", required: false, hint: "Kann leer bleiben." }
      - { label: "Datum", name: "date", widget: "datetime", required: false }
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Kategorie", name: "category", widget: "select", options: ["Aqīdah", "Fiqh", "Zuhd", "Adab", "Hadith", "Tafsīr", "Akhlaq", "Manhaj", "Biographie"] }
      - { label: "Thema", name: "topic", widget: "string" }
      - { label: "Gelehrter / Person", name: "scholar", widget: "string" }
      - { label: "Buch / Werk", name: "book", widget: "string" }
      - { label: "Hashtags", name: "tags", widget: "list", required: false, hint: "Einzeln eintragen, z.B. #Aqidah" }
      - { label: "Quellenzeile", name: "source", widget: "string" }
      - label: "Quellenlinks"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string", default: "→ Islamweb" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Logo", name: "logo", widget: "select", options: ["logo-black.png", "logo-blue.png", "logo-cream.jpg"], default: "logo-black.png" }
      - { label: "Aussage / Beitragstext", name: "body", widget: "markdown" }
