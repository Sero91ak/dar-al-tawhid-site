name: Send OneSignal push for new posts

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/**.md'
      - 'content/posts/*.md'
  workflow_dispatch:

jobs:
  notify:
    name: Send push notification
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      SITE_URL: "https://dar-al-tawhid.de"
      ONESIGNAL_APP_ID: "786d7cd6-0455-4434-ab14-0c10a7bc6b1e"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed post files
        shell: bash
        run: |
          set -euo pipefail
          : > changed-posts.txt

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual" > changed-posts.txt
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            git ls-tree -r --name-only "$AFTER" content/posts | grep -E '^content/posts/.*\.md$' > changed-posts.txt || true
          else
            git diff --name-only "$BEFORE" "$AFTER" -- 'content/posts/*.md' 'content/posts/**/*.md' > changed-posts.txt || true
          fi

          echo "Changed posts:"
          cat changed-posts.txt || true

      - name: Send OneSignal notification
        env:
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import re
          import sys
          import urllib.parse
          import urllib.request
          import urllib.error

          raw_api_key = os.environ.get("ONESIGNAL_API_KEY", "")
          app_id = os.environ.get("ONESIGNAL_APP_ID", "").strip()
          site_url = os.environ.get("SITE_URL", "https://dar-al-tawhid.de").rstrip("/")

          api_key = re.sub(r"\s+", "", raw_api_key)
          api_key = re.sub(r"^(Key|Basic)", "", api_key, flags=re.IGNORECASE).strip()

          if not api_key:
              raise SystemExit("ONESIGNAL_API_KEY fehlt oder ist leer. Bitte in GitHub als Repository Secret speichern.")
          if not app_id:
              raise SystemExit("ONESIGNAL_APP_ID fehlt.")

          def frontmatter_value(text, key):
              pattern = re.compile(rf"^{re.escape(key)}:\s*[\"']?(.*?)[\"']?\s*$", re.M)
              match = pattern.search(text)
              return match.group(1).strip() if match else ""

          def changed_files():
              if not os.path.exists("changed-posts.txt"):
                  return []
              with open("changed-posts.txt", "r", encoding="utf-8") as f:
                  return [
                      x.strip()
                      for x in f
                      if x.strip()
                      and x.strip() != "manual"
                      and x.strip().endswith(".md")
                      and os.path.exists(x.strip())
                  ]

          files = changed_files()

          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              title = "Test-Push"
              message = "DAR AL TAWḤID Push funktioniert."
              url = f"{site_url}/#recent"
          elif len(files) == 1:
              with open(files[0], "r", encoding="utf-8") as f:
                  text = f.read()
              post_title = frontmatter_value(text, "title") or "Neuer Beitrag"
              post_id = frontmatter_value(text, "id")
              title = "Neuer Beitrag online"
              message = post_title
              url = f"{site_url}/#post/{urllib.parse.quote(post_id, safe='')}" if post_id else f"{site_url}/#recent"
          elif len(files) > 1:
              title = "Neue Beiträge online"
              message = f"{len(files)} neue Beiträge auf DAR AL TAWḤID verfügbar."
              url = f"{site_url}/#recent"
          else:
              print("Keine neuen Markdown-Beiträge erkannt. Keine Push gesendet.")
              sys.exit(0)

          payload = {
              "app_id": app_id,
              "target_channel": "push",
              "included_segments": ["Subscribed Users"],
              "headings": {"en": title, "de": title},
              "contents": {"en": message, "de": message},
              "url": url,
              "name": f"github-posts-auto-{os.environ.get('GITHUB_RUN_ID', 'manual')}"
          }

          req = urllib.request.Request(
              "https://api.onesignal.com/notifications",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Content-Type": "application/json; charset=utf-8",
                  "Authorization": f"Key {api_key}"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  print(resp.read().decode("utf-8", errors="replace"))
          except urllib.error.HTTPError as e:
              print(e.read().decode("utf-8", errors="replace"))
              raise
          PY
