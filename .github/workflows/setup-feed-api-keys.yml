name: Setup Feed Image API Keys

# Einmalig ausführen: Keys direkt an Cloudflare Worker (nicht im Repo gespeichert).
# GitHub → Actions → Setup Feed Image API Keys → Run workflow
on:
  workflow_dispatch:
    inputs:
      pexels_api_key:
        description: "Pexels API Key (https://www.pexels.com/api/)"
        required: false
        type: string
      unsplash_access_key:
        description: "Unsplash Access Key (https://unsplash.com/developers)"
        required: false
        type: string
      pixabay_api_key:
        description: "Pixabay API Key (https://pixabay.com/api/docs/)"
        required: false
        type: string
      run_sync_after:
        description: "Nach Setup sofort Feed-Bilder synchronisieren"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  setup-keys:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Push API keys to Cloudflare Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PEXELS: ${{ github.event.inputs.pexels_api_key }}
          UNSPLASH: ${{ github.event.inputs.unsplash_access_key }}
          PIXABAY: ${{ github.event.inputs.pixabay_api_key }}
        run: |
          set -e
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN oder CLOUDFLARE_ACCOUNT_ID fehlt in GitHub Secrets"
            exit 1
          fi
          put_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              echo "$val" | wrangler secret put "$name"
              echo "✓ Cloudflare Secret gesetzt: $name"
            else
              echo "— Übersprungen (leer): $name"
            fi
          }
          put_secret PEXELS_API_KEY "$PEXELS"
          put_secret UNSPLASH_ACCESS_KEY "$UNSPLASH"
          put_secret PIXABAY_API_KEY "$PIXABAY"

      - name: Trigger feed background sync (staging)
        if: ${{ github.event.inputs.run_sync_after != 'false' }}
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::warning::ADMIN_PUBLISH_SECRET fehlt – Sync übersprungen"
            exit 0
          fi
          curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/feed-backgrounds/sync" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"staging":true,"force":false,"maxDownloads":20}'
