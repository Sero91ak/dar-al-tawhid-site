name: Daily Content Rotation

# Erstellt jeden Morgen früh den Tagesinhalt für Europe/Berlin.
# Einzige Duʿāʾ-Quelle: content/duas/dua-*.md
# content/duas/duas.json wird daraus automatisch erzeugt.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/rotate-daily-content.js
      - content/duas/dua-*.md
      - .github/workflows/daily-push-schedule.yml
  schedule:
    - cron: "5 2 * * *"

permissions:
  contents: write

concurrency:
  group: daily-content-rotation
  cancel-in-progress: false

jobs:
  rotate-daily-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate rotation script
        run: node --check scripts/rotate-daily-content.js

      - name: Build canonical Duʿāʾ index and select daily content
        run: node scripts/rotate-daily-content.js

      - name: Commit index, rotation state and daily content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/duas/duas.json content/updates/daily.json content/admin/daily-content-rotation.json
          if git diff --cached --quiet; then
            echo "Keine Änderung notwendig."
            exit 0
          fi
          git commit -m "Daily content rotation $(TZ=Europe/Berlin date +%F)"
          git push
