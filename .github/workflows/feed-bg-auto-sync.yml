name: Feed Background Auto-Sync

# Vollautomatisch: täglich + nach Worker-Deploy + manuell
on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"
  workflow_run:
    workflows:
      - Deploy Admin Publisher Worker
    types:
      - completed

permissions:
  contents: read

jobs:
  sync-feed-backgrounds:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger staging feed background sync
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::warning::ADMIN_PUBLISH_SECRET fehlt – Auto-Sync übersprungen"
            exit 0
          fi
          curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/feed-backgrounds/sync" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"staging":true,"force":false,"maxDownloads":20}' \
            | tee feed-bg-sync-result.json
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('feed-bg-sync-result.json','utf8'));
            console.log('downloaded=', data.downloaded, 'rejected=', data.rejected, 'skipped=', data.skipped, 'reason=', data.reason||'');
            if (data.status?.pool) console.log('pool approved=', data.status.pool.approved, 'target=', data.status.pool.target);
          "
