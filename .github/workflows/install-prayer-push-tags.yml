name: Install Prayer Push Tags

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-tags-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Insert prayer push tags script into index.html
        run: |
          if grep -q 'assets/prayer-push-tags.js' index.html; then
            echo "Script already installed."
          else
            sed -i 's#</body>#<script src="assets/prayer-push-tags.js"></script>\n</body>#' index.html
            echo "Script installed."
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Install prayer push tags script"
          git push
