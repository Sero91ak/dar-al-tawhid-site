name: Purge live site cache

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - version.json
      - service-worker.js
      - _headers
      - content/**
      - assets/**
      - scripts/purge-cloudflare-cache.js
      - .github/workflows/purge-live-cache.yml
  workflow_run:
    workflows:
      - pages build and deployment
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  purge:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Purge Cloudflare cache for dar-al-tawhid.de
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          SITE_URL: "https://dar-al-tawhid.de"
        run: node scripts/purge-cloudflare-cache.js
