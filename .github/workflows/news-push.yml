name: Send Fokus-News push (live)

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Push-Titel"
        required: true
        default: "Neu im Fokus"
      text:
        description: "Push-Text (Kurzmeldung)"
        required: true
        default: "Neu auf DAR AL TAWḤID — tippe zum Öffnen."
      news_id:
        description: "News-ID (current.json)"
        required: true
        default: "news-live"
      nav:
        description: "Ziel-Route (z.B. recent, zakat, news-detail)"
        required: true
        default: "recent"
      value:
        description: "Route-Wert (optional)"
        required: false
        default: ""

jobs:
  notify:
    name: Broadcast Fokus-News
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SITE_URL: "https://dar-al-tawhid.de"
      ONESIGNAL_APP_ID: "786d7cd6-0455-4434-ab14-0c10a7bc6b1e"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send news push to visitors
        env:
          ONESIGNAL_API_KEY_NEW: ${{ secrets.ONESIGNAL_API_KEY_NEW }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          ONESIGNAL_APP_API_KEY: ${{ secrets.ONESIGNAL_APP_API_KEY }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          NEWS_TITLE: ${{ inputs.title }}
          NEWS_TEXT: ${{ inputs.text }}
          NEWS_ID: ${{ inputs.news_id }}
          NEWS_NAV: ${{ inputs.nav }}
          NEWS_VALUE: ${{ inputs.value }}
        run: node scripts/send-news-push.js
