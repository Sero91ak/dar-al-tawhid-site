name: Prayer Push

# Backup-Scheduler – Haupt-Scheduler ist Cloudflare Worker Cron (alle 5 Min).
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  actions: read

jobs:
  send-prayer-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send scheduled prayer notifications
        env:
          ONESIGNAL_APP_ID: "786d7cd6-0455-4434-ab14-0c10a7bc6b1e"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          echo "Berechne und sende Gebetszeiten-Pushs..."
          node scripts/send-prayer-push.js
