name: Prayer Push

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"
    - cron: "15 1 * * *"

permissions:
  contents: write

jobs:
  send-prayer-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send scheduled prayer notifications
        env:
          ONESIGNAL_APP_ID: "786d7cd6-0455-4434-ab14-0c10a7bc6b1e"
          ONESIGNAL_API_KEY_NEW: ${{ secrets.ONESIGNAL_API_KEY_NEW }}
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
          ONESIGNAL_APP_API_KEY: ${{ secrets.ONESIGNAL_APP_API_KEY }}
        run: |
          echo "Berechne und sende Gebetszeiten-Pushs..."
          node scripts/send-prayer-push.js

      - name: Commit prayer push status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/admin/prayer-push-status.json
          if git diff --staged --quiet; then
            echo "Keine Status-Änderung."
          else
            git commit -m "chore: Gebets-Push Scheduler-Status aktualisieren"
            git push
          fi
