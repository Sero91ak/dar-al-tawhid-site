name: Daily Push Catch-up

# Sicherheitsnetz: nur Nachhol-Pushs (OneSignal liefert primär um 09:00/12:00 Ortszeit).
on:
  workflow_dispatch:
  schedule:
    - cron: "10 8 * * *"
    - cron: "10 11 * * *"

permissions:
  contents: read

jobs:
  run-daily-push-catchup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger catch-up scheduler on worker
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::warning::ADMIN_PUBLISH_SECRET fehlt – Catch-up übersprungen"
            exit 0
          fi
          curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/daily/run" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}' | tee daily-push-result.json
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('daily-push-result.json','utf8'));
            const st = data.status || {};
            console.log('catch-up sent=', st.sent, 'duaCandidates=', st.duaCandidates, 'recCandidates=', st.recCandidates);
          "
