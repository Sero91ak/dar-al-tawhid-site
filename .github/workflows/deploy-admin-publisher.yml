name: Deploy Admin Publisher Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/worker.js
      - cloudflare/prayer-push-admin.js
      - cloudflare/prayer-push-scheduler.js
      - cloudflare/daily-push-admin.js
      - cloudflare/daily-push-scheduler.js
      - cloudflare/wrangler.toml
      - .github/workflows/deploy-admin-publisher.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Health check
        run: |
          curl -fsS "https://dar-admin-publisher.sero91ak.workers.dev/health" | head -c 500
          echo ""
