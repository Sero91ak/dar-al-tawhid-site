name: Deploy Admin Publisher Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/quiz-stats-admin.js
      - cloudflare/worker.js
      - cloudflare/wrangler.toml
      - cloudflare/prayer-push-*.js
      - cloudflare/daily-push-*.js
      - cloudflare/jummah-push-*.js
      - cloudflare/feed-backgrounds-*.js
      - .github/workflows/setup-feed-api-keys.yml
      - cloudflare/onesignal-delivery.js
      - cloudflare/kurzlink-admin.js
      - cloudflare/zakat-prices.js
      - cloudflare/zakat-admin.js
      - .github/workflows/deploy-admin-publisher.yml
      - .github/workflows/feed-bg-auto-sync.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Push system guard (block deploy if scheduler missing)
        run: node ../scripts/push-system-guard.js

      - name: Publish isolation guard (Admin darf Besucher nicht überlasten)
        run: node ../scripts/publish-isolation-guard.js

      - name: Post markdown guard (Admin-YAML reparieren vor Upload)
        run: node ../scripts/post-markdown-guard.js

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Sync optional feed image API secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          put_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              echo "$val" | wrangler secret put "$name"
              echo "Secret gesetzt: $name"
            fi
          }
          put_secret PEXELS_API_KEY "$PEXELS_API_KEY"
          put_secret UNSPLASH_ACCESS_KEY "$UNSPLASH_ACCESS_KEY"
          put_secret PIXABAY_API_KEY "$PIXABAY_API_KEY"

      - name: Trigger feed background sync (staging)
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::warning::ADMIN_PUBLISH_SECRET fehlt – Post-Deploy Sync übersprungen"
            exit 0
          fi
          curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/feed-backgrounds/sync" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"staging":true,"force":false,"maxDownloads":20}' || echo "::warning::Feed-BG Sync nach Deploy fehlgeschlagen (Bootstrap-Seed bleibt aktiv)"

      - name: Health check
        run: |
          curl -fsS "https://dar-admin-publisher.sero91ak.workers.dev/health" | head -c 500
          echo ""
