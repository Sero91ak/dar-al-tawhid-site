name: Deploy Admin Publisher Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - cloudflare/quiz-stats-admin.js
      - cloudflare/worker.js
      - cloudflare/wrangler.toml
      - cloudflare/prayer-push-*.js
      - cloudflare/prayer-status-store.js
      - cloudflare/daily-push-*.js
      - cloudflare/jummah-push-*.js
      - cloudflare/feed-backgrounds-*.js
      - assets/prayer-push-tags.js
      - scripts/prayer-push-integrity-guard.js
      - scripts/prayer-push-loop-guard.js
      - content/admin/prayer-push-scheduler-lock.json
      - scripts/send-prayer-push.js
      - .github/workflows/prayer-push.yml
      - .github/workflows/setup-feed-api-keys.yml
      - cloudflare/onesignal-delivery.js
      - cloudflare/kurzlink-admin.js
      - cloudflare/zakat-prices.js
      - cloudflare/zakat-admin.js
      - cloudflare/library-admin.js
      - .github/workflows/deploy-admin-publisher.yml
      - .github/workflows/feed-bg-auto-sync.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate worker modules directly from source
        run: |
          node --check prayer-push-copy.js
          node --check prayer-push-scheduler.js
          node --check prayer-push-admin.js
          node --check prayer-status-store.js
          node --check daily-push-scheduler.js
          node --check daily-push-admin.js
          node --check worker.js

      - name: Prayer push integrity guard
        run: node ../scripts/prayer-push-integrity-guard.js

      - name: Prayer push loop guard
        env:
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          INTEGRITY_BASE_REF: ${{ github.event.before }}
        run: node ../scripts/prayer-push-loop-guard.js

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Push system guard
        run: node ../scripts/push-system-guard.js

      - name: Publish isolation guard
        run: node ../scripts/publish-isolation-guard.js

      - name: Post markdown guard
        run: node ../scripts/post-markdown-guard.js

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Verify worker and durable prayer status binding
        run: |
          for attempt in 1 2 3 4 5 6; do
            HEALTH="$(curl -fsS "https://dar-admin-publisher.sero91ak.workers.dev/health")"
            echo "Versuch ${attempt}: $HEALTH"
            if printf '%s' "$HEALTH" | grep -q '"prayerStatusStore":true' \
              && printf '%s' "$HEALTH" | grep -q '"prayerScheduler":"cloudflare-worker-cron-v3"' \
              && printf '%s' "$HEALTH" | grep -q '"libraryApi":"v1"'; then
              exit 0
            fi
            sleep 15
          done
          echo "::error::Worker-Binding nach Deploy nicht aktiv"
          exit 1

      - name: Repair prayer registrations disabled by daily push
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::error::ADMIN_PUBLISH_SECRET fehlt – Gebets-Push-Reparatur nicht möglich"
            exit 1
          fi
          RESULT="$(curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/prayer/repair-registrations" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          echo "$RESULT"

      - name: Refresh prayer push live status immediately
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::error::ADMIN_PUBLISH_SECRET fehlt – Livestatus kann nicht sofort geprüft werden"
            exit 1
          fi

          RESULT="$(curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/prayer/run" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          echo "$RESULT"

          RESULT_JSON="$RESULT" node <<'NODE'
          const result = JSON.parse(process.env.RESULT_JSON || "{}");
          if (result.statusWrite?.source !== "durable-object" || result.statusWrite?.saved !== true) {
            throw new Error(`Livestatus nicht dauerhaft gespeichert: ${JSON.stringify(result.statusWrite || null)}`);
          }
          if (!result.status?.updatedAt) {
            throw new Error("Gebets-Scheduler ohne aktuellen Zeitstempel beendet");
          }
          if (result.status?.prayerCopyVersion !== "v4") {
            throw new Error(`Falsche Gebets-Push-Copy aktiv: ${result.status?.prayerCopyVersion || "fehlt"}`);
          }
          if (result.status?.appEnvironment !== "production") {
            throw new Error(`Falsche Push-Umgebung aktiv: ${result.status?.appEnvironment || "fehlt"}`);
          }
          if (Number(result.status?.lookaheadMinutes) > 120) {
            throw new Error(`Planungsfenster zu groß: ${result.status?.lookaheadMinutes}`);
          }
          console.log(`Gebets-Push-Livestatus aktuell: ${result.status.updatedAt}`);
          NODE

      - name: Refresh and verify daily push scheduler
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          if [ -z "$ADMIN_PUBLISH_SECRET" ]; then
            echo "::error::ADMIN_PUBLISH_SECRET fehlt – Tages-Push kann nicht geprüft werden"
            exit 1
          fi

          RESULT="$(curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/daily/run" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{}')"
          echo "$RESULT"

          RESULT_JSON="$RESULT" node <<'NODE'
          const result = JSON.parse(process.env.RESULT_JSON || "{}");
          const status = result.status || {};
          if (status.schedulerEngine !== "cloudflare-worker-daily-v4-isolated") {
            throw new Error(`Falscher Tages-Push-Scheduler aktiv: ${status.schedulerEngine || "fehlt"}`);
          }
          if (status.appEnvironment !== "production") {
            throw new Error(`Falsche Tages-Push-Umgebung: ${status.appEnvironment || "fehlt"}`);
          }
          if (!status.updatedAt) {
            throw new Error("Tages-Push-Scheduler ohne aktuellen Zeitstempel");
          }
          if (Number(status.errors || 0) > 0) {
            throw new Error(`Tages-Push-Scheduler meldet ${status.errors} Fehler`);
          }
          console.log(`Tages-Push-v4 aktiv: ${status.updatedAt} · aktive Abos=${status.uniqueSubscriptions || 0} · Duʿāʾ=${status.accepted?.dua || 0} · Empfehlung=${status.accepted?.recommendation || 0}`);
          NODE

      - name: Sync optional feed image API secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          put_secret() {
            local name="$1"
            local val="$2"
            if [ -n "$val" ]; then
              echo "$val" | wrangler secret put "$name"
              echo "Secret gesetzt: $name"
            fi
          }
          put_secret PEXELS_API_KEY "$PEXELS_API_KEY"
          put_secret UNSPLASH_ACCESS_KEY "$UNSPLASH_ACCESS_KEY"
          put_secret PIXABAY_API_KEY "$PIXABAY_API_KEY"

      - name: Trigger feed background sync (staging)
        env:
          ADMIN_PUBLISH_SECRET: ${{ secrets.ADMIN_PUBLISH_SECRET }}
        run: |
          curl -fsS -X POST "https://dar-admin-publisher.sero91ak.workers.dev/api/admin/feed-backgrounds/sync" \
            -H "Authorization: Bearer ${ADMIN_PUBLISH_SECRET}" \
            -H "Content-Type: application/json" \
            -d '{"staging":true,"force":false,"maxDownloads":20}' || echo "::warning::Feed-BG Sync nach Deploy fehlgeschlagen"
