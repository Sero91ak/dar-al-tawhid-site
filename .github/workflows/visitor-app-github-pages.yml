name: Besucher-App GitHub Pages Live

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - index.html
      - test/index.html
      - version.json
      - service-worker.js
      - assets/**
      - content/updates/**
      - content/focus-feed/**
      - CNAME
      - .nojekyll
      - scripts/verify-live-visitor-app.js
      - .github/workflows/visitor-app-github-pages.yml
  workflow_run:
    workflows:
      - pages build and deployment
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  verify-github-pages:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Health checks (Syntax, Push-Guard, Version)
        run: |
          node scripts/app-health-check.js
          node scripts/push-system-guard.js
          node scripts/version-update-guard.js

      - name: Warte auf GitHub Pages Propagation
        run: sleep 45

      - name: Prüfe GitHub Pages Origin (direkt)
        run: |
          curl -fsS --resolve dar-al-tawhid.de:443:185.199.108.153 \
            "https://dar-al-tawhid.de/index.html" | rg "zakat-app\.js\?v=1[78]|app-shell-v171"

      - name: Cloudflare Cache leeren (CDN vor GitHub Pages)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          SITE_URL: "https://dar-al-tawhid.de"
          EXPECT_BUILD: "app-shell-v172"
          CLOUDFLARE_DEV_MODE: "1"
        run: node scripts/purge-cloudflare-cache.js
        continue-on-error: true

      - name: Live-Besucher-App verifizieren
        env:
          SITE_URL: "https://dar-al-tawhid.de"
          EXPECT_BUILD: "app-shell-v172"
          EXPECT_ZAKAT_VERSION: "18"
        run: node scripts/verify-live-visitor-app.js
