name: Update posts index

on:
  push:
    branches: [main]
    paths:
      - 'content/posts/*.md'
      - 'content/posts/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-posts-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Rebuild posts-index.json
        run: node scripts/build-posts-index.js

      - name: Commit index if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts/posts-index.json
          git diff --cached --quiet || git commit -m "Update posts-index.json"
          git push
