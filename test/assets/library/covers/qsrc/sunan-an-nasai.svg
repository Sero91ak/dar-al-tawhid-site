<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" aria-label="Buchcover: Sunan an-Nasāʾī">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14120e"/>
      <stop offset="55%" stop-color="#1e1a14"/>
      <stop offset="100%" stop-color="#100e0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8944f"/>
      <stop offset="50%" stop-color="#e8d49a"/>
      <stop offset="100%" stop-color="#a67c3d"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0806"/>
      <stop offset="100%" stop-color="#14120e"/>
    </linearGradient>
    <linearGradient id="shade" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="rgba(0,0,0,.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="36" height="600" fill="url(#spine)" opacity="0.94"/>
  <rect x="8" y="48" width="12" height="500" rx="2" fill="url(#gold)" opacity="0.38"/>
  <rect x="22" y="16" width="360" height="568" rx="7" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.64"/>
  <text x="214" y="118" text-anchor="middle" fill="#edd89a" font-family="Georgia,serif" font-size="12" font-weight="700" letter-spacing="1.6">ḤADĪṮ</text>
  <line x1="72" y1="136" x2="356" y2="136" stroke="url(#gold)" stroke-width="0.9" opacity="0.5"/>
  <text x="212" y="248" text-anchor="middle" fill="#faf4e4" font-family="Georgia,'Times New Roman',serif" font-size="24" font-weight="700">Sunan</text><text x="212" y="280" text-anchor="middle" fill="#faf4e4" font-family="Georgia,'Times New Roman',serif" font-size="24" font-weight="700">an-Nasāʾī</text>
  <rect x="36" y="430" width="340" height="150" fill="url(#shade)"/>
  <text x="214" y="468" text-anchor="middle" fill="#b9a57a" font-family="Georgia,serif" font-size="10" font-weight="700" letter-spacing="1.4">AUTOR</text>
  <text x="214" y="498" text-anchor="middle" fill="#efe2c2" font-family="Georgia,serif" font-size="14" font-style="italic">Aḥmad ibn Shuʿayb</text>
  <text x="214" y="560" text-anchor="middle" fill="#9a8b6e" font-family="Georgia,serif" font-size="8" letter-spacing="1.1">DAR AL TAWḤĪD</text>
