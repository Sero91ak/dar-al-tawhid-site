<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Wasiyyah PDF | DAR AL TAWḤID</title>
  <style>
    @page{size:A4;margin:0}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#f8f4ec;color:#2e261f}
    body{font-family:Georgia,"Times New Roman",serif}
    .pdf-doc{width:210mm;margin:0 auto;background:#f8f4ec}
    .theme-royal-blue{--paper:#f8f4ec;--paper-soft:#f3ede2;--gold:#b99752;--gold-soft:rgba(185,151,82,.22);--line:#d8ccba;--text:#2e261f;--muted:#6f6559;--deep:#304338;--accent:#b99752}
    .theme-sand-olive{--paper:#f7f0e2;--paper-soft:#efe5d2;--gold:#b8964d;--gold-soft:rgba(184,150,77,.24);--line:#d6c8b2;--text:#2e261f;--muted:#746c5e;--deep:#5e6854;--accent:#5e6854}
    .theme-bordeaux{--paper:#fbf3e7;--paper-soft:#f2e5d7;--gold:#b99752;--gold-soft:rgba(185,151,82,.22);--line:#ddcbbb;--text:#2e261f;--muted:#755f58;--deep:#6e3f45;--accent:#6e3f45}
    .pdf-page{width:210mm;min-height:297mm;position:relative;overflow:hidden;page-break-after:always;background:var(--paper);color:var(--text)}
    .pdf-page:last-child{page-break-after:auto}
    .pdf-page:before{content:"";position:absolute;inset:10mm;border:1px solid var(--line);border-radius:4mm;z-index:1;pointer-events:none}
    .pdf-page:after{content:"";position:absolute;inset:14mm;border:1px solid var(--gold-soft);border-radius:3mm;z-index:1;pointer-events:none}
    .page-inner{position:relative;z-index:2;padding:20mm 18mm 18mm;min-height:259mm}
    .cover-page{background:radial-gradient(circle at top left,rgba(185,151,82,.14),transparent 34%),radial-gradient(circle at bottom right,color-mix(in srgb,var(--accent) 10%,transparent),transparent 38%),linear-gradient(180deg,var(--paper),var(--paper-soft));color:var(--text)}
    .cover-page.theme-bordeaux{background:radial-gradient(circle at top left,rgba(185,151,82,.13),transparent 34%),radial-gradient(circle at bottom right,rgba(110,63,69,.10),transparent 38%),linear-gradient(180deg,var(--paper),var(--paper-soft))}
    .cover-inner{display:flex;flex-direction:column;justify-content:space-between}
    .cover-header{text-align:center}
    .brand-logo,.small-logo{aspect-ratio:1/1;border-radius:50%;object-fit:cover}
    .brand-logo{width:24mm;height:24mm;border:1px solid var(--gold);padding:1.2mm;background:rgba(255,255,255,.58);display:block;margin:0 auto 6mm}
    .brand-name{margin-top:0;font:700 11px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:3px;color:var(--gold)}
    .brand-line{width:52mm;height:1px;background:var(--gold);margin:6mm auto 0;opacity:.8}
    .cover-main{text-align:center}
    .bismillah{font-size:22px;color:var(--gold);margin-bottom:10mm}
    .cover-main h1{font-size:29px;line-height:1.2;margin:0;font-weight:700;letter-spacing:.2px;color:var(--text)}
    .subtitle{margin:5mm 0 0;font-size:13px;color:var(--muted)}
    .identity-card{width:120mm;margin:16mm auto 0;padding:8mm 10mm;border:1px solid var(--line);border-radius:4mm;background:rgba(255,255,255,.50)}
    .label{font:700 10px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
    .person-name{margin-top:3mm;font-size:22px;color:var(--text)}
    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8mm;margin-top:8mm}
    .meta-grid span{display:block;font:500 10px/1.3 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--muted)}
    .meta-grid strong{display:block;margin-top:1.5mm;font-size:13px;color:var(--text)}
    .cover-note{width:138mm;margin:18mm auto 0;font-size:12.5px;line-height:1.7;color:var(--text)}
    .page-footer{text-align:center;font:700 10px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1.5px;color:var(--gold)}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12mm;padding-bottom:5mm;border-bottom:1px solid var(--gold-soft)}
    .small-brand{font:700 9px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:3px;color:var(--gold)}
    .page-header h2{margin:2mm 0 0;font-size:22px;color:var(--deep);font-weight:600}
    .small-logo{width:18mm;height:18mm;border:1px solid var(--gold);padding:1mm}
    .section{margin-bottom:6mm;padding:6mm;border:1px solid var(--line);border-radius:3mm;background:rgba(255,255,255,.42);break-inside:avoid;page-break-inside:avoid}
    .section h3{margin:0 0 3mm;font:700 11px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1.4px;text-transform:uppercase;color:var(--deep)}
    .section-body{font-size:12px;line-height:1.65;color:var(--text);white-space:pre-line}
    .signature-box{margin-top:8mm;padding:7mm;border:1px solid var(--line);border-radius:3mm;background:rgba(255,255,255,.45);break-inside:avoid}
    .signature-box h3{margin:0 0 8mm;font:700 11px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:1.6px;text-transform:uppercase;color:var(--deep)}
    .signature-grid,.witness-grid{display:grid;grid-template-columns:1fr 1fr;gap:12mm}
    .witness-grid{margin-top:9mm}
    .signature-line{border-bottom:1px solid var(--text);height:12mm}
    .signature-box span{display:block;margin-top:2mm;font:500 10px/1.3 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--muted)}
    .source-note{margin-top:6mm;padding:5mm;border-left:2px solid var(--gold);background:rgba(255,255,255,.34);font-size:9.5px;line-height:1.55;color:var(--muted);break-inside:avoid}
    .content-footer{position:absolute;left:20mm;right:20mm;bottom:12mm;display:flex;justify-content:space-between;font:500 9px/1.2 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--muted);border-top:1px solid var(--gold-soft);padding-top:3mm}
    .empty{display:grid;place-items:center;width:210mm;min-height:100vh;margin:0 auto;padding:24px;text-align:center;color:#3b3023;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .screen-actions{position:sticky;top:0;z-index:10;display:flex;gap:10px;justify-content:center;align-items:center;padding:12px;background:rgba(248,244,236,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .screen-actions button,.screen-actions a{border:1px solid var(--line);border-radius:999px;background:#fffaf0;color:#2e261f;padding:10px 14px;font:800 13px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-decoration:none}
    .screen-actions .primary{background:#2f5049;color:#fff8ea;border-color:#2f5049}
    .screen-hint{font:700 12px/1.35 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#6f6559;text-align:center;padding:0 14px 12px}
    @media screen{body{padding:0 18px 18px}.pdf-page{box-shadow:0 18px 70px rgba(34,25,10,.12);margin:18px auto}.pdf-doc{padding-top:1px}}
    @media print{body{background:#f8f4ec;padding:0}.screen-actions,.screen-hint{display:none!important}.pdf-doc{margin:0}.pdf-page{box-shadow:none;margin:0}.empty{display:none!important}}
  </style>
</head>
<body>
  <nav class="screen-actions" aria-label="PDF-Aktionen">
    <button type="button" onclick="history.length>1?history.back():location.href='/test/wasiyyah/'">Zurück</button>
    <button class="primary" type="button" id="downloadPdfBtn">PDF speichern</button>
    <button type="button" id="sharePdfBtn">Teilen</button>
  </nav>
  <div class="screen-hint">Es startet kein automatischer Druck. Erst dieser Button öffnet bewusst das Speichern-als-PDF-Fenster.</div>
  <main id="pdfDoc" class="pdf-doc"></main>
  <script>
    (()=>{"use strict";
      const STORAGE_KEY="darWasiyyahDraftV1";
      const TEMPLATE_NAMES={"royal-blue":"Elfenbein & Gold","sand-olive":"Sand & Olive",bordeaux:"Creme & Bordeaux-Akzent"};
      const FIELD_SECTIONS=[
        ["1. Persönliche Angaben","personal"],
        ["2. Glaube und Grundlage","faithDeclaration"],
        ["3. Familie und mögliche Erben","family"],
        ["4. Schulden und offene Rechte","debts"],
        ["5. Amānāt und anvertraute Dinge","amanat"],
        ["6. Vermögen und wichtige Dokumente","assets"],
        ["7. Zakāh und religiöse Pflichten","religiousObligations"],
        ["8. Wasiyyah bis maximal ein Drittel","bequests"],
        ["9. Janāzah nach Sunnah","janazah"],
        ["10. Nicht gewünschte Neuerungen und Zeremonien","bidahRestrictions"],
        ["11. Kinder / Vormundschaft / private Wünsche","guardianship"],
        ["12. Ansprechpartner / Wasiyy","contacts"],
        ["13. Private Hinweise an Angehörige","privateNotes"]
      ];
      function readPayload(){for(const store of [sessionStorage,localStorage]){try{const raw=store.getItem("wasiyyahPdfPayload");if(raw)return JSON.parse(raw)}catch(e){}}try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)return{state:JSON.parse(raw),template:localStorage.getItem("wasiyyahPdfTemplate")||"royal-blue",createdDate:new Date().toLocaleDateString("de-DE")}}catch(e){}return null}
      function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
      function clean(v){return String(v||"").replace(/\r/g,"").trim()}
      function isEmpty(v){const n=clean(v).toLowerCase();return !n||n==="—"||n.includes("keine angaben erfasst")||n.includes("keine bekannten")||n.includes("keine bekannte")||n.includes("keine besondere wasiyyah erfasst")||n.includes("keine besonderen prüfhinweise")}
      function fullName(state){const text=clean(state.personal);if(!text)return"________________";return text.split(/\n/).map(x=>x.trim()).filter(Boolean)[0]||"________________"}
      function defaultFaith(){return"Ich bezeuge, dass es keinen anbetungswürdigen Gott gibt außer Allāh und dass Muḥammad ﷺ Sein Diener und Gesandter ist. Ich wünsche, dass meine Angelegenheiten nach Qurʾān, authentischer Sunnah und dem Verständnis der frühen Muslime geregelt werden."}
      function collectSections(state,finalText){const sections=[];FIELD_SECTIONS.forEach(([title,key])=>{let val=clean(state[key]);if(key==="faithDeclaration"&&isEmpty(val))val=defaultFaith();if(!isEmpty(val))sections.push({title,body:val})});if(state.reviewFlags&&state.reviewFlags.length)sections.push({title:"14. Prüfhinweise",body:state.reviewFlags.map((f,i)=>(i+1)+". "+f).join("\n")});if(!sections.length&&finalText){sections.push(...parseText(finalText))}return sections}
      function parseText(text){const out=[];let cur=null;clean(text).split(/\n/).forEach(raw=>{const line=raw.trim();if(!line||line==="PRIVATE ISLAMISCHE WASIYYAH-ERKLÄRUNG")return;if(/^\d+\.\s/.test(line)){if(cur&&!isEmpty(cur.body.join("\n")))out.push({title:cur.title,body:cur.body.join("\n")});cur={title:line,body:[]}}else if(cur)cur.body.push(line)});if(cur&&!isEmpty(cur.body.join("\n")))out.push({title:cur.title,body:cur.body.join("\n")});return out}
      function chunkSections(sections){const pages=[[]];let weight=0;sections.forEach(sec=>{const next=220+sec.body.length;if(pages.length<3&&pages[pages.length-1].length&&weight+next>1550){pages.push([]);weight=0}pages[pages.length-1].push(sec);weight+=next});return pages}
      function cover(template,state,date){return`<section class="pdf-page theme-${template} cover-page"><div class="page-inner cover-inner"><header class="cover-header"><img src="/logo.png" class="brand-logo" alt="DAR AL TAWḤID Logo" onerror="this.style.visibility='hidden'"><div class="brand-name">DAR AL TAWḤID</div><div class="brand-line"></div></header><main class="cover-main"><div class="bismillah">بسم الله الرحمن الرحيم</div><h1>Islamische Wasiyyah</h1><p class="subtitle">Private Erklärung nach Qurʾān und Sunnah</p><div class="identity-card"><div class="label">Erstellt für</div><div class="person-name">${esc(fullName(state))}</div><div class="meta-grid"><div><span>Erstellt am</span><strong>${esc(date)}</strong></div><div><span>Vorlage</span><strong>${esc(TEMPLATE_NAMES[template]||TEMPLATE_NAMES["royal-blue"])}</strong></div></div></div><p class="cover-note">Diese Wasiyyah dient der geordneten Festhaltung von Schulden, Amānāt, Ansprechpartnern, Janāzah-Wünschen und persönlichen Hinweisen.</p></main><footer class="page-footer">dar-al-tawhid.de</footer></div></section>`}
      function contentPage(template,sections,last){return`<section class="pdf-page theme-${template} content-page"><div class="page-inner"><header class="page-header"><div><div class="small-brand">DAR AL TAWḤID</div><h2>Wasiyyah-Erklärung</h2></div><img src="/logo.png" class="small-logo" alt="Logo" onerror="this.style.visibility='hidden'"></header>${sections.map(s=>`<div class="section"><h3>${esc(s.title)}</h3><div class="section-body">${esc(s.body)}</div></div>`).join("")}${last?signature()+sourceNote():""}<footer class="content-footer"><span>Islamische Wasiyyah</span><span>dar-al-tawhid.de</span></footer></div></section>`}
      function signature(){return`<div class="signature-box"><h3>Ort, Datum und Unterschrift</h3><div class="signature-grid"><div><div class="signature-line"></div><span>Ort / Datum</span></div><div><div class="signature-line"></div><span>Unterschrift</span></div></div><div class="witness-grid"><div><div class="signature-line"></div><span>Zeuge 1 optional</span></div><div><div class="signature-line"></div><span>Zeuge 2 optional</span></div></div></div>`}
      function sourceNote(){return`<div class="source-note"><strong>Quellenhinweis:</strong> Diese Vorlage berücksichtigt allgemeine islamische Grundsätze zu Wasiyyah, Schulden, Amānāt, Farāʾiḍ und Janāzah. Die konkrete staatliche Wirksamkeit muss separat geprüft werden.<br>Qurʾān 4:11-12 · Ṣaḥīḥ al-Bukhārī 2738 · Ṣaḥīḥ al-Bukhārī 2742 · Sunan Abī Dāwūd 2870</div>`}
      function downloadHtmlFallback(){const blob=new Blob(["<!doctype html>\n"+document.documentElement.outerHTML],{type:"text/html;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="dar-al-tawhid-wasiyyah-vorlage.html";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1200)}
      async function shareDocument(){try{if(navigator.share){await navigator.share({title:"DAR AL TAWḤID Wasiyyah",text:"Wasiyyah-Vorlage",url:location.href});return}}catch(e){}try{await navigator.clipboard.writeText(location.href);alert("Link zur Wasiyyah-Vorschau wurde kopiert.")}catch(e){alert("Teilen ist auf diesem Gerät nicht verfügbar.")}}
      function setupActions(){const dl=document.getElementById("downloadPdfBtn");const share=document.getElementById("sharePdfBtn");if(dl)dl.addEventListener("click",()=>window.print());if(share)share.addEventListener("click",shareDocument);window.downloadHtmlFallback=downloadHtmlFallback}
      function render(){const payload=readPayload();const root=document.getElementById("pdfDoc");if(!payload){root.innerHTML='<div class="empty"><div><h1>Wasiyyah-Entwurf nicht gefunden</h1><p>Bitte den PDF-Export erneut aus dem Wasiyyah-Assistenten öffnen.</p></div></div>';setupActions();return}const state=payload.state||{};const template=TEMPLATE_NAMES[payload.template]?payload.template:"royal-blue";const date=payload.createdDate||new Date().toLocaleDateString("de-DE");const sections=collectSections(state,payload.finalText||state.finalText||"");const pages=chunkSections(sections);root.innerHTML=cover(template,state,date)+pages.map((p,i)=>contentPage(template,p,i===pages.length-1)).join("");setupActions()}
      render();
    })();
  </script>
</body>
</html>
